syntax = "proto3";

package novaedge.proto;

option go_package = "github.com/piwi3910/novaedge/internal/proto/gen;proto";

// ConfigSnapshot represents a complete, versioned configuration
// sent from controller to node agents
message ConfigSnapshot {
  // Version is a monotonically increasing version number
  string version = 1;

  // Generation timestamp
  int64 generation_time = 2;

  // Gateways assigned to this node
  repeated Gateway gateways = 3;

  // Routes for all gateways
  repeated Route routes = 4;

  // Backend clusters
  repeated Cluster clusters = 5;

  // Endpoint mappings for each cluster
  map<string, EndpointList> endpoints = 6;

  // VIP assignments for this node
  repeated VIPAssignment vip_assignments = 7;

  // Policies to apply
  repeated Policy policies = 8;

  // Federation metadata (optional, only set when federation is enabled)
  FederationMetadata federation_metadata = 9;

  // List of available controllers for agent failover
  repeated ControllerInfo available_controllers = 10;

  // L4 (TCP/UDP/TLS passthrough) listener configurations
  repeated L4Listener l4_listeners = 11;

  // Internal service routing tables for east-west mesh traffic
  repeated InternalService internal_services = 12;

  // Mesh mTLS configuration
  MeshTLSConfig mesh_tls_config = 13;

  // Mesh authorization policies
  repeated MeshAuthorizationPolicy mesh_authz_policies = 14;

  // SD-WAN WAN link configurations
  repeated WANLink wan_links = 15;

  // SD-WAN WAN policy configurations
  repeated WANPolicy wan_policies = 16;
}

// FederationMetadata contains federation-related metadata for the snapshot
message FederationMetadata {
  // Vector clock state at the time of snapshot generation
  map<string, int64> vector_clock = 1;

  // Federation ID this snapshot belongs to
  string federation_id = 2;

  // Name of the controller that generated this snapshot
  string origin_controller = 3;

  // Hash of the snapshot content for change detection
  string content_hash = 4;

  // Sequence number for ordering (within this controller)
  int64 sequence_number = 5;

  // Whether this snapshot is from a federated sync (vs local change)
  bool from_federation = 6;
}

// ControllerInfo provides information about a controller for agent failover
message ControllerInfo {
  // Name of the controller
  string name = 1;

  // gRPC endpoint (host:port)
  string endpoint = 2;

  // Priority (lower = higher priority, 0 = primary)
  int32 priority = 3;

  // Geographic region
  string region = 4;

  // Availability zone
  string zone = 5;

  // Whether the controller is currently healthy
  bool healthy = 6;

  // Last known vector clock from this controller
  map<string, int64> vector_clock = 7;
}

// Gateway represents a ProxyGateway resource
message Gateway {
  string name = 1;
  string namespace = 2;
  string vip_ref = 3;
  string ingress_class_name = 4;
  repeated Listener listeners = 5;
  CompressionConfig compression = 6; // Response compression configuration
  string load_balancer_class = 7;
  GatewayCacheConfig cache = 8;
  ErrorPageConfig error_pages = 9;
  RedirectSchemeConfig redirect_scheme = 10;
  ExtProcConfig ext_proc = 11;
}

// ExtProcConfig configures an external processing gRPC service
message ExtProcConfig {
  bool enabled = 1;
  string address = 2;
  int64 timeout_ms = 3;
  bool fail_open = 4;
  bool process_request_headers = 5;
  bool process_request_body = 6;
  bool process_response_headers = 7;
  bool process_response_body = 8;
}

// GatewayCacheConfig configures response caching for a gateway
message GatewayCacheConfig {
  bool enabled = 1;
  int64 max_size_bytes = 2;
  int64 default_ttl_seconds = 3;
  int64 max_ttl_seconds = 4;
  int64 max_entry_size_bytes = 5;
}

// Listener represents a port and protocol to listen on
message Listener {
  string name = 1;
  int32 port = 2;
  Protocol protocol = 3;
  TLSConfig tls = 4; // Default TLS config (deprecated, use tls_certificates)
  repeated string hostnames = 5;
  QUICConfig quic = 6;
  map<string, TLSConfig> tls_certificates = 7; // SNI: hostname -> TLS cert/key
  int64 max_request_body_bytes = 8; // Maximum request body size in bytes (default: 10MB)
  int64 max_upload_body_bytes = 9; // Maximum upload body size in bytes (default: 100MB)
  int64 graceful_shutdown_timeout_ms = 10; // Graceful shutdown timeout in milliseconds (default: 30000)
  ClientAuthConfig client_auth = 11; // mTLS client authentication configuration
  bool ocsp_stapling = 12; // Enable OCSP stapling for TLS certificates
  ProxyProtocolConfig proxy_protocol = 13; // PROXY protocol configuration
  bool ssl_redirect = 14; // Automatic redirect from HTTP to HTTPS
  repeated string allowed_source_ranges = 15; // CIDR ranges allowed to access this listener
}

// Protocol defines the application protocol
enum Protocol {
  PROTOCOL_UNSPECIFIED = 0;
  HTTP = 1;
  HTTPS = 2;
  HTTP3 = 3;
  TCP = 4;
  TLS = 5;
  UDP = 6;
}

// TLSConfig contains TLS certificate and configuration
message TLSConfig {
  bytes cert = 1;
  bytes key = 2;
  string min_version = 3;
  repeated string cipher_suites = 4;
  bytes ca_cert = 5; // CA certificate bundle for client certificate verification (mTLS)
}

// QUICConfig contains QUIC-specific configuration for HTTP/3
message QUICConfig {
  string max_idle_timeout = 1;
  int64 max_bi_streams = 2;
  int64 max_uni_streams = 3;
  bool enable_0rtt = 4;
}

// Route represents a ProxyRoute resource
message Route {
  string name = 1;
  string namespace = 2;
  repeated string hostnames = 3;
  repeated RouteRule rules = 4;
  AccessLogConfig access_log = 5;

  // Pipeline defines a composable middleware pipeline for this route
  MiddlewarePipeline pipeline = 6;

  // Expression is a boolean routing expression for advanced matching
  string expression = 7;
}

// MirrorConfig configures traffic mirroring for a route rule
message MirrorConfig {
  BackendRef backend_ref = 1;
  int32 percentage = 2; // 0-100
}

// RouteRule defines matching and routing logic
message RouteRule {
  repeated RouteMatch matches = 1;
  repeated RouteFilter filters = 2;
  repeated BackendRef backend_refs = 3; // Support multiple weighted backends
  RouteLimitsConfig limits = 4;         // Per-route size limits and timeouts
  BufferingConfig buffering = 5;        // Request/response buffering settings
  BackendRef mirror_backend = 6;        // Mirror backend reference (optional)
  int32 mirror_percent = 7;             // Percentage of requests to mirror (0-100)
  RetryConfig retry = 8; // Retry configuration for failed requests
  FaultInjectionConfig fault_injection = 9; // Fault injection for chaos engineering
  BodyTransformConfig body_transform = 10;  // JSON body transformation
}

// FaultInjectionConfig configures fault injection for chaos engineering
message FaultInjectionConfig {
  int64 delay_duration_ms = 1;  // Fixed delay to inject in milliseconds
  int32 delay_percent = 2;      // Percentage of requests to delay (0-100)
  int32 abort_status_code = 3;  // HTTP status code for aborted requests
  int32 abort_percent = 4;      // Percentage of requests to abort (0-100)
  string header_activation = 5; // Optional header that must be present to activate
}

// TransformOperation represents a single JSON Patch operation (RFC 6902)
message TransformOperation {
  string op = 1;    // Operation: add, remove, replace, move, copy
  string path = 2;  // JSON Pointer (RFC 6901) target path
  string value = 3; // JSON-encoded value for add/replace operations
  string from = 4;  // Source path for move/copy operations
}

// BodyTransformConfig configures JSON body transformation
message BodyTransformConfig {
  repeated TransformOperation request = 1;  // Transforms for request bodies
  repeated TransformOperation response = 2; // Transforms for response bodies
  int64 max_body_size = 3;                  // Maximum body size for transformation in bytes
}

// RetryConfig defines automatic request retry behavior
message RetryConfig {
  int32 max_retries = 1; // Maximum number of retry attempts (default: 3)
  int64 per_try_timeout_ms = 2; // Timeout per retry attempt in milliseconds
  repeated string retry_on = 3; // Conditions to retry on: "5xx", "connection-failure", "reset", "refused-stream"
  double retry_budget = 4; // Percentage of requests that can be retried (0.0-1.0)
  int64 backoff_base_ms = 5; // Base interval for exponential backoff in milliseconds (default: 25)
  repeated string retry_methods = 6; // HTTP methods to retry (default: GET, HEAD, OPTIONS)
}

// RouteMatch defines conditions for matching requests
message RouteMatch {
  PathMatch path = 1;
  repeated HeaderMatch headers = 2;
  string method = 3;
}

// PathMatch defines path matching criteria
message PathMatch {
  PathMatchType type = 1;
  string value = 2;
}

enum PathMatchType {
  PATH_MATCH_TYPE_UNSPECIFIED = 0;
  EXACT = 1;
  PATH_PREFIX = 2;
  REGULAR_EXPRESSION = 3;
}

// HeaderMatch defines header matching criteria
message HeaderMatch {
  HeaderMatchType type = 1;
  string name = 2;
  string value = 3;
}

enum HeaderMatchType {
  HEADER_MATCH_TYPE_UNSPECIFIED = 0;
  HEADER_EXACT = 1;
  HEADER_REGULAR_EXPRESSION = 2;
}

// RouteFilter defines request/response modifications
message RouteFilter {
  RouteFilterType type = 1;
  repeated HTTPHeader add_headers = 2;
  repeated string remove_headers = 3;
  string redirect_url = 4;
  string rewrite_path = 5;
  // Response header modifications
  repeated HTTPHeader response_add_headers = 6;
  repeated string response_remove_headers = 7;
  repeated HTTPHeader response_set_headers = 8;
}

enum RouteFilterType {
  ROUTE_FILTER_TYPE_UNSPECIFIED = 0;
  ADD_HEADER = 1;
  REMOVE_HEADER = 2;
  REQUEST_REDIRECT = 3;
  URL_REWRITE = 4;
  RESPONSE_ADD_HEADER = 5;
  RESPONSE_REMOVE_HEADER = 6;
  RESPONSE_SET_HEADER = 7;
}

// HTTPHeader represents a name-value pair
message HTTPHeader {
  string name = 1;
  string value = 2;
}

// BackendRef references a backend cluster
message BackendRef {
  string name = 1;
  string namespace = 2;
  int32 weight = 3;
}

// Cluster represents a ProxyBackend resource
message Cluster {
  string name = 1;
  string namespace = 2;
  LoadBalancingPolicy lb_policy = 3;
  int64 connect_timeout_ms = 4;
  int64 idle_timeout_ms = 5;
  CircuitBreaker circuit_breaker = 6;
  HealthCheck health_check = 7;
  BackendTLS tls = 8;
  ConnectionPool connection_pool = 9;
  SessionAffinityConfig session_affinity = 10; // Session affinity (sticky sessions) configuration
  UpstreamProxyProtocol upstream_proxy_protocol = 11; // PROXY protocol config for backend connections
  OutlierDetection outlier_detection = 12; // Outlier detection and auto-ejection configuration
  SlowStart slow_start = 13; // Slow start traffic ramp-up configuration
  // Backend protocol: "HTTP", "HTTPS", "gRPC", "gRPCS", "HTTP2".
  string protocol = 14;
}

// OutlierDetection configures per-endpoint outlier detection and auto-ejection
message OutlierDetection {
  int64 interval_ms = 1;
  int32 consecutive_5xx_threshold = 2;
  int64 base_ejection_duration_ms = 3;
  int32 max_ejection_percent = 4;
  int32 success_rate_min_hosts = 5;
  int32 success_rate_min_requests = 6;
  double success_rate_stdev_factor = 7;
}

// SlowStart configures gradual traffic ramp-up for new/recovering endpoints
message SlowStart {
  int64 window_ms = 1;
  double aggression = 2;
}

// ConnectionPool defines connection pool configuration
message ConnectionPool {
  int32 max_idle_conns = 1;              // Maximum total idle connections (default: 100)
  int32 max_idle_conns_per_host = 2;     // Maximum idle connections per host (default: 10)
  int32 max_conns_per_host = 3;          // Maximum total connections per host (0 = unlimited)
  int64 idle_conn_timeout_ms = 4;        // Idle connection timeout in milliseconds (default: 90000)
  int64 response_header_timeout_ms = 5;  // Response header timeout in milliseconds (default: 10000)
  bool disable_keep_alives = 6;          // Disable keep-alives (default: false)
  int32 max_response_header_bytes = 7;   // Max response header bytes (0 = 10MB default)
  int32 write_buffer_size = 8;           // Per-connection write buffer size in bytes (default: 32768 = 32KB)
  int32 read_buffer_size = 9;            // Per-connection read buffer size in bytes (default: 32768 = 32KB)
}

// SessionAffinityConfig defines session affinity (sticky sessions) configuration
message SessionAffinityConfig {
  string type = 1;           // Affinity type: "cookie", "header", "source_ip"
  string cookie_name = 2;    // Cookie name for cookie-based affinity
  int64 cookie_ttl_seconds = 3; // Cookie TTL in seconds (0 = session cookie)
  string cookie_path = 4;    // Cookie path (default: "/")
  bool cookie_secure = 5;    // Secure flag on cookie
  string cookie_same_site = 6; // SameSite attribute: "Strict", "Lax", "None"
  // Header name for header-based affinity.
  string header_name = 7;
}

enum LoadBalancingPolicy {
  LB_POLICY_UNSPECIFIED = 0;
  ROUND_ROBIN = 1;
  P2C = 2;
  EWMA = 3;
  RING_HASH = 4;
  MAGLEV = 5;
  LEAST_CONN = 6;
  SOURCE_HASH = 7;
  STICKY = 8;
}

// CircuitBreaker defines circuit breaker settings
message CircuitBreaker {
  int32 max_connections = 1;
  int32 max_pending_requests = 2;
  int32 max_requests = 3;
  int32 max_retries = 4;
}

// HealthCheckType defines the type of health check to perform
enum HealthCheckType {
  HEALTH_CHECK_HTTP = 0;
  HEALTH_CHECK_GRPC = 1;
  HEALTH_CHECK_TCP = 2;
  HEALTH_CHECK_HTTPS = 3;
}

// HealthCheck defines active health check configuration
message HealthCheck {
  int64 interval_ms = 1;
  int64 timeout_ms = 2;
  int32 healthy_threshold = 3;
  int32 unhealthy_threshold = 4;
  string http_path = 5;
  HealthCheckType type = 6;
  string grpc_service_name = 7;
}

// BackendTLS defines TLS settings for backend connections
message BackendTLS {
  bool enabled = 1;
  bool insecure_skip_verify = 2;
  bytes ca_cert = 3;
}

// EndpointList contains endpoints for a cluster
message EndpointList {
  repeated Endpoint endpoints = 1;
}

// Endpoint represents a single backend endpoint
message Endpoint {
  string address = 1;
  int32 port = 2;
  bool ready = 3;
  map<string, string> labels = 4;
  // Weight for weighted load balancing (0 = default weight of 1).
  int32 weight = 5;
}

// VIPAssignment tells this node which VIPs to manage
message VIPAssignment {
  string vip_name = 1;
  string address = 2;
  VIPMode mode = 3;
  repeated int32 ports = 4;
  bool is_active = 5; // For L2ARP mode
  BGPConfig bgp_config = 6; // BGP configuration (when mode is BGP)
  OSPFConfig ospf_config = 7; // OSPF configuration (when mode is OSPF)
  BFDConfig bfd_config = 8; // BFD configuration for fast failure detection
  string ipv6_address = 9; // IPv6 address for dual-stack VIPs
  string address_family = 10; // Address family: ipv4, ipv6, dual
  string pool_ref = 11; // Reference to IP pool for auto-allocation
}

enum VIPMode {
  VIP_MODE_UNSPECIFIED = 0;
  L2_ARP = 1;
  BGP = 2;
  OSPF = 3;
}

// BGPConfig defines BGP speaker configuration
message BGPConfig {
  uint32 local_as = 1;
  string router_id = 2;
  repeated BGPPeer peers = 3;
  repeated string communities = 4;
  uint32 local_preference = 5;
}

// BGPPeer defines a BGP peer
message BGPPeer {
  string address = 1;
  uint32 as = 2;
  uint32 port = 3;
}

// OSPFConfig defines OSPF speaker configuration
message OSPFConfig {
  string router_id = 1;
  uint32 area_id = 2;
  repeated OSPFNeighbor neighbors = 3;
  uint32 hello_interval = 4; // in seconds
  uint32 dead_interval = 5; // in seconds
  string auth_type = 6; // none, simple, md5
  string auth_key = 7;
  uint32 cost = 8; // OSPF route cost metric
  bool graceful_restart = 9; // Enable OSPF graceful restart
}

// OSPFNeighbor defines an OSPF neighbor
message OSPFNeighbor {
  string address = 1;
  uint32 priority = 2;
}

// BFDConfig defines BFD (Bidirectional Forwarding Detection) settings
message BFDConfig {
  bool enabled = 1;
  int32 detect_multiplier = 2;
  string desired_min_tx_interval = 3; // e.g., "300ms"
  string required_min_rx_interval = 4; // e.g., "300ms"
  bool echo_mode = 5;
}

// Policy represents a ProxyPolicy resource
message Policy {
  string name = 1;
  string namespace = 2;
  PolicyType type = 3;
  TargetRef target_ref = 4;

  // Policy-specific configuration
  RateLimitConfig rate_limit = 5;
  JWTConfig jwt = 6;
  IPListConfig ip_list = 7;
  CORSConfig cors = 8;
  SecurityHeadersConfig security_headers = 9;
  DistributedRateLimitConfig distributed_rate_limit = 10;
  WAFConfig waf = 11;

  // WASM plugin configuration (for WASM_PLUGIN type)
  WASMPluginConfig wasm_plugin = 12;
  BasicAuthConfig basic_auth = 13;
  ForwardAuthConfig forward_auth = 14;
  OIDCConfig oidc = 15;
  MeshAuthorizationConfig mesh_authorization = 16;
}

enum PolicyType {
  POLICY_TYPE_UNSPECIFIED = 0;
  RATE_LIMIT = 1;
  JWT = 2;
  IP_ALLOW_LIST = 3;
  IP_DENY_LIST = 4;
  CORS = 5;
  SECURITY_HEADERS = 6;
  DISTRIBUTED_RATE_LIMIT = 7;
  WAF = 8;
  WASM_PLUGIN = 9;
  BASIC_AUTH = 10;
  FORWARD_AUTH = 11;
  OIDC = 12;
  MESH_AUTHORIZATION = 13;
}

// TargetRef identifies the resource a policy applies to
message TargetRef {
  string kind = 1;
  string name = 2;
  string namespace = 3;
}

// RateLimitConfig defines rate limiting settings
message RateLimitConfig {
  int32 requests_per_second = 1;
  int32 burst = 2;
  string key = 3;
}

// JWTConfig defines JWT authentication settings
message JWTConfig {
  string issuer = 1;
  repeated string audience = 2;
  string jwks_uri = 3;
  string header_name = 4;
  string header_prefix = 5;
  repeated string allowed_algorithms = 6;
}

// IPListConfig defines IP allow/deny list
message IPListConfig {
  repeated string cidrs = 1;
  string source_header = 2;
}

// CORSConfig defines CORS settings
message CORSConfig {
  repeated string allow_origins = 1;
  repeated string allow_methods = 2;
  repeated string allow_headers = 3;
  repeated string expose_headers = 4;
  int64 max_age_seconds = 5;
  bool allow_credentials = 6;
}

// SecurityHeadersConfig defines security headers settings
message SecurityHeadersConfig {
  // HSTS (HTTP Strict Transport Security) configuration
  HSTSConfig hsts = 1;

  // Content Security Policy header value
  string content_security_policy = 2;

  // X-Frame-Options header value (DENY, SAMEORIGIN, ALLOW-FROM uri)
  string x_frame_options = 3;

  // X-Content-Type-Options: nosniff
  bool x_content_type_options = 4;

  // X-XSS-Protection header value (e.g., "1; mode=block")
  string x_xss_protection = 5;

  // Referrer-Policy header value
  string referrer_policy = 6;

  // Permissions-Policy header value (replaces Feature-Policy)
  string permissions_policy = 7;

  // Cross-Origin-Embedder-Policy header value
  string cross_origin_embedder_policy = 8;

  // Cross-Origin-Opener-Policy header value
  string cross_origin_opener_policy = 9;

  // Cross-Origin-Resource-Policy header value
  string cross_origin_resource_policy = 10;
}

// HSTSConfig defines HSTS settings
message HSTSConfig {
  // Whether HSTS is enabled
  bool enabled = 1;

  // Max age in seconds (e.g., 31536000 for 1 year)
  int64 max_age_seconds = 2;

  // Include subdomains in the HSTS policy
  bool include_subdomains = 3;

  // Add site to browser HSTS preload list
  bool preload = 4;
}

// L4Listener defines a Layer 4 (TCP/UDP/TLS passthrough) listener configuration
message L4Listener {
  // Name of the listener
  string name = 1;
  // Port to listen on
  int32 port = 2;
  // Protocol type: TCP, UDP, or TLS (passthrough)
  Protocol protocol = 3;
  // Backend cluster name for TCP/UDP listeners
  string backend_name = 4;
  // Endpoints for the backend (used for TCP/UDP listeners)
  repeated Endpoint backends = 5;
  // TCP-specific configuration
  L4TCPConfig tcp_config = 6;
  // UDP-specific configuration
  L4UDPConfig udp_config = 7;
  // TLS passthrough routes (for TLS protocol)
  repeated L4TLSRoute tls_routes = 8;
  // Default TLS backend when no SNI match is found
  L4TLSRoute default_tls_backend = 9;
}

// L4TCPConfig holds TCP-specific proxy configuration
message L4TCPConfig {
  // Connect timeout in milliseconds
  int64 connect_timeout_ms = 1;
  // Idle timeout in milliseconds
  int64 idle_timeout_ms = 2;
  // Buffer size in bytes for bidirectional copy
  int32 buffer_size = 3;
  // Drain timeout in milliseconds for graceful shutdown
  int64 drain_timeout_ms = 4;
}

// L4UDPConfig holds UDP-specific proxy configuration
message L4UDPConfig {
  // Session timeout in milliseconds
  int64 session_timeout_ms = 1;
  // Maximum UDP packet buffer size
  int32 buffer_size = 2;
}

// L4TLSRoute maps an SNI hostname to backend endpoints for TLS passthrough
message L4TLSRoute {
  // SNI hostname to match (supports wildcards like *.example.com)
  string hostname = 1;
  // Backend cluster name
  string backend_name = 2;
  // Backend endpoints
  repeated Endpoint backends = 3;
}

// InternalService represents a Kubernetes Service discovered for east-west mesh routing.
// The controller auto-discovers Services and includes their routing information
// in the ConfigSnapshot so agents can route intercepted traffic.
message InternalService {
  // Kubernetes Service name
  string name = 1;

  // Kubernetes namespace
  string namespace = 2;

  // ClusterIP of the Service (original destination for TPROXY matching)
  string cluster_ip = 3;

  // Ports exposed by this Service
  repeated ServicePort ports = 4;

  // Backend endpoints resolved from EndpointSlices
  repeated Endpoint endpoints = 5;

  // Load balancing policy for this service
  LoadBalancingPolicy lb_policy = 6;

  // Whether this service is opted into mesh interception
  bool mesh_enabled = 7;

  // mTLS mode: "permissive", "strict", or "disabled"
  string mtls_mode = 8;

  // Trust domain for SPIFFE IDs
  string trust_domain = 9;
}

// ServicePort describes a port on an InternalService
message ServicePort {
  // Port name (e.g. "http", "grpc")
  string name = 1;

  // Port number exposed by the Service
  int32 port = 2;

  // Target port on the backend pods
  int32 target_port = 3;

  // Protocol: TCP or UDP
  string protocol = 4;
}

// ErrorPageConfig defines custom error page configuration
message ErrorPageConfig {
  bool enabled = 1;
  map<int32, string> pages = 2; // status code -> HTML template
  string default_page = 3; // fallback HTML template
}

// RedirectSchemeConfig defines HTTP to HTTPS redirect configuration
message RedirectSchemeConfig {
  bool enabled = 1;
  string scheme = 2; // target scheme (e.g., "https")
  int32 port = 3; // target port (e.g., 443)
  int32 status_code = 4; // 301 or 302
  repeated string exclusions = 5; // paths to skip redirect
}

// AccessLogConfig defines access logging configuration
message AccessLogConfig {
  bool enabled = 1;
  string format = 2; // "clf", "json", "custom"
  string template = 3; // custom format template
  string output = 4; // "stdout", "file", "both"
  string file_path = 5;
  string max_size = 6; // e.g., "100Mi"
  int32 max_backups = 7;
  repeated int32 filter_status_codes = 8; // only log these status codes
  double sample_rate = 9; // 0.0 - 1.0
}

// DistributedRateLimitConfig defines distributed rate limiting with Redis backend
message DistributedRateLimitConfig {
  int32 requests_per_second = 1;
  int32 burst = 2;
  string algorithm = 3; // "fixed-window", "sliding-window", "token-bucket"
  string key = 4; // "source-ip", "header:X-API-Key", "jwt:sub"
  RedisConfig redis = 5;
}

// RedisConfig defines Redis connection settings
message RedisConfig {
  string address = 1;
  string password_secret_ref = 2; // Reference to secret containing password
  bool tls = 3;
  int32 database = 4;
  bool cluster_mode = 5; // Enable Redis cluster support
}

// WAFConfig defines Web Application Firewall configuration
message WAFConfig {
  bool enabled = 1;
  string mode = 2; // "detection" or "prevention"
  int32 paranoia_level = 3; // 1-4
  int32 anomaly_threshold = 4;
  string rules_config_map_ref = 5; // Reference to ConfigMap containing rules
  repeated string rule_exclusions = 6; // Rule IDs to exclude
  repeated string custom_rules = 7; // Inline custom rules
  string fail_mode = 8; // "closed" (default) or "open" - behavior on WAF processing errors
  int64 max_body_size = 9; // Max request body bytes to inspect (0 = skip body inspection)
  bool response_body_inspection = 10; // Enable response body scanning for data leakage
  int64 max_response_body_size = 11; // Max response body bytes to inspect
}

// WASMPluginConfig defines WASM plugin settings in a policy
message WASMPluginConfig {
  // Source is a ConfigMap reference or URL for the WASM binary
  string source = 1;
  // ConfigRef is an optional ConfigMap name for plugin configuration
  string config_ref = 2;
  // Config is inline key-value configuration for the plugin
  map<string, string> config = 3;
  // Phase determines when the plugin executes: request, response, both
  string phase = 4;
  // Priority determines execution order (lower = earlier)
  int32 priority = 5;
  // WasmBytes is the raw WASM binary (loaded from ConfigMap by controller)
  bytes wasm_bytes = 6;
}

// MiddlewarePipeline defines an ordered middleware pipeline for a route
message MiddlewarePipeline {
  repeated MiddlewareRef middleware = 1;
}

// MiddlewareRef references a middleware in the pipeline
message MiddlewareRef {
  // Type: builtin or wasm
  string type = 1;
  // Name identifies the middleware
  string name = 2;
  // Priority determines execution order (lower = earlier)
  int32 priority = 3;
  // Config holds optional key-value configuration
  map<string, string> config = 4;
}

// BasicAuthConfig defines HTTP Basic Authentication settings
message BasicAuthConfig {
  // Realm name for WWW-Authenticate header
  string realm = 1;

  // htpasswd-formatted credentials (loaded from Secret by controller)
  // Lines in format: username:password_hash
  string htpasswd = 2;

  // Strip Authorization header before forwarding to backend
  bool strip_auth = 3;
}

// ForwardAuthConfig defines external auth delegation settings
message ForwardAuthConfig {
  // URL of the external auth service
  string address = 1;

  // Headers to forward from original request to auth service
  repeated string auth_headers = 2;

  // Headers to copy from auth response to upstream request
  repeated string response_headers = 3;

  // Timeout in milliseconds for the auth subrequest
  int64 timeout_ms = 4;

  // Cache TTL in seconds (0 = no caching)
  int64 cache_ttl_seconds = 5;
}

// OIDCConfig defines OAuth2/OIDC authentication flow settings
message OIDCConfig {
  // Provider type: generic, keycloak
  string provider = 1;

  // OIDC issuer URL for discovery
  string issuer_url = 2;

  // OAuth2 client ID
  string client_id = 3;

  // OAuth2 client secret (loaded from Secret by controller)
  string client_secret = 4;

  // OAuth2 callback URL
  string redirect_url = 5;

  // OAuth2 scopes to request
  repeated string scopes = 6;

  // Session encryption key (loaded from Secret by controller, 32 bytes)
  bytes session_secret = 7;

  // User info claims to forward as headers
  repeated string forward_headers = 8;

  // Keycloak-specific configuration
  KeycloakConfig keycloak = 9;

  // Authorization (role-based access control)
  AuthorizationConfig authorization = 10;
}

// KeycloakConfig defines Keycloak-specific settings
message KeycloakConfig {
  // Base Keycloak server URL
  string server_url = 1;

  // Keycloak realm name
  string realm = 2;

  // JWT claim path for realm roles
  string role_claim = 3;

  // JWT claim path for groups
  string group_claim = 4;
}

// AuthorizationConfig defines role-based access control
message AuthorizationConfig {
  // Required roles
  repeated string required_roles = 1;

  // Required groups
  repeated string required_groups = 2;

  // Authorization mode: "any" (OR) or "all" (AND)
  string mode = 3;
}

// MeshTLSConfig contains mesh-wide mTLS configuration pushed to agents
message MeshTLSConfig {
  // Trust domain for SPIFFE IDs (e.g., "novaedge")
  string trust_domain = 1;

  // PEM-encoded CA certificate for verifying peer mesh certificates
  bytes ca_certificate = 2;

  // PEM-encoded workload certificate for this agent
  bytes certificate = 3;

  // PEM-encoded private key for this agent's workload certificate
  bytes private_key = 4;

  // SPIFFE ID assigned to this agent (e.g., spiffe://novaedge/agent/node-name)
  string spiffe_id = 5;

  // Certificate expiry as Unix timestamp
  int64 expiry_unix = 6;
}

// MeshCertificateRequest is sent by agents to request a mesh workload certificate
message MeshCertificateRequest {
  // PEM-encoded CSR
  bytes csr = 1;

  // Node name requesting the certificate
  string node_name = 2;
}

// MeshCertificateResponse contains the signed workload certificate
message MeshCertificateResponse {
  // PEM-encoded signed certificate
  bytes certificate = 1;

  // PEM-encoded CA certificate chain (trust bundle)
  bytes ca_certificate = 2;

  // SPIFFE ID in the certificate
  string spiffe_id = 3;

  // Certificate expiry as Unix timestamp
  int64 expiry_unix = 4;
}

// MeshAuthorizationPolicy defines identity-based authorization for mesh traffic
message MeshAuthorizationPolicy {
  // Policy name
  string name = 1;

  // Target service name
  string target_service = 2;

  // Target service namespace
  string target_namespace = 3;

  // Authorization rules
  repeated MeshAuthorizationRule rules = 4;

  // Action: "ALLOW" or "DENY"
  string action = 5;
}

// MeshAuthorizationConfig defines mesh authorization settings (embedded in Policy message)
message MeshAuthorizationConfig {
  // Authorization rules
  repeated MeshAuthorizationRule rules = 1;

  // Action: "ALLOW" or "DENY"
  string action = 2;
}

// MeshAuthorizationRule defines a single authorization rule
message MeshAuthorizationRule {
  // Source identity matchers
  repeated MeshSource from = 1;

  // Destination matchers (L7)
  repeated MeshDestination to = 2;
}

// MeshSource identifies allowed source workloads
message MeshSource {
  // Allowed source namespaces
  repeated string namespaces = 1;

  // Allowed source service accounts
  repeated string service_accounts = 2;

  // Allowed SPIFFE ID patterns (regex)
  repeated string spiffe_ids = 3;
}

// MeshDestination matches destination traffic properties
message MeshDestination {
  // HTTP methods to match
  repeated string methods = 1;

  // URL path patterns to match (glob: /api/*)
  repeated string paths = 2;
}

// ConfigService is the gRPC service for distributing config snapshots

// SD-WAN WAN link configuration
message WANLink {
  string name = 1;
  string namespace = 2;
  string site = 3;
  string iface = 4;
  string provider = 5;
  string bandwidth = 6;
  int32 cost = 7;
  string role = 8;
  WANLinkSLA sla = 9;
  WANTunnelEndpoint tunnel_endpoint = 10;
}

message WANLinkSLA {
  int64 max_latency_ms = 1;
  int64 max_jitter_ms = 2;
  double max_packet_loss = 3;
}

message WANTunnelEndpoint {
  string public_ip = 1;
  int32 port = 2;
}

// SD-WAN WAN policy configuration
message WANPolicy {
  string name = 1;
  string namespace = 2;
  WANPolicyMatch match = 3;
  WANPathSelection path_selection = 4;
}

message WANPolicyMatch {
  repeated string hosts = 1;
  repeated string paths = 2;
  map<string, string> headers = 3;
}

message WANPathSelection {
  string strategy = 1;
  bool failover = 2;
  string dscp_class = 3;
}

service ConfigService {
  // StreamConfig streams config snapshots to agents
  // Agents connect and receive initial snapshot, then updates when config changes
  rpc StreamConfig(StreamConfigRequest) returns (stream ConfigSnapshot);

  // ReportStatus allows agents to report their status back to controller
  rpc ReportStatus(AgentStatus) returns (StatusResponse);

  // RequestMeshCertificate allows agents to request a mesh workload certificate
  rpc RequestMeshCertificate(MeshCertificateRequest) returns (MeshCertificateResponse);
  // Introspection RPCs for agent runtime state
  rpc GetAgentConfig(GetConfigRequest) returns (GetConfigResponse);
  rpc GetBackendHealth(GetBackendHealthRequest) returns (GetBackendHealthResponse);
  rpc GetVIPs(GetVIPsRequest) returns (GetVIPsResponse);
}

// StreamConfigRequest is sent by agents to subscribe to config updates
message StreamConfigRequest {
  string node_name = 1;
  string agent_version = 2;
  string last_applied_version = 3;
  // Remote cluster identification (for hub-spoke deployments)
  string cluster_name = 4;     // Name of the remote cluster (empty for local agents)
  string cluster_region = 5;   // Geographic region of the remote cluster
  string cluster_zone = 6;     // Availability zone within the region
  map<string, string> cluster_labels = 7; // Additional labels for the cluster
}

// AgentStatus is sent by agents to report their health and stats
message AgentStatus {
  string node_name = 1;
  string applied_config_version = 2;
  int64 timestamp = 3;
  bool healthy = 4;
  map<string, int64> metrics = 5;
  repeated string errors = 6;
  // Remote cluster identification (for hub-spoke deployments)
  string cluster_name = 7;     // Name of the remote cluster (empty for local agents)

  // Controller connection information (for federation/failover awareness)
  ControllerConnectionInfo controller_connection = 8;
}

// ControllerConnectionInfo contains information about the agent's controller connection
message ControllerConnectionInfo {
  // Name of the currently connected controller
  string connected_controller = 1;

  // Whether this is the primary controller
  bool is_primary = 2;

  // Current failover state
  string failover_state = 3;

  // Time connected to current controller
  int64 connected_since = 4;

  // Number of failovers since agent start
  int32 failover_count = 5;

  // Last known vector clock from current controller
  map<string, int64> last_vector_clock = 6;

  // Whether agent is in autonomous mode
  bool autonomous_mode = 7;

  // Duration in autonomous mode (seconds)
  int64 autonomous_duration_seconds = 8;

  // Latency to current controller (milliseconds)
  int64 controller_latency_ms = 9;

  // Reachability information for agent-assisted quorum
  ControllerReachability reachability = 10;
}

// ControllerReachability reports which controllers the agent can reach
// Used for agent-assisted quorum in 2-datacenter deployments
message ControllerReachability {
  // List of controller names this agent can currently reach
  repeated string reachable_controllers = 1;

  // Latency to each reachable controller (controller name -> milliseconds)
  map<string, int64> controller_latencies = 2;

  // Last time each controller was successfully contacted
  map<string, int64> last_contact_times = 3;

  // Total configured controllers (for quorum calculation)
  int32 total_controllers = 4;
}


// CompressionConfig defines response compression settings
message CompressionConfig {
  bool enabled = 1;
  int64 min_size = 2;            // Minimum body size in bytes (default: 1024)
  int32 level = 3;               // Compression level (gzip: 1-9, brotli: 0-11)
  repeated string algorithms = 4; // Supported algorithms: "gzip", "br"
  repeated string exclude_types = 5; // Content types to skip (e.g., "image/*")
}

// RouteLimitsConfig defines per-route size limits and timeouts
message RouteLimitsConfig {
  int64 max_request_body_size = 1; // Max body size in bytes (413 if exceeded)
  int64 request_timeout_ms = 2;    // Request timeout in ms (504 if exceeded)
  int64 idle_timeout_ms = 3;       // Idle timeout in ms
}

// BufferingConfig defines request/response buffering settings
message BufferingConfig {
  bool request_buffering = 1;     // Buffer entire request body
  bool response_buffering = 2;    // Buffer entire response body
  int64 max_buffer_size = 3;      // Max buffer size in bytes
  int64 memory_threshold = 4;     // Threshold for file-based buffering (default: 1MB)
}

// ClientAuthConfig defines mTLS client authentication configuration
message ClientAuthConfig {
  // Mode: "none", "optional", "require"
  string mode = 1;
  // CA certificate bundle for client certificate verification
  bytes ca_cert = 2;
  // Required CN patterns for client certificates (regex)
  repeated string required_cn_patterns = 3;
  // Required SANs for client certificates
  repeated string required_sans = 4;
}

// ProxyProtocolConfig defines PROXY protocol listener configuration
message ProxyProtocolConfig {
  // Whether PROXY protocol parsing is enabled
  bool enabled = 1;
  // PROXY protocol version to accept (1, 2, or 0 for both)
  int32 version = 2;
  // Trusted source CIDRs (only accept PROXY protocol from these)
  repeated string trusted_cidrs = 3;
}

// UpstreamProxyProtocol defines PROXY protocol config for backend connections
message UpstreamProxyProtocol {
  // Whether to send PROXY protocol header to backends
  bool enabled = 1;
  // PROXY protocol version to send (1 or 2)
  int32 version = 2;
}

// ServiceEndpoints represents endpoints for a service in a remote federated cluster.
// Used for cross-cluster endpoint exchange so that each cluster's ConfigSnapshot
// includes remote endpoints for locality-aware load balancing.
message ServiceEndpoints {
  string service_name = 1;
  string namespace = 2;
  string cluster_name = 3;
  string region = 4;
  string zone = 5;
  repeated Endpoint endpoints = 6;
}

// StatusResponse acknowledges status reports
message StatusResponse {
  bool acknowledged = 1;
}

// Agent introspection messages
message GetConfigRequest {}

message GetConfigResponse {
  string version = 1;
  string generation_time = 2;
  int32 gateway_count = 3;
  int32 route_count = 4;
  int32 cluster_count = 5;
  int32 endpoint_count = 6;
  int32 vip_count = 7;
  int32 policy_count = 8;
}

message GetBackendHealthRequest {}

message BackendHealthInfo {
  string cluster_name = 1;
  string namespace = 2;
  string lb_policy = 3;
  repeated EndpointHealthInfo endpoints = 4;
}

message EndpointHealthInfo {
  string address = 1;
  int32 port = 2;
  bool healthy = 3;
}

message GetBackendHealthResponse {
  repeated BackendHealthInfo backends = 1;
}

message GetVIPsRequest {}

message VIPInfoResponse {
  string name = 1;
  string address = 2;
  string mode = 3;
  bool is_active = 4;
  repeated int32 ports = 5;
}

message GetVIPsResponse {
  repeated VIPInfoResponse vips = 1;
}
