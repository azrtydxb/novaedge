name: E2E Tests

on:
  # E2E tests require a real Kubernetes cluster (kind).
  # Run on schedule and manual dispatch only, not on every PR.
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        k8s-version: ['v1.28.0', 'v1.29.0', 'v1.30.0']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          node_image: kindest/node:${{ matrix.k8s-version }}
          cluster_name: novaedge-e2e
          wait: 120s

      - name: Verify kind cluster
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Label kind nodes
        run: |
          kubectl get nodes -o name | xargs -I{} kubectl label {} novaedge.io/role=edge
          kubectl get nodes --show-labels

      - name: Build Docker images
        run: |
          docker build -t novaedge-controller:latest -f Dockerfile.controller .
          docker build -t novaedge-agent:latest -f Dockerfile.agent .
          docker build -t novaedge-dataplane:latest -f Dockerfile.dataplane .

      - name: Load images into kind
        run: |
          kind load docker-image novaedge-controller:latest --name novaedge-e2e
          kind load docker-image novaedge-agent:latest --name novaedge-e2e
          kind load docker-image novaedge-dataplane:latest --name novaedge-e2e

      - name: Install NovaEdge
        run: |
          helm upgrade --install novaedge ./charts/novaedge \
            --namespace nova-system \
            --create-namespace \
            --set controller.image.repository=novaedge-controller \
            --set controller.image.tag=latest \
            --set controller.image.pullPolicy=Never \
            --set controller.replicaCount=1 \
            --set agent.image.repository=novaedge-agent \
            --set agent.image.tag=latest \
            --set agent.image.pullPolicy=Never \
            --set dataplane.image.repository=novaedge-dataplane \
            --set dataplane.image.tag=latest \
            --set dataplane.image.pullPolicy=Never \
            --set webui.enabled=false \
            --wait \
            --timeout 600s

      - name: Show initial pod status
        run: |
          echo "=== Pods ==="
          kubectl get pods -n nova-system -o wide
          echo "=== DaemonSets ==="
          kubectl get daemonsets -n nova-system
          echo "=== Deployments ==="
          kubectl get deployments -n nova-system

      - name: Wait for pods to be ready
        run: |
          echo "Waiting for controller pods..."
          kubectl wait --for=condition=ready --timeout=300s pod \
            -l app.kubernetes.io/name=novaedge,app.kubernetes.io/component=controller \
            -n nova-system
          echo "Controller pods ready. Waiting for agent pods..."
          kubectl wait --for=condition=ready --timeout=600s pod \
            -l app.kubernetes.io/name=novaedge,app.kubernetes.io/component=agent \
            -n nova-system
          echo "All pods ready."

      - name: Show pod status
        run: |
          kubectl get pods -n nova-system -o wide
          kubectl describe pods -n nova-system

      - name: Run E2E tests
        run: |
          go test -v -tags e2e -timeout=30m ./test/e2e/... -k8s-version=${{ matrix.k8s-version }}

      - name: Collect logs on failure
        if: failure()
        run: |
          mkdir -p logs
          echo "=== Pod status ==="
          kubectl get pods -n nova-system -o wide | tee logs/pod-status.log || true
          echo ""
          echo "=== DaemonSet status ==="
          kubectl get daemonsets -n nova-system -o wide | tee logs/daemonset-status.log || true
          echo ""
          echo "=== Describe DaemonSet ==="
          kubectl describe daemonset -n nova-system | tee logs/daemonset-describe.log || true
          echo ""
          echo "=== Controller logs ==="
          kubectl logs \
            -l app.kubernetes.io/name=novaedge,app.kubernetes.io/component=controller \
            -n nova-system --tail=200 | tee logs/controller.log || true
          echo ""
          echo "=== Agent logs ==="
          kubectl logs \
            -l app.kubernetes.io/name=novaedge,app.kubernetes.io/component=agent \
            -n nova-system --tail=200 | tee logs/agent.log || true
          echo ""
          echo "=== Pod descriptions ==="
          kubectl describe pods -n nova-system | tee logs/pods.log || true
          echo ""
          echo "=== Events ==="
          kubectl get events -n nova-system --sort-by='.lastTimestamp' | tee logs/events.log || true
          echo ""
          echo "=== Node info ==="
          kubectl get nodes -o wide --show-labels | tee logs/nodes.log || true

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs-${{ matrix.k8s-version }}
          path: logs/
          retention-days: 7

  # Basic E2E test without kind (uses envtest)
  # TODO: Re-enable once test/e2e/envtest/ directory and tests are created.
  e2e-envtest:
    name: E2E Tests (envtest)
    runs-on: ubuntu-latest
    if: false  # Disabled: test/e2e/envtest/ directory does not exist yet
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install envtest
        run: |
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest
          setup-envtest use -p env 1.28.0

      - name: Run envtest E2E tests
        run: |
          KUBEBUILDER_ASSETS=$(setup-envtest use -i -p path 1.28.0) \
            go test -v -timeout=30m ./test/e2e/envtest/...

  # Status check
  status-check:
    name: E2E Status Check
    runs-on: ubuntu-latest
    needs: [e2e, e2e-envtest]
    if: always()
    steps:
      - name: Check E2E status
        env:
          E2E_RESULT: ${{ needs.e2e.result }}
          ENVTEST_RESULT: ${{ needs.e2e-envtest.result }}
        run: |
          if [[ "$E2E_RESULT" != "success" && "$E2E_RESULT" != "skipped" ]]; then
            echo "E2E tests failed (status: $E2E_RESULT)"
            exit 1
          fi
          if [[ "$ENVTEST_RESULT" != "success" && "$ENVTEST_RESULT" != "skipped" ]]; then
            echo "Envtest E2E tests failed (status: $ENVTEST_RESULT)"
            exit 1
          fi
          echo "All E2E tests passed"
