name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  checks: write
  security-events: write

jobs:
  # Detect which paths changed to skip irrelevant jobs
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      rust: ${{ steps.filter.outputs.rust }}
      helm: ${{ steps.filter.outputs.helm }}
      docs: ${{ steps.filter.outputs.docs }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
              - '.golangci.yml'
              - 'bpf/**'
            rust:
              - 'dataplane/**'
              - 'Dockerfile.build'
              - 'Dockerfile.dataplane'
            helm:
              - 'charts/**'
              - 'config/crd/**'
            frontend:
              - 'web/**'
              - 'Dockerfile.webui'
            docs:
              - 'docs/**'
              - 'mkdocs.yml'

  # Go code quality checks
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.go == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install eBPF toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends clang llvm libbpf-dev linux-headers-$(uname -r) || \
            sudo apt-get install -y --no-install-recommends clang llvm libbpf-dev
          # Create asm symlink for eBPF compilation on multiarch Ubuntu
          sudo ln -sf /usr/include/x86_64-linux-gnu/asm /usr/include/asm 2>/dev/null || true

      - name: Generate eBPF code (bpf2go)
        run: |
          go generate ./internal/agent/ebpf/conntrack/
          go generate ./internal/agent/ebpf/maglev/
          go generate ./internal/agent/xdplb/
          go generate ./internal/agent/ebpfmesh/
          go generate ./internal/agent/afxdp/

      - name: Verify generated eBPF files are committed
        run: |
          # Only check generated Go files, not .o binaries which vary by clang/llvm version
          if [ -n "$(git diff --name-only -- '*.go')" ]; then
            echo "::error::Generated eBPF Go files are out of date. Run 'go generate ./internal/agent/ebpf/...' on Linux and commit the results."
            git diff --name-only -- '*.go'
            exit 1
          fi

      - name: Run gofmt
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "Code is not formatted. Run 'make fmt'"
            gofmt -s -l .
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10.1
          args: --timeout=10m --new-from-rev=origin/main

      - name: Check go mod tidy
        run: |
          go mod tidy
          if [ -n "$(git status --porcelain go.mod go.sum)" ]; then
            echo "go.mod or go.sum is not tidy. Run 'go mod tidy'"
            git diff go.mod go.sum
            exit 1
          fi

  # Security scanning
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.go == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install eBPF toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends clang llvm libbpf-dev linux-headers-$(uname -r) || \
            sudo apt-get install -y --no-install-recommends clang llvm libbpf-dev
          # Create asm symlink for eBPF compilation on multiarch Ubuntu
          sudo ln -sf /usr/include/x86_64-linux-gnu/asm /usr/include/asm 2>/dev/null || true

      - name: Generate eBPF code (bpf2go)
        run: |
          go generate ./internal/agent/ebpf/conntrack/
          go generate ./internal/agent/ebpf/maglev/
          go generate ./internal/agent/xdplb/
          go generate ./internal/agent/ebpfmesh/
          go generate ./internal/agent/afxdp/

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Check for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Unit tests
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.go == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install eBPF toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends clang llvm libbpf-dev linux-headers-$(uname -r) || \
            sudo apt-get install -y --no-install-recommends clang llvm libbpf-dev
          # Create asm symlink for eBPF compilation on multiarch Ubuntu
          sudo ln -sf /usr/include/x86_64-linux-gnu/asm /usr/include/asm 2>/dev/null || true

      - name: Generate eBPF code (bpf2go)
        run: |
          go generate ./internal/agent/ebpf/conntrack/
          go generate ./internal/agent/ebpf/maglev/
          go generate ./internal/agent/xdplb/
          go generate ./internal/agent/ebpfmesh/
          go generate ./internal/agent/afxdp/

      - name: Run unit tests
        run: |
          ulimit -l unlimited 2>/dev/null || true
          go test -v -race -coverprofile=coverage.out -covermode=atomic ./... 2>&1 | tee test-output.log

      - name: Check for skipped eBPF tests
        if: always()
        run: |
          if grep -q "Skipping: eBPF unavailable" test-output.log 2>/dev/null; then
            echo "::notice::Some eBPF tests were skipped due to insufficient privileges. Run with CAP_BPF/CAP_SYS_ADMIN to execute them."
            echo "### eBPF Tests Skipped" >> $GITHUB_STEP_SUMMARY
            echo "Some eBPF tests were skipped because the CI runner lacks CAP_BPF/CAP_SYS_ADMIN privileges." >> $GITHUB_STEP_SUMMARY
            echo "These tests require a privileged environment to run." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Display coverage
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"
          echo "## Test Coverage: ${COVERAGE}%" >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v6
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # Build verification
  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.go == 'true'
    strategy:
      matrix:
        binary:
          - name: novaedge-controller
            path: ./cmd/novaedge-controller
          - name: novaedge-agent
            path: ./cmd/novaedge-agent
          - name: novactl
            path: ./cmd/novactl
          - name: novaedge-standalone
            path: ./cmd/novaedge-standalone
          - name: novaedge-operator
            path: ./cmd/novaedge-operator
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install eBPF toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends clang llvm libbpf-dev linux-headers-$(uname -r) || \
            sudo apt-get install -y --no-install-recommends clang llvm libbpf-dev
          # Create asm symlink for eBPF compilation on multiarch Ubuntu
          sudo ln -sf /usr/include/x86_64-linux-gnu/asm /usr/include/asm 2>/dev/null || true

      - name: Generate eBPF code (bpf2go)
        run: |
          go generate ./internal/agent/ebpf/conntrack/
          go generate ./internal/agent/ebpf/maglev/
          go generate ./internal/agent/xdplb/
          go generate ./internal/agent/ebpfmesh/
          go generate ./internal/agent/afxdp/

      - name: Build ${{ matrix.binary.name }}
        env:
          CGO_ENABLED: 0
        run: go build -v -ldflags="-s -w" -o bin/${{ matrix.binary.name }} ${{ matrix.binary.path }}

      - name: Upload binary
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.binary.name }}
          path: bin/${{ matrix.binary.name }}
          retention-days: 7

  # Rust dataplane checks
  rust:
    name: Rust
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, clippy, rustfmt
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            dataplane/target
          key: cargo-${{ hashFiles('dataplane/Cargo.lock') }}
      - name: Check formatting
        run: cd dataplane && cargo fmt --all -- --check
      - name: Clippy
        run: cd dataplane && cargo clippy --package novaedge-common --package novaedge-dataplane -- -D warnings
      - name: Test
        run: cd dataplane && cargo test --package novaedge-common --package novaedge-dataplane

  # Helm chart validation
  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.helm == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint novaedge chart
        run: helm lint charts/novaedge

      - name: Lint novaedge-agent chart
        run: helm lint charts/novaedge-agent

      - name: Lint novaedge-operator chart
        run: helm lint charts/novaedge-operator

      - name: Verify CRD sync
        run: |
          echo "Checking charts/novaedge/crds/ matches config/crd/"
          if ! diff -rq config/crd/ charts/novaedge/crds/ > /dev/null 2>&1; then
            echo "CRDs are out of sync between config/crd/ and charts/novaedge/crds/"
            diff -r config/crd/ charts/novaedge/crds/ || true
            exit 1
          fi
          echo "CRDs are in sync"

  # Frontend build validation
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: cd web && pnpm install --frozen-lockfile

      - name: Build frontend
        run: cd web && pnpm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: webui-dist
          path: web/dist/
          retention-days: 7

  # Documentation build validation
  docs:
    name: Docs Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install MkDocs and dependencies
        run: |
          pip install mkdocs-material
          pip install mkdocs-git-revision-date-localized-plugin

      - name: Build documentation (strict mode)
        run: mkdocs build --strict

  # Container image vulnerability scanning
  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.go == 'true'
    strategy:
      matrix:
        image:
          - name: novaedge-controller
            dockerfile: Dockerfile.controller
          - name: novaedge-agent
            dockerfile: Dockerfile.agent
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          tags: ${{ matrix.image.name }}:${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.image.name }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-container-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-container-results.sarif'
          category: 'container-${{ matrix.image.name }}'

  # Status check (all jobs must pass or be skipped)
  status-check:
    name: Status Check
    runs-on: ubuntu-latest
    needs: [lint, security, test, build, rust, helm-lint, frontend-build, docs, container-scan]
    if: always()
    steps:
      - name: Check all jobs status
        env:
          LINT_RESULT: ${{ needs.lint.result }}
          SECURITY_RESULT: ${{ needs.security.result }}
          TEST_RESULT: ${{ needs.test.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          RUST_RESULT: ${{ needs.rust.result }}
          HELM_RESULT: ${{ needs.helm-lint.result }}
          FRONTEND_RESULT: ${{ needs.frontend-build.result }}
          DOCS_RESULT: ${{ needs.docs.result }}
          CONTAINER_SCAN_RESULT: ${{ needs.container-scan.result }}
        run: |
          results=(
            "$LINT_RESULT"
            "$SECURITY_RESULT"
            "$TEST_RESULT"
            "$BUILD_RESULT"
            "$RUST_RESULT"
            "$HELM_RESULT"
            "$FRONTEND_RESULT"
            "$DOCS_RESULT"
            "$CONTAINER_SCAN_RESULT"
          )
          for r in "${results[@]}"; do
            if [[ "$r" != "success" && "$r" != "skipped" ]]; then
              echo "One or more jobs failed (found status: $r)"
              exit 1
            fi
          done
          echo "All jobs passed or were skipped"
