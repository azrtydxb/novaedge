name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write
  security-events: write
  packages: write

env:
  COVERAGE_THRESHOLD: "15"

# =============================================================================
# Phase 1: Code Quality
# =============================================================================
jobs:
  # ---------------------------------------------------------------------------
  # Phase 1 - Change Detection
  # ---------------------------------------------------------------------------
  phase1-changes:
    name: "Phase 1: Detect Changes"
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      rust: ${{ steps.filter.outputs.rust }}
      helm: ${{ steps.filter.outputs.helm }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
              - '.golangci.yml'
              - 'bpf/**'
            rust:
              - 'dataplane/**'
              - 'Dockerfile.build'
              - 'Dockerfile.dataplane'
            helm:
              - 'charts/**'
              - 'config/crd/**'
            frontend:
              - 'web/**'
              - 'Dockerfile.webui'
            docs:
              - 'docs/**'
              - 'mkdocs.yml'

  # ---------------------------------------------------------------------------
  # Phase 1 - Go Lint
  # ---------------------------------------------------------------------------
  phase1-lint-go:
    name: "Phase 1: Go Lint"
    runs-on: ubuntu-latest
    needs: phase1-changes
    if: needs.phase1-changes.outputs.go == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install eBPF toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends clang llvm libbpf-dev build-essential linux-headers-$(uname -r) || \
            sudo apt-get install -y --no-install-recommends clang llvm libbpf-dev build-essential
          # Create asm symlink for eBPF compilation on multiarch Ubuntu
          ARCH_DIR=$(dpkg-architecture -qDEB_HOST_MULTIARCH 2>/dev/null || echo "x86_64-linux-gnu")
          sudo ln -sf /usr/include/${ARCH_DIR}/asm /usr/include/asm 2>/dev/null || true

      - name: Generate eBPF code (bpf2go)
        run: |
          go generate ./internal/agent/ebpf/conntrack/
          go generate ./internal/agent/ebpf/maglev/
          go generate ./internal/agent/xdplb/
          go generate ./internal/agent/ebpfmesh/
          go generate ./internal/agent/afxdp/

      - name: Verify generated eBPF files are committed
        run: |
          # Only check generated Go files, not .o binaries which vary by clang/llvm version
          if [ -n "$(git diff --name-only -- '*.go')" ]; then
            echo "::error::Generated eBPF Go files are out of date. Run 'go generate ./internal/agent/ebpf/...' on Linux and commit the results."
            git diff --name-only -- '*.go'
            exit 1
          fi

      - name: Run gofmt
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "Code is not formatted. Run 'make fmt'"
            gofmt -s -l .
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          args: >-
            --timeout=10m
            ${{ github.event_name == 'pull_request' && '--new-from-rev=origin/main' || '' }}

      - name: Run go vet
        run: go vet ./...

      - name: Check go mod tidy
        run: |
          go mod tidy
          if [ -n "$(git status --porcelain go.mod go.sum)" ]; then
            echo "go.mod or go.sum is not tidy. Run 'go mod tidy'"
            git diff go.mod go.sum
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Phase 1 - Rust Lint
  # ---------------------------------------------------------------------------
  phase1-lint-rust:
    name: "Phase 1: Rust Lint"
    runs-on: ubuntu-latest
    needs: phase1-changes
    if: needs.phase1-changes.outputs.rust == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, clippy, rustfmt

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            dataplane/target
          key: cargo-lint-${{ hashFiles('dataplane/Cargo.lock') }}
          restore-keys: cargo-lint-

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler build-essential

      - name: Check formatting
        run: cd dataplane && cargo fmt --all -- --check

      - name: Clippy
        run: cd dataplane && cargo clippy --package novaedge-common --package novaedge-dataplane -- -D warnings

  # ---------------------------------------------------------------------------
  # Phase 1 - Helm Lint
  # ---------------------------------------------------------------------------
  phase1-lint-helm:
    name: "Phase 1: Helm Lint"
    runs-on: ubuntu-latest
    needs: phase1-changes
    if: needs.phase1-changes.outputs.helm == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint novaedge chart
        run: helm lint charts/novaedge

      - name: Lint novaedge-agent chart
        run: helm lint charts/novaedge-agent

      - name: Lint novaedge-operator chart
        run: helm lint charts/novaedge-operator

      - name: Verify CRD sync
        run: |
          echo "Checking charts/novaedge/crds/ matches config/crd/"
          if ! diff -rq config/crd/ charts/novaedge/crds/ > /dev/null 2>&1; then
            echo "CRDs are out of sync between config/crd/ and charts/novaedge/crds/"
            diff -r config/crd/ charts/novaedge/crds/ || true
            exit 1
          fi
          echo "CRDs are in sync"

  # ---------------------------------------------------------------------------
  # Phase 1 - Frontend Lint
  # ---------------------------------------------------------------------------
  phase1-lint-frontend:
    name: "Phase 1: Frontend Lint"
    runs-on: ubuntu-latest
    needs: phase1-changes
    if: needs.phase1-changes.outputs.frontend == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: cd web && pnpm install --frozen-lockfile

      - name: Run ESLint
        run: cd web && pnpm lint

      - name: TypeScript type check
        run: cd web && npx tsc --noEmit

  # ---------------------------------------------------------------------------
  # Phase 1 - Gate
  # ---------------------------------------------------------------------------
  phase1-gate:
    name: "Phase 1 Gate: Code Quality"
    runs-on: ubuntu-latest
    needs: [phase1-changes, phase1-lint-go, phase1-lint-rust, phase1-lint-helm, phase1-lint-frontend]
    if: always()
    steps:
      - name: Check phase 1 results
        env:
          CHANGES_RESULT: ${{ needs.phase1-changes.result }}
          GO_RESULT: ${{ needs.phase1-lint-go.result }}
          RUST_RESULT: ${{ needs.phase1-lint-rust.result }}
          HELM_RESULT: ${{ needs.phase1-lint-helm.result }}
          FRONTEND_RESULT: ${{ needs.phase1-lint-frontend.result }}
        run: |
          results=("$CHANGES_RESULT" "$GO_RESULT" "$RUST_RESULT" "$HELM_RESULT" "$FRONTEND_RESULT")
          for r in "${results[@]}"; do
            if [[ "$r" != "success" && "$r" != "skipped" ]]; then
              echo "::error::Phase 1 (Code Quality) failed — found status: $r"
              exit 1
            fi
          done
          echo "Phase 1 (Code Quality) passed"

  # =============================================================================
  # Phase 2: Compliance
  # =============================================================================

  # ---------------------------------------------------------------------------
  # Phase 2 - Documentation Build
  # ---------------------------------------------------------------------------
  phase2-docs:
    name: "Phase 2: Documentation Build"
    runs-on: ubuntu-latest
    needs: phase1-gate
    if: ${{ !cancelled() && needs.phase1-gate.result == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install MkDocs and dependencies
        run: |
          pip install mkdocs-material
          pip install mkdocs-git-revision-date-localized-plugin

      - name: Build documentation (strict mode)
        run: mkdocs build --strict

  # ---------------------------------------------------------------------------
  # Phase 2 - Documentation Freshness
  # ---------------------------------------------------------------------------
  phase2-docs-freshness:
    name: "Phase 2: Documentation Freshness"
    runs-on: ubuntu-latest
    needs: phase1-gate
    if: ${{ !cancelled() && needs.phase1-gate.result == 'success' && github.event_name == 'pull_request' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check documentation freshness
        run: |
          CODE_CHANGED=$(git diff --name-only origin/main...HEAD -- '*.go' 'cmd/' 'internal/' 'api/' 'dataplane/' 'web/' | wc -l)
          DOCS_CHANGED=$(git diff --name-only origin/main...HEAD -- 'docs/' 'mkdocs.yml' | wc -l)
          if [ "$CODE_CHANGED" -gt 0 ] && [ "$DOCS_CHANGED" -eq 0 ]; then
            echo "::error::Code changed but no documentation updates. Update docs/ before merging."
            exit 1
          fi
          echo "Documentation freshness check passed (code changes: $CODE_CHANGED, docs changes: $DOCS_CHANGED)"

  # ---------------------------------------------------------------------------
  # Phase 2 - Security
  # ---------------------------------------------------------------------------
  phase2-security:
    name: "Phase 2: Security Scan"
    runs-on: ubuntu-latest
    needs: phase1-gate
    if: ${{ !cancelled() && needs.phase1-gate.result == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install eBPF toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends clang llvm libbpf-dev build-essential linux-headers-$(uname -r) || \
            sudo apt-get install -y --no-install-recommends clang llvm libbpf-dev build-essential
          ARCH_DIR=$(dpkg-architecture -qDEB_HOST_MULTIARCH 2>/dev/null || echo "x86_64-linux-gnu")
          sudo ln -sf /usr/include/${ARCH_DIR}/asm /usr/include/asm 2>/dev/null || true

      - name: Generate eBPF code (bpf2go)
        run: |
          go generate ./internal/agent/ebpf/conntrack/
          go generate ./internal/agent/ebpf/maglev/
          go generate ./internal/agent/xdplb/
          go generate ./internal/agent/ebpfmesh/
          go generate ./internal/agent/afxdp/

      - name: Run govulncheck
        run: |
          GOTOOLCHAIN=auto go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Check for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Phase 2 - Gate
  # ---------------------------------------------------------------------------
  phase2-gate:
    name: "Phase 2 Gate: Compliance"
    runs-on: ubuntu-latest
    needs: [phase1-gate, phase2-docs, phase2-docs-freshness, phase2-security]
    if: always()
    steps:
      - name: Check phase 2 results
        env:
          PHASE1_GATE: ${{ needs.phase1-gate.result }}
          DOCS_RESULT: ${{ needs.phase2-docs.result }}
          FRESHNESS_RESULT: ${{ needs.phase2-docs-freshness.result }}
          SECURITY_RESULT: ${{ needs.phase2-security.result }}
        run: |
          # Verify previous gate passed
          PHASE1_GATE="${{ needs.phase1-gate.result }}"
          if [[ "$PHASE1_GATE" != "success" ]]; then
            echo "::error::Phase 1 gate did not pass (status: $PHASE1_GATE)"
            exit 1
          fi

          results=("$DOCS_RESULT" "$FRESHNESS_RESULT" "$SECURITY_RESULT")
          for r in "${results[@]}"; do
            if [[ "$r" != "success" && "$r" != "skipped" ]]; then
              echo "::error::Phase 2 (Compliance) failed — found status: $r"
              exit 1
            fi
          done
          echo "Phase 2 (Compliance) passed"

  # =============================================================================
  # Phase 3: Unit Testing
  # =============================================================================

  # ---------------------------------------------------------------------------
  # Phase 3 - Go Unit Tests
  # ---------------------------------------------------------------------------
  phase3-test-go:
    name: "Phase 3: Go Unit Tests"
    runs-on: ubuntu-latest
    needs: phase2-gate
    if: ${{ !cancelled() && needs.phase2-gate.result == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install eBPF toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends clang llvm libbpf-dev build-essential linux-headers-$(uname -r) || \
            sudo apt-get install -y --no-install-recommends clang llvm libbpf-dev build-essential
          ARCH_DIR=$(dpkg-architecture -qDEB_HOST_MULTIARCH 2>/dev/null || echo "x86_64-linux-gnu")
          sudo ln -sf /usr/include/${ARCH_DIR}/asm /usr/include/asm 2>/dev/null || true

      - name: Generate eBPF code (bpf2go)
        run: |
          go generate ./internal/agent/ebpf/conntrack/
          go generate ./internal/agent/ebpf/maglev/
          go generate ./internal/agent/xdplb/
          go generate ./internal/agent/ebpfmesh/
          go generate ./internal/agent/afxdp/

      - name: Install gotestsum
        run: GOTOOLCHAIN=auto go install gotest.tools/gotestsum@latest

      - name: Run unit tests
        run: |
          ulimit -l unlimited 2>/dev/null || true
          gotestsum \
            --junitfile go-test-results.xml \
            --format pkgname \
            -- -race -timeout=10m -coverprofile=coverage.out -covermode=atomic ./...

      - name: Check for skipped eBPF tests
        if: always()
        run: |
          if grep -q "Skipping: eBPF unavailable" go-test-results.xml 2>/dev/null; then
            echo "::notice::Some eBPF tests were skipped due to insufficient privileges. Run with CAP_BPF/CAP_SYS_ADMIN to execute them."
            echo "### eBPF Tests Skipped" >> $GITHUB_STEP_SUMMARY
            echo "Some eBPF tests were skipped because the CI runner lacks CAP_BPF/CAP_SYS_ADMIN privileges." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"
          echo "## Test Coverage: ${COVERAGE}%" >> $GITHUB_STEP_SUMMARY
          THRESHOLD=${{ env.COVERAGE_THRESHOLD }}
          if awk "BEGIN {exit !($COVERAGE < $THRESHOLD)}"; then
            echo "::error::Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
            exit 1
          fi
          echo "Coverage ${COVERAGE}% meets threshold ${THRESHOLD}%"

      - name: Upload test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: "Phase 3: Go Test Results"
          path: go-test-results.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage.out
          retention-days: 7

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ---------------------------------------------------------------------------
  # Phase 3 - Rust Unit Tests
  # ---------------------------------------------------------------------------
  phase3-test-rust:
    name: "Phase 3: Rust Unit Tests"
    runs-on: ubuntu-latest
    needs: [phase1-changes, phase2-gate]
    if: ${{ !cancelled() && needs.phase2-gate.result == 'success' && needs.phase1-changes.outputs.rust == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            dataplane/target
          key: cargo-test-${{ hashFiles('dataplane/Cargo.lock') }}
          restore-keys: cargo-test-

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential protobuf-compiler

      - name: Install cargo-nextest
        run: cargo install cargo-nextest --locked

      - name: Run tests with nextest
        run: |
          cd dataplane
          cargo nextest run \
            --profile ci \
            --package novaedge-common \
            --package novaedge-dataplane

      - name: Upload test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: "Phase 3: Rust Test Results"
          path: dataplane/rust-test-results.xml
          reporter: java-junit
          fail-on-error: false

  # ---------------------------------------------------------------------------
  # Phase 3 - Frontend Tests
  # ---------------------------------------------------------------------------
  phase3-test-frontend:
    name: "Phase 3: Frontend Tests"
    runs-on: ubuntu-latest
    needs: [phase1-changes, phase2-gate]
    if: ${{ !cancelled() && needs.phase2-gate.result == 'success' && needs.phase1-changes.outputs.frontend == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: cd web && pnpm install --frozen-lockfile

      - name: Check for test files and run tests
        run: |
          cd web
          TEST_FILES=$(find src -name '*.test.*' -o -name '*.spec.*' 2>/dev/null | wc -l)
          if [ "$TEST_FILES" -gt 0 ]; then
            echo "Found $TEST_FILES test files, running vitest..."
            pnpm exec vitest run --reporter=junit --outputFile=frontend-test-results.xml
          else
            echo "::notice::No test files found in web/src/. Skipping frontend tests."
            echo "No frontend test files found — skipping." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: "Phase 3: Frontend Test Results"
          path: web/frontend-test-results.xml
          reporter: java-junit
          fail-on-error: false
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Phase 3 - Gate
  # ---------------------------------------------------------------------------
  phase3-gate:
    name: "Phase 3 Gate: Unit Testing"
    runs-on: ubuntu-latest
    needs: [phase2-gate, phase3-test-go, phase3-test-rust, phase3-test-frontend]
    if: always()
    steps:
      - name: Check phase 3 results
        env:
          PHASE2_GATE: ${{ needs.phase2-gate.result }}
          GO_RESULT: ${{ needs.phase3-test-go.result }}
          RUST_RESULT: ${{ needs.phase3-test-rust.result }}
          FRONTEND_RESULT: ${{ needs.phase3-test-frontend.result }}
        run: |
          # Verify previous gate passed
          PHASE2_GATE="${{ needs.phase2-gate.result }}"
          if [[ "$PHASE2_GATE" != "success" ]]; then
            echo "::error::Phase 2 gate did not pass (status: $PHASE2_GATE)"
            exit 1
          fi

          results=("$GO_RESULT" "$RUST_RESULT" "$FRONTEND_RESULT")
          for r in "${results[@]}"; do
            if [[ "$r" != "success" && "$r" != "skipped" ]]; then
              echo "::error::Phase 3 (Unit Testing) failed — found status: $r"
              exit 1
            fi
          done
          echo "Phase 3 (Unit Testing) passed"

  # =============================================================================
  # Phase 4: Building
  # =============================================================================

  # ---------------------------------------------------------------------------
  # Phase 4 - Build Go Binaries
  # ---------------------------------------------------------------------------
  phase4-build-go:
    name: "Phase 4: Build ${{ matrix.binary.name }}"
    runs-on: ubuntu-latest
    needs: phase3-gate
    if: ${{ !cancelled() && needs.phase3-gate.result == 'success' }}
    strategy:
      matrix:
        binary:
          - name: novaedge-controller
            path: ./cmd/novaedge-controller
          - name: novaedge-agent
            path: ./cmd/novaedge-agent
          - name: novactl
            path: ./cmd/novactl
          - name: novaedge-standalone
            path: ./cmd/novaedge-standalone
          - name: novaedge-operator
            path: ./cmd/novaedge-operator
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install eBPF toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends clang llvm libbpf-dev build-essential linux-headers-$(uname -r) || \
            sudo apt-get install -y --no-install-recommends clang llvm libbpf-dev build-essential
          ARCH_DIR=$(dpkg-architecture -qDEB_HOST_MULTIARCH 2>/dev/null || echo "x86_64-linux-gnu")
          sudo ln -sf /usr/include/${ARCH_DIR}/asm /usr/include/asm 2>/dev/null || true

      - name: Generate eBPF code (bpf2go)
        run: |
          go generate ./internal/agent/ebpf/conntrack/
          go generate ./internal/agent/ebpf/maglev/
          go generate ./internal/agent/xdplb/
          go generate ./internal/agent/ebpfmesh/
          go generate ./internal/agent/afxdp/

      - name: Build ${{ matrix.binary.name }}
        env:
          CGO_ENABLED: 0
        run: go build -v -ldflags="-s -w" -o bin/${{ matrix.binary.name }} ${{ matrix.binary.path }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary.name }}
          path: bin/${{ matrix.binary.name }}
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Phase 4 - Build Rust Dataplane
  # ---------------------------------------------------------------------------
  phase4-build-rust:
    name: "Phase 4: Build Rust Dataplane"
    runs-on: ubuntu-latest
    needs: [phase1-changes, phase3-gate]
    if: ${{ !cancelled() && needs.phase3-gate.result == 'success' && needs.phase1-changes.outputs.rust == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build dataplane image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.dataplane
          tags: novaedge-dataplane:build-test
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Phase 4 - Build Frontend
  # ---------------------------------------------------------------------------
  phase4-build-frontend:
    name: "Phase 4: Build Frontend"
    runs-on: ubuntu-latest
    needs: [phase1-changes, phase3-gate]
    if: ${{ !cancelled() && needs.phase3-gate.result == 'success' && needs.phase1-changes.outputs.frontend == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: cd web && pnpm install --frozen-lockfile

      - name: Build frontend
        run: cd web && pnpm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: webui-dist
          path: web/dist/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Phase 4 - Docker Build Test + Container Scan
  # ---------------------------------------------------------------------------
  phase4-docker-test:
    name: "Phase 4: Docker Test ${{ matrix.image.name }}"
    runs-on: ubuntu-latest
    needs: [phase4-build-go]
    strategy:
      matrix:
        image:
          - name: novaedge-controller
            dockerfile: Dockerfile.controller
          - name: novaedge-agent
            dockerfile: Dockerfile.agent
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          tags: ${{ matrix.image.name }}:${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Phase 4 - Gate
  # ---------------------------------------------------------------------------
  phase4-gate:
    name: "Phase 4 Gate: Building"
    runs-on: ubuntu-latest
    needs: [phase3-gate, phase4-build-go, phase4-build-rust, phase4-build-frontend, phase4-docker-test]
    if: always()
    steps:
      - name: Check phase 4 results
        env:
          PHASE3_GATE: ${{ needs.phase3-gate.result }}
          GO_BUILD_RESULT: ${{ needs.phase4-build-go.result }}
          RUST_BUILD_RESULT: ${{ needs.phase4-build-rust.result }}
          FRONTEND_BUILD_RESULT: ${{ needs.phase4-build-frontend.result }}
          DOCKER_TEST_RESULT: ${{ needs.phase4-docker-test.result }}
        run: |
          # Verify previous gate passed
          PHASE3_GATE="${{ needs.phase3-gate.result }}"
          if [[ "$PHASE3_GATE" != "success" ]]; then
            echo "::error::Phase 3 gate did not pass (status: $PHASE3_GATE)"
            exit 1
          fi

          results=("$GO_BUILD_RESULT" "$RUST_BUILD_RESULT" "$FRONTEND_BUILD_RESULT" "$DOCKER_TEST_RESULT")
          for r in "${results[@]}"; do
            if [[ "$r" != "success" && "$r" != "skipped" ]]; then
              echo "::error::Phase 4 (Building) failed — found status: $r"
              exit 1
            fi
          done
          echo "Phase 4 (Building) passed"

  # =============================================================================
  # Phase 5: Deployment
  # =============================================================================

  # ---------------------------------------------------------------------------
  # Phase 5 - Push Container Images
  # ---------------------------------------------------------------------------
  phase5-push:
    name: "Phase 5: Push ${{ matrix.image.name }}"
    runs-on: ubuntu-latest
    needs: phase4-gate
    if: ${{ !cancelled() && needs.phase4-gate.result == 'success' && github.ref == 'refs/heads/main' && github.event_name == 'push' }}
    permissions:
      contents: write
      packages: write
    strategy:
      matrix:
        image:
          - name: novaedge-controller
            registry_path: novaedge-controller
            dockerfile: Dockerfile.controller
          - name: novaedge-agent
            registry_path: novaedge-agent
            dockerfile: Dockerfile.agent
          - name: novaedge-operator
            registry_path: novaedge-operator
            dockerfile: Dockerfile.operator
          - name: novaedge-dataplane
            registry_path: novaedge/novaedge-dataplane
            dockerfile: Dockerfile.dataplane
          - name: novaedge-webui
            registry_path: novaedge-webui
            dockerfile: Dockerfile.webui
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.image.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: |
            ghcr.io/piwi3910/${{ matrix.image.registry_path }}:sha-${{ github.sha }}
            ghcr.io/piwi3910/${{ matrix.image.registry_path }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger CT pipeline
        if: success()
        uses: peter-evans/repository-dispatch@v3
        with:
          event-type: deployment-complete

  # =============================================================================
  # Status Check
  # =============================================================================
  status-check:
    name: Status Check
    runs-on: ubuntu-latest
    needs: phase4-gate
    if: always()
    steps:
      - name: Check pipeline status
        env:
          PHASE4_RESULT: ${{ needs.phase4-gate.result }}
        run: |
          if [[ "$PHASE4_RESULT" != "success" ]]; then
            echo "::error::CI pipeline failed at phase 4 gate (status: $PHASE4_RESULT)"
            exit 1
          fi
          echo "CI pipeline passed all phases"
