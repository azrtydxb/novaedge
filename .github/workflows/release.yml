name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  # Build multi-arch binaries
  build-binaries:
    name: Build Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
        binary:
          - name: novaedge-controller
            path: ./cmd/novaedge-controller
          - name: novaedge-agent
            path: ./cmd/novaedge-agent
          - name: novactl
            path: ./cmd/novactl
          - name: novaedge-standalone
            path: ./cmd/novaedge-standalone
          - name: novaedge-operator
            path: ./cmd/novaedge-operator
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build binary
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          BINARY_NAME: ${{ matrix.binary.name }}
          BINARY_PATH: ${{ matrix.binary.path }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="${GITHUB_SHA::8}"
          DATE="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          go build -trimpath \
            -ldflags="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}" \
            -o "${BINARY_NAME}-linux-${GOARCH}" \
            "${BINARY_PATH}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.binary.name }}-linux-${{ matrix.arch }}
          path: ${{ matrix.binary.name }}-linux-${{ matrix.arch }}
          retention-days: 1

  # Build frontend natively (avoids QEMU segfault for arm64)
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: cd web && pnpm install --frozen-lockfile

      - name: Build frontend
        run: cd web && pnpm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v6
        with:
          name: webui-dist
          path: web/dist/
          retention-days: 1

  # Create GitHub Release with all binaries
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: '*-linux-*'

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            cp "${dir}"* release/
          done
          chmod +x release/*
          cd release
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
          fail_on_unmatched_files: true

  # Build and push multi-arch Go Docker images
  docker:
    name: Docker Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - name: novaedge-controller
            dockerfile: Dockerfile.controller
          - name: novaedge-agent
            dockerfile: Dockerfile.agent
          - name: novactl
            dockerfile: Dockerfile.novactl
          - name: novaedge-standalone
            dockerfile: Dockerfile.standalone
          - name: novaedge-operator
            dockerfile: Dockerfile.operator
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.image.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Build and push multi-arch webui Docker image (uses pre-built frontend)
  docker-webui:
    name: Docker WebUI Image
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: webui-dist
          path: web/dist/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/novaedge-webui
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: web/
          file: Dockerfile.webui.release
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Generate SBOM for release artifacts
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: [build-binaries, release]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json
          artifact-name: novaedge-sbom

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v6
        with:
          name: sbom
          path: sbom.spdx.json
          retention-days: 90

      - name: Upload SBOM to release
        uses: softprops/action-gh-release@v2
        with:
          files: sbom.spdx.json

  # Sign container images with cosign
  sign-images:
    name: Sign Container Images
    runs-on: ubuntu-latest
    needs: [docker, docker-webui]
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign images
        env:
          COSIGN_EXPERIMENTAL: true
          IMAGES: novaedge-controller novaedge-agent novactl novaedge-standalone novaedge-operator novaedge-webui
        run: |
          for image in $IMAGES; do
            echo "Signing ${IMAGE_PREFIX}/${image}:${GITHUB_REF_NAME}"
            cosign sign --yes "${IMAGE_PREFIX}/${image}:${GITHUB_REF_NAME}" || true
          done
