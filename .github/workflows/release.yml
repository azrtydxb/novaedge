name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  # Build multi-arch binaries
  build-binaries:
    name: Build Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
        binary:
          - name: novaedge-controller
            path: ./cmd/novaedge-controller
          - name: novaedge-agent
            path: ./cmd/novaedge-agent
          - name: novactl
            path: ./cmd/novactl
          - name: novaedge-standalone
            path: ./cmd/novaedge-standalone
          - name: novaedge-operator
            path: ./cmd/novaedge-operator
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build binary
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          BINARY_NAME: ${{ matrix.binary.name }}
          BINARY_PATH: ${{ matrix.binary.path }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="${GITHUB_SHA::8}"
          DATE="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          go build -trimpath \
            -ldflags="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}" \
            -o "${BINARY_NAME}-linux-${GOARCH}" \
            "${BINARY_PATH}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary.name }}-linux-${{ matrix.arch }}
          path: ${{ matrix.binary.name }}-linux-${{ matrix.arch }}
          retention-days: 1

  # Create GitHub Release with all binaries
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            cp "${dir}"* release/
          done
          chmod +x release/*
          cd release
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
          fail_on_unmatched_files: true

  # Build and push multi-arch Docker images
  docker:
    name: Docker Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - name: novaedge-controller
            dockerfile: Dockerfile.controller
          - name: novaedge-agent
            dockerfile: Dockerfile.agent
          - name: novactl
            dockerfile: Dockerfile.novactl
          - name: novaedge-standalone
            dockerfile: Dockerfile.standalone
          - name: novaedge-operator
            dockerfile: Dockerfile.operator
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.image.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
