name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/novaedge

jobs:
  # Build multi-arch binaries
  build-binaries:
    name: Build Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
        binary:
          - name: novaedge-controller
            path: ./cmd/novaedge-controller
          - name: novaedge-agent
            path: ./cmd/novaedge-agent
          - name: novactl
            path: ./cmd/novactl
          - name: novaedge-standalone
            path: ./cmd/novaedge-standalone
          - name: novaedge-operator
            path: ./cmd/novaedge-operator
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build binary
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          BINARY_NAME: ${{ matrix.binary.name }}
          BINARY_PATH: ${{ matrix.binary.path }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="${GITHUB_SHA::8}"
          DATE="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          go build -trimpath \
            -ldflags="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}" \
            -o "${BINARY_NAME}-linux-${GOARCH}" \
            "${BINARY_PATH}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: ${{ matrix.binary.name }}-linux-${{ matrix.arch }}
          path: ${{ matrix.binary.name }}-linux-${{ matrix.arch }}
          retention-days: 1

  # Build frontend natively (avoids QEMU segfault for arm64)
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c # v4
        with:
          version: latest

      - name: Install dependencies
        run: cd web && pnpm install --frozen-lockfile

      - name: Build frontend
        run: cd web && pnpm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: webui-dist
          path: web/dist/
          retention-days: 1

  # Create GitHub Release with all binaries
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Download binary artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          pattern: '*-linux-*'

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            cp "${dir}"* release/
          done
          chmod +x release/*
          cd release
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          generate_release_notes: true
          files: release/*
          fail_on_unmatched_files: true

  # Build and push per-arch Go Docker images
  docker:
    name: "Docker ${{ matrix.image.name }} (${{ matrix.arch.name }})"
    runs-on: ${{ matrix.arch.runner }}
    strategy:
      fail-fast: false
      matrix:
        arch:
          - name: amd64
            runner: qnap-nas
          - name: arm64
            runner: ubuntu-24.04-arm
        image:
          - name: novaedge-controller
            dockerfile: Dockerfile.controller
          - name: novaedge-agent
            dockerfile: Dockerfile.agent
          - name: novactl
            dockerfile: Dockerfile.novactl
          - name: novaedge-standalone
            dockerfile: Dockerfile.standalone
          - name: novaedge-operator
            dockerfile: Dockerfile.operator
          - name: novaedge-dataplane
            dockerfile: Dockerfile.dataplane
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/${{ matrix.arch.name }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image.name }}:${{ steps.version.outputs.version }}-${{ matrix.arch.name }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image.name }}:latest-${{ matrix.arch.name }}
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

  # Create multi-arch manifests for Go Docker images
  docker-manifest:
    name: "Docker Manifest ${{ matrix.image }}"
    runs-on: ubuntu-latest
    needs: docker
    strategy:
      fail-fast: false
      matrix:
        image:
          - novaedge-controller
          - novaedge-agent
          - novactl
          - novaedge-standalone
          - novaedge-operator
          - novaedge-dataplane
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Create and push versioned manifest
        run: |
          docker manifest create ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ steps.version.outputs.version }} \
            --amend ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ steps.version.outputs.version }}-amd64 \
            --amend ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ steps.version.outputs.version }}-arm64
          docker manifest push ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ steps.version.outputs.version }}

      - name: Create and push major.minor manifest
        run: |
          # Extract major.minor from version (e.g., v1.2.3 -> v1.2)
          MAJOR_MINOR=$(echo "${{ steps.version.outputs.version }}" | sed 's/\.[0-9]*$//')
          docker manifest create ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${MAJOR_MINOR} \
            --amend ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ steps.version.outputs.version }}-amd64 \
            --amend ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ steps.version.outputs.version }}-arm64
          docker manifest push ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${MAJOR_MINOR}

      - name: Create and push latest manifest
        run: |
          docker manifest create ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:latest \
            --amend ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:latest-amd64 \
            --amend ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:latest-arm64
          docker manifest push ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:latest

  # Build and push per-arch webui Docker image (uses pre-built frontend)
  docker-webui:
    name: "Docker WebUI (${{ matrix.arch.name }})"
    runs-on: ${{ matrix.arch.runner }}
    needs: build-frontend
    strategy:
      fail-fast: false
      matrix:
        arch:
          - name: amd64
            runner: qnap-nas
          - name: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download frontend artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: webui-dist
          path: web/dist/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: web/
          file: Dockerfile.webui.release
          platforms: linux/${{ matrix.arch.name }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/novaedge-webui:${{ steps.version.outputs.version }}-${{ matrix.arch.name }}
            ${{ env.IMAGE_PREFIX }}/novaedge-webui:latest-${{ matrix.arch.name }}
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

  # Create multi-arch manifest for webui Docker image
  docker-webui-manifest:
    name: "Docker Manifest novaedge-webui"
    runs-on: ubuntu-latest
    needs: docker-webui
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Create and push versioned manifest
        run: |
          docker manifest create ${{ env.IMAGE_PREFIX }}/novaedge-webui:${{ steps.version.outputs.version }} \
            --amend ${{ env.IMAGE_PREFIX }}/novaedge-webui:${{ steps.version.outputs.version }}-amd64 \
            --amend ${{ env.IMAGE_PREFIX }}/novaedge-webui:${{ steps.version.outputs.version }}-arm64
          docker manifest push ${{ env.IMAGE_PREFIX }}/novaedge-webui:${{ steps.version.outputs.version }}

      - name: Create and push major.minor manifest
        run: |
          MAJOR_MINOR=$(echo "${{ steps.version.outputs.version }}" | sed 's/\.[0-9]*$//')
          docker manifest create ${{ env.IMAGE_PREFIX }}/novaedge-webui:${MAJOR_MINOR} \
            --amend ${{ env.IMAGE_PREFIX }}/novaedge-webui:${{ steps.version.outputs.version }}-amd64 \
            --amend ${{ env.IMAGE_PREFIX }}/novaedge-webui:${{ steps.version.outputs.version }}-arm64
          docker manifest push ${{ env.IMAGE_PREFIX }}/novaedge-webui:${MAJOR_MINOR}

      - name: Create and push latest manifest
        run: |
          docker manifest create ${{ env.IMAGE_PREFIX }}/novaedge-webui:latest \
            --amend ${{ env.IMAGE_PREFIX }}/novaedge-webui:latest-amd64 \
            --amend ${{ env.IMAGE_PREFIX }}/novaedge-webui:latest-arm64
          docker manifest push ${{ env.IMAGE_PREFIX }}/novaedge-webui:latest

  # Generate SBOM for release artifacts
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: [build-binaries, release]
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Generate SBOM
        uses: anchore/sbom-action@57aae528053a48a3f6235f2d9461b05fbcb7366d # v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json
          artifact-name: novaedge-sbom

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom
          path: sbom.spdx.json
          retention-days: 90

      - name: Upload SBOM to release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          files: sbom.spdx.json

  # Sign container images with cosign
  sign-images:
    name: Sign Container Images
    runs-on: ubuntu-latest
    needs: [docker-manifest, docker-webui-manifest]
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9 # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign images
        env:
          COSIGN_EXPERIMENTAL: true
          IMAGES: novaedge-controller novaedge-agent novactl novaedge-standalone novaedge-operator novaedge-webui novaedge-dataplane
        run: |
          for image in $IMAGES; do
            echo "Signing ${IMAGE_PREFIX}/${image}:${GITHUB_REF_NAME}"
            cosign sign --yes "${IMAGE_PREFIX}/${image}:${GITHUB_REF_NAME}" || true
          done
