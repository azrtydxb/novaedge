name: Nightly Build

on:
  schedule:
    # Run at midnight UTC daily
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  # Build multi-arch binaries
  build-binaries:
    name: Build Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
        binary:
          - name: novaedge-controller
            path: ./cmd/novaedge-controller
          - name: novaedge-agent
            path: ./cmd/novaedge-agent
          - name: novactl
            path: ./cmd/novactl
          - name: novaedge-standalone
            path: ./cmd/novaedge-standalone
          - name: novaedge-operator
            path: ./cmd/novaedge-operator
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build binary
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          BINARY_NAME: ${{ matrix.binary.name }}
          BINARY_PATH: ${{ matrix.binary.path }}
        run: |
          VERSION="nightly-$(date -u '+%Y%m%d')"
          COMMIT="${GITHUB_SHA::8}"
          DATE="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          go build -trimpath \
            -ldflags="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}" \
            -o "${BINARY_NAME}-linux-${GOARCH}" \
            "${BINARY_PATH}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary.name }}-linux-${{ matrix.arch }}
          path: ${{ matrix.binary.name }}-linux-${{ matrix.arch }}
          retention-days: 1

  # Create or update nightly pre-release
  nightly-release:
    name: Update Nightly Release
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            cp "${dir}"* release/
          done
          chmod +x release/*
          cd release
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Delete existing nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete nightly --yes --cleanup-tag 2>/dev/null || true

      - name: Generate changelog and create nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE="$(date -u '+%Y-%m-%d %H:%M UTC')"
          SHORT_SHA="${GITHUB_SHA::8}"

          # Find the latest stable release tag
          LAST_TAG="$(git describe --tags --match 'v*' --abbrev=0 2>/dev/null || echo '')"

          NOTES_FILE="$(mktemp)"

          {
            echo "Automated nightly build from main branch."
            echo ""
            echo "**Commit:** ${SHORT_SHA}"
            echo "**Date:** ${DATE}"
            echo ""

            if [ -n "${LAST_TAG}" ]; then
              echo "## Changes since ${LAST_TAG}"
              echo ""

              # Collect commits since last tag
              COMMITS="$(git log "${LAST_TAG}..HEAD" --pretty=format:'%s' --no-merges)"

              # Category arrays
              FEATURES=""
              FIXES=""
              PERFORMANCE=""
              SECURITY=""
              TESTS=""
              DOCS=""
              CHORES=""
              REFACTORS=""
              OTHER=""

              while IFS= read -r line; do
                [ -z "${line}" ] && continue
                case "${line}" in
                  \[Feature\]*)  FEATURES="${FEATURES}
          - ${line#\[Feature\] }" ;;
                  \[Fix\]*)      FIXES="${FIXES}
          - ${line#\[Fix\] }" ;;
                  \[Performance\]*) PERFORMANCE="${PERFORMANCE}
          - ${line#\[Performance\] }" ;;
                  \[Security\]*) SECURITY="${SECURITY}
          - ${line#\[Security\] }" ;;
                  \[Test\]*)     TESTS="${TESTS}
          - ${line#\[Test\] }" ;;
                  \[Docs\]*)     DOCS="${DOCS}
          - ${line#\[Docs\] }" ;;
                  \[Chore\]*)    CHORES="${CHORES}
          - ${line#\[Chore\] }" ;;
                  \[Refactor\]*) REFACTORS="${REFACTORS}
          - ${line#\[Refactor\] }" ;;
                  *)             OTHER="${OTHER}
          - ${line}" ;;
                esac
              done <<< "${COMMITS}"

              [ -n "${FEATURES}" ]    && printf '### Features\n%s\n\n' "${FEATURES}"
              [ -n "${FIXES}" ]       && printf '### Bug Fixes\n%s\n\n' "${FIXES}"
              [ -n "${PERFORMANCE}" ] && printf '### Performance\n%s\n\n' "${PERFORMANCE}"
              [ -n "${SECURITY}" ]    && printf '### Security\n%s\n\n' "${SECURITY}"
              [ -n "${REFACTORS}" ]   && printf '### Refactoring\n%s\n\n' "${REFACTORS}"
              [ -n "${TESTS}" ]       && printf '### Tests\n%s\n\n' "${TESTS}"
              [ -n "${DOCS}" ]        && printf '### Documentation\n%s\n\n' "${DOCS}"
              [ -n "${CHORES}" ]      && printf '### Chores\n%s\n\n' "${CHORES}"
              [ -n "${OTHER}" ]       && printf '### Other\n%s\n\n' "${OTHER}"
            fi

            echo "> These builds are from the latest main branch and may be unstable."
            echo "> For stable releases, use a versioned tag."
          } > "${NOTES_FILE}"

          gh release create nightly \
            --title "Nightly Build (${DATE})" \
            --notes-file "${NOTES_FILE}" \
            --prerelease \
            --target main \
            release/*

          rm -f "${NOTES_FILE}"

  # Build and push multi-arch Docker images
  docker:
    name: Docker Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - name: novaedge-controller
            dockerfile: Dockerfile.controller
          - name: novaedge-agent
            dockerfile: Dockerfile.agent
          - name: novactl
            dockerfile: Dockerfile.novactl
          - name: novaedge-standalone
            dockerfile: Dockerfile.standalone
          - name: novaedge-operator
            dockerfile: Dockerfile.operator
          - name: novaedge-webui
            dockerfile: Dockerfile.webui
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/${{ matrix.image.name }}:nightly
          build-args: |
            VERSION=nightly
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
