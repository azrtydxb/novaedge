---
apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: novaedge
  labels:
    e2e-test: "true"
spec:
  controller: novaedge.io/ingress-controller
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: echo-ingress
  labels:
    e2e-test: "true"
  annotations:
    novaedge.io/vip-ref: "lb-vip"
spec:
  ingressClassName: novaedge
  rules:
  - host: echo.test.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: echo-svc
            port:
              number: 8080
