apiVersion: batch/v1
kind: Job
metadata:
  name: ${JOB_NAME}
  namespace: novaedge-perf
  labels:
    app: fortio-client
    scenario: ${SCENARIO}
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: fortio-client
        scenario: ${SCENARIO}
    spec:
      restartPolicy: Never
      containers:
        - name: fortio
          image: fortio/fortio:latest
          args:
            - load
            - -json=-
            - -qps=${QPS}
            - -c=${CONCURRENCY}
            - -t=${DURATION}
            - -H=Host: perf.test.local
            - ${TARGET_URL}
          resources:
            requests:
              cpu: "1"
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 512Mi
