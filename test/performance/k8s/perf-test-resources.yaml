---
# Performance testing VIP with eBGP ECMP (per-node unique AS)
# Each announcing node gets AS = localASBase + last_octet(nodeIP)
# e.g., node 192.168.100.11 → AS 65011, node 192.168.100.25 → AS 65025
apiVersion: novaedge.io/v1alpha1
kind: ProxyVIP
metadata:
  name: perf-vip
spec:
  address: 192.168.100.60/32
  mode: BGP
  addressFamily: ipv4
  ports:
    - 80
    - 443
  bgpConfig:
    localAS: 65000
    localASBase: 65000
    routerID: "0.0.0.0"
    peers:
      - address: "192.168.100.2"
        as: 65000
      - address: "192.168.100.3"
        as: 65000
  bfd:
    enabled: true
    detectMultiplier: 3
    desiredMinTxInterval: "300ms"
    requiredMinRxInterval: "300ms"
