---
apiVersion: novaedge.io/v1alpha1
kind: ProxyGateway
metadata:
  name: perf-l4-gateway
  namespace: novaedge-perf
spec:
  vipRef: perf-vip
  listeners:
    - name: tcp-iperf
      port: 5201
      protocol: TCP
---
apiVersion: novaedge.io/v1alpha1
kind: ProxyBackend
metadata:
  name: perf-l4-backend
  namespace: novaedge-perf
spec:
  serviceRef:
    name: iperf3-server
    namespace: novaedge-perf
    port: 5201
  lbPolicy: RoundRobin
  connectTimeout: 5s
