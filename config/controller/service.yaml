apiVersion: v1
kind: Service
metadata:
  name: novaedge-controller
  namespace: nova-system
  labels:
    app.kubernetes.io/name: novaedge-controller
    app.kubernetes.io/component: controller
spec:
  type: ClusterIP
  ports:
  - name: grpc
    port: 9090
    targetPort: grpc
    protocol: TCP
  - name: metrics
    port: 8080
    targetPort: metrics
    protocol: TCP
  - name: health
    port: 8081
    targetPort: health
    protocol: TCP
  selector:
    app.kubernetes.io/name: novaedge-controller
