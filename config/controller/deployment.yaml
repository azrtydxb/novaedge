apiVersion: apps/v1
kind: Deployment
metadata:
  name: novaedge-controller
  namespace: novaedge-system
  labels:
    app.kubernetes.io/name: novaedge-controller
    app.kubernetes.io/component: controller
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: novaedge-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: novaedge-controller
    spec:
      serviceAccountName: novaedge-controller
      containers:
      - name: controller
        image: novaedge-controller:latest
        imagePullPolicy: IfNotPresent
        command:
        - /novaedge-controller
        args:
        - --leader-elect
        - --metrics-bind-address=:8080
        - --health-probe-bind-address=:8081
        - --grpc-bind-address=:9090
        ports:
        - name: metrics
          containerPort: 8080
          protocol: TCP
        - name: health
          containerPort: 8081
          protocol: TCP
        - name: grpc
          containerPort: 9090
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          # Resource recommendations based on workload:
          # - Small cluster (<50 nodes, <100 gateways): cpu: 100m, memory: 128Mi
          # - Medium cluster (50-200 nodes, 100-500 gateways): cpu: 250m, memory: 256Mi
          # - Large cluster (200-500 nodes, 500-1000 gateways): cpu: 500m, memory: 512Mi
          # - XL cluster (>500 nodes, >1000 gateways): cpu: 1000m, memory: 1Gi
          # Monitor actual usage with: kubectl top pod -n novaedge-system
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
