apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: novaedge-agent
  namespace: nova-system
  labels:
    app.kubernetes.io/name: novaedge-agent
    app.kubernetes.io/component: agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: novaedge-agent
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: novaedge-agent
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      # Use host network to bind VIPs and expose ports directly
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet

      serviceAccountName: novaedge-agent

      # Node selector for edge nodes (optional)
      # Uncomment the following for production edge-only deployments:
      # nodeSelector:
      #   novaedge.io/role: edge
      nodeSelector: {}

      # Tolerations to allow running on control plane nodes if needed
      tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule

      containers:
      - name: agent
        image: novaedge-agent:latest
        imagePullPolicy: IfNotPresent

        command:
        - /novaedge-agent

        args:
        - -controller-address=$(CONTROLLER_ADDRESS)
        - -node-name=$(NODE_NAME)
        - -metrics-port=9090
        - -health-probe-port=9091
        - -log-level=info
        - --dataplane-socket=/run/novaedge/dataplane.sock

        env:
        # Controller gRPC service address
        - name: CONTROLLER_ADDRESS
          value: "novaedge-controller.nova-system.svc.cluster.local:9090"

        # Node name for identification
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName

        # Node IP for VIP binding
        - name: NODE_IP
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP

        # Go runtime tuning: soft memory limit (90% of 1Gi memory limit)
        - name: GOMEMLIMIT
          value: "900MiB"
        # Go runtime tuning: GC target percentage (200 = less frequent GC for latency-sensitive agent)
        - name: GOGC
          value: "200"

        ports:
        # HTTP/HTTPS proxy ports
        - name: http
          containerPort: 80
          hostPort: 80
          protocol: TCP
        - name: https
          containerPort: 443
          hostPort: 443
          protocol: TCP

        # Metrics and health
        - name: metrics
          containerPort: 9090
          protocol: TCP
        - name: health
          containerPort: 9091
          protocol: TCP

        # gRPC config client
        - name: grpc-config
          containerPort: 8082
          protocol: TCP

        livenessProbe:
          httpGet:
            path: /healthz
            port: health
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /readyz
            port: health
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6

        resources:
          # Resource recommendations based on traffic load:
          # - Low traffic (<1000 req/s): cpu: 500m, memory: 256Mi
          # - Medium traffic (1000-5000 req/s): cpu: 1000m, memory: 512Mi
          # - High traffic (5000-10000 req/s): cpu: 2000m, memory: 1Gi
          # - Very high traffic (>10000 req/s): cpu: 4000m, memory: 2Gi
          # Note: Actual usage depends on:
          # - Number of active VIPs and listeners
          # - Enabled filters (JWT validation, rate limiting add overhead)
          # - WebSocket/gRPC connection count (long-lived connections use more memory)
          # - TLS termination (CPU intensive)
          # Monitor with: kubectl top pod -n nova-system -l app.kubernetes.io/name=novaedge-agent
          limits:
            cpu: 2000m
            memory: 1Gi
          requests:
            cpu: 500m
            memory: 256Mi

        securityContext:
          # Privileged mode required for:
          # - Binding VIPs to network interfaces
          # - ARP manipulation (L2 mode)
          # - BGP/OSPF routing table updates
          privileged: true
          capabilities:
            add:
            - NET_ADMIN      # Network interface configuration
            - NET_RAW        # Raw socket access for ARP/routing
            - NET_BIND_SERVICE # Bind to ports < 1024

        volumeMounts:
        # Optional: Mount for TLS certificates if not using Secrets directly
        - name: certs
          mountPath: /etc/novaedge/certs
          readOnly: true

        # Optional: Mount for additional config files
        - name: config
          mountPath: /etc/novaedge/config
          readOnly: true

        # Shared Unix socket directory for dataplane communication
        - name: dataplane-socket
          mountPath: /run/novaedge

      # Rust eBPF dataplane sidecar
      - name: novaedge-dataplane
        image: ghcr.io/piwi3910/novaedge-dataplane:latest
        imagePullPolicy: IfNotPresent
        args:
        - --socket-path=/run/novaedge/dataplane.sock
        - --ebpf-path=/opt/novaedge/novaedge-ebpf
        securityContext:
          privileged: true
          capabilities:
            add:
            - NET_ADMIN
            - NET_RAW
        readinessProbe:
          exec:
            command:
            - test
            - -S
            - /run/novaedge/dataplane.sock
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 3
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: "1"
            memory: 512Mi
        volumeMounts:
        - name: dataplane-socket
          mountPath: /run/novaedge
        - name: dataplane-bpffs
          mountPath: /sys/fs/bpf

      volumes:
      # Optional: Certificate volume (can be populated from Secrets)
      - name: certs
        emptyDir: {}

      # Optional: Config volume
      - name: config
        configMap:
          name: novaedge-agent-config
          optional: true

      # Shared emptyDir for Unix socket communication between agent and dataplane
      - name: dataplane-socket
        emptyDir: {}

      # BPF filesystem for eBPF dataplane
      - name: dataplane-bpffs
        hostPath:
          path: /sys/fs/bpf
          type: DirectoryOrCreate

      # Priority class for system-critical workload
      priorityClassName: system-node-critical

      # Restart policy
      restartPolicy: Always
