apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: novaedge-system

# Base configuration
resources:
- ../../default

# Development patches
patches:
# Reduce controller replicas for dev
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment
    name: novaedge-controller

# Reduce resource limits for dev
- patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/cpu
      value: 200m
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/memory
      value: 256Mi
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/cpu
      value: 50m
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/memory
      value: 64Mi
  target:
    kind: Deployment
    name: novaedge-controller

# Remove node selector from agent for dev (run on all nodes)
- patch: |-
    - op: remove
      path: /spec/template/spec/nodeSelector
  target:
    kind: DaemonSet
    name: novaedge-agent

# Image configuration for dev
images:
- name: ghcr.io/piwi3910/novaedge-controller
  newName: novaedge-controller
  newTag: dev
- name: ghcr.io/piwi3910/novaedge-agent
  newName: novaedge-agent
  newTag: dev
- name: ghcr.io/piwi3910/novaedge-novactl
  newName: novaedge-novactl
  newTag: dev

# ConfigMap for development settings
configMapGenerator:
- name: novaedge-config
  literals:
  - LOG_LEVEL=debug
  - METRICS_ENABLED=true
