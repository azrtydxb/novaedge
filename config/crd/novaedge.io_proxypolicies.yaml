---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: proxypolicies.novaedge.io
spec:
  group: novaedge.io
  names:
    kind: ProxyPolicy
    listKind: ProxyPolicyList
    plural: proxypolicies
    singular: proxypolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .spec.targetRef.kind
      name: Target Kind
      type: string
    - jsonPath: .spec.targetRef.name
      name: Target Name
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ProxyPolicy defines authentication, rate-limiting, and other
          policies
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ProxyPolicySpec defines the desired state of ProxyPolicy
            properties:
              basicAuth:
                description: BasicAuth configuration (for BasicAuth type)
                properties:
                  realm:
                    default: Restricted
                    description: Realm is the authentication realm name shown in the
                      browser dialog
                    type: string
                  secretRef:
                    description: |-
                      SecretRef references a Kubernetes Secret containing htpasswd-formatted credentials
                      The Secret must have a key "htpasswd" with lines in the format: username:password_hash
                      Supported hash formats: bcrypt, SHA-256 ({SHA256}), MD5 (apr1)
                    properties:
                      name:
                        description: Name is the name of the referenced object
                        type: string
                    required:
                    - name
                    type: object
                  stripAuth:
                    default: true
                    description: StripAuth removes the Authorization header before
                      forwarding to the backend
                    type: boolean
                required:
                - secretRef
                type: object
              cors:
                description: CORS configuration (for CORS type)
                properties:
                  allowCredentials:
                    description: AllowCredentials indicates whether credentials are
                      allowed
                    type: boolean
                  allowHeaders:
                    description: AllowHeaders is a list of allowed headers
                    items:
                      type: string
                    type: array
                  allowMethods:
                    description: AllowMethods is a list of allowed HTTP methods
                    items:
                      type: string
                    type: array
                  allowOrigins:
                    description: AllowOrigins is a list of allowed origins
                    items:
                      type: string
                    type: array
                  exposeHeaders:
                    description: ExposeHeaders is a list of headers to expose
                    items:
                      type: string
                    type: array
                  maxAge:
                    description: MaxAge is how long the response to a preflight request
                      can be cached
                    type: string
                type: object
              distributedRateLimit:
                description: DistributedRateLimit configuration (for DistributedRateLimit
                  type)
                properties:
                  algorithm:
                    default: sliding-window
                    description: Algorithm is the rate limiting algorithm
                    enum:
                    - fixed-window
                    - sliding-window
                    - token-bucket
                    type: string
                  burst:
                    description: Burst is the maximum burst size
                    format: int32
                    minimum: 1
                    type: integer
                  key:
                    default: source-ip
                    description: Key determines what to rate limit by
                    type: string
                  redisRef:
                    description: RedisRef is the Redis connection configuration
                    properties:
                      address:
                        description: Address is the Redis server address (host:port)
                        type: string
                      clusterMode:
                        description: ClusterMode enables Redis cluster support
                        type: boolean
                      database:
                        default: 0
                        description: Database is the Redis database number
                        format: int32
                        minimum: 0
                        type: integer
                      password:
                        description: Password references a secret containing the Redis
                          password
                        properties:
                          key:
                            default: password
                            description: Key is the key in the Secret
                            type: string
                          name:
                            description: Name is the name of the Secret
                            type: string
                        required:
                        - name
                        type: object
                      tls:
                        description: TLS enables TLS for the Redis connection
                        type: boolean
                    required:
                    - address
                    type: object
                  requestsPerSecond:
                    description: RequestsPerSecond is the maximum number of requests
                      per second
                    format: int32
                    minimum: 1
                    type: integer
                required:
                - redisRef
                - requestsPerSecond
                type: object
              forwardAuth:
                description: ForwardAuth configuration (for ForwardAuth type)
                properties:
                  address:
                    description: Address is the URL of the external auth service
                    pattern: ^https?://
                    type: string
                  authHeaders:
                    description: AuthHeaders specifies which headers from the original
                      request to forward to the auth service
                    items:
                      type: string
                    type: array
                  cacheTTL:
                    description: |-
                      CacheTTL specifies how long to cache auth decisions (e.g., "5m", "1h")
                      Empty means no caching
                    type: string
                  responseHeaders:
                    description: ResponseHeaders specifies which headers from the
                      auth response to copy to the upstream request
                    items:
                      type: string
                    type: array
                  timeout:
                    default: 5s
                    description: Timeout for the auth subrequest (e.g., "5s", "10s")
                    type: string
                required:
                - address
                type: object
              ipList:
                description: IPList configuration (for IPAllowList/IPDenyList types)
                properties:
                  cidrs:
                    description: CIDRs is a list of CIDR blocks
                    items:
                      type: string
                    minItems: 1
                    type: array
                  sourceHeader:
                    description: |-
                      SourceHeader specifies an HTTP header to extract the client IP from
                      (e.g., X-Forwarded-For, X-Real-IP)
                    type: string
                required:
                - cidrs
                type: object
              jwt:
                description: JWT configuration (for JWT type)
                properties:
                  allowedAlgorithms:
                    description: |-
                      AllowedAlgorithms restricts accepted JWT signing algorithms.
                      Supported values: RS256, RS384, RS512, ES256, ES384, ES512, EdDSA.
                      If empty, all supported algorithms are allowed.
                    items:
                      type: string
                    type: array
                  audience:
                    description: Audience is the expected JWT audience
                    items:
                      type: string
                    type: array
                  headerName:
                    default: Authorization
                    description: HeaderName is the header containing the JWT token
                    type: string
                  headerPrefix:
                    default: 'Bearer '
                    description: HeaderPrefix is the prefix before the token in the
                      header
                    type: string
                  issuer:
                    description: Issuer is the expected JWT issuer
                    type: string
                  jwksUri:
                    description: JWKSUri is the URL to fetch JWKS for verification
                    type: string
                  vaultSecretRef:
                    description: VaultSecretRef optionally references credentials
                      stored in HashiCorp Vault
                    properties:
                      engine:
                        default: kv-v2
                        description: Engine specifies the Vault secrets engine type
                        enum:
                        - kv-v1
                        - kv-v2
                        type: string
                      key:
                        description: Key is the specific key within the secret to
                          use
                        type: string
                      path:
                        description: Path is the Vault secret path (e.g., "secret/data/myapp/oidc")
                        type: string
                      refreshInterval:
                        default: 5m
                        description: RefreshInterval specifies how often to refresh
                          the secret from Vault
                        type: string
                    required:
                    - key
                    - path
                    type: object
                required:
                - issuer
                - jwksUri
                type: object
              meshAuthorization:
                description: MeshAuthorization configuration (for MeshAuthorization
                  type)
                properties:
                  action:
                    description: 'Action is the policy action: ALLOW or DENY'
                    enum:
                    - ALLOW
                    - DENY
                    type: string
                  rules:
                    description: Rules defines authorization rules
                    items:
                      description: MeshAuthorizationRule defines a single authorization
                        rule
                      properties:
                        from:
                          description: From specifies allowed source identities
                          items:
                            description: MeshSource identifies allowed source workloads
                              by identity
                            properties:
                              namespaces:
                                description: Namespaces restricts to source workloads
                                  in these namespaces
                                items:
                                  type: string
                                type: array
                              serviceAccounts:
                                description: ServiceAccounts restricts to source workloads
                                  with these service accounts
                                items:
                                  type: string
                                type: array
                              spiffeIds:
                                description: SpiffeIDs restricts to sources matching
                                  these SPIFFE ID patterns (glob)
                                items:
                                  type: string
                                type: array
                            type: object
                          type: array
                        to:
                          description: To specifies allowed destination traffic properties
                          items:
                            description: MeshDestination matches destination traffic
                              properties for L7 authorization
                            properties:
                              methods:
                                description: Methods restricts to these HTTP methods
                                items:
                                  type: string
                                type: array
                              paths:
                                description: Paths restricts to these URL path patterns
                                  (glob)
                                items:
                                  type: string
                                type: array
                            type: object
                          type: array
                      type: object
                    minItems: 1
                    type: array
                required:
                - action
                - rules
                type: object
              oidc:
                description: OIDC configuration (for OIDC type)
                properties:
                  authorization:
                    description: Authorization contains role-based access control
                      configuration
                    properties:
                      mode:
                        default: any
                        description: Mode specifies whether all requirements must
                          be met ("all") or any one ("any")
                        enum:
                        - any
                        - all
                        type: string
                      requiredGroups:
                        description: RequiredGroups specifies groups the user must
                          belong to
                        items:
                          type: string
                        type: array
                      requiredRoles:
                        description: RequiredRoles specifies roles the user must have
                        items:
                          type: string
                        type: array
                    type: object
                  clientID:
                    description: ClientID is the OAuth2 client ID
                    type: string
                  clientSecretRef:
                    description: |-
                      ClientSecretRef references a Secret containing the OAuth2 client secret
                      The Secret must have a key "client-secret"
                    properties:
                      name:
                        description: Name is the name of the referenced object
                        type: string
                    required:
                    - name
                    type: object
                  forwardHeaders:
                    description: ForwardHeaders specifies which user info claims to
                      forward as headers to the upstream
                    items:
                      type: string
                    type: array
                  issuerURL:
                    description: |-
                      IssuerURL is the OIDC provider's issuer URL for discovery
                      For Keycloak, this is auto-constructed from Keycloak config if not specified
                    type: string
                  keycloak:
                    description: Keycloak contains Keycloak-specific configuration
                    properties:
                      groupClaim:
                        default: groups
                        description: GroupClaim is the JWT claim containing groups
                        type: string
                      realm:
                        description: Realm is the Keycloak realm name
                        type: string
                      roleClaim:
                        default: realm_access.roles
                        description: RoleClaim is the JWT claim containing realm roles
                        type: string
                      serverURL:
                        description: ServerURL is the base Keycloak server URL (e.g.,
                          https://keycloak.example.com)
                        type: string
                    required:
                    - realm
                    - serverURL
                    type: object
                  provider:
                    default: generic
                    description: Provider is the OIDC provider type ("generic" or
                      "keycloak")
                    enum:
                    - generic
                    - keycloak
                    type: string
                  redirectURL:
                    description: RedirectURL is the OAuth2 callback URL (e.g., https://myapp.example.com/oauth2/callback)
                    type: string
                  scopes:
                    default:
                    - openid
                    - profile
                    - email
                    description: Scopes is the list of OAuth2 scopes to request
                    items:
                      type: string
                    type: array
                  sessionSecretRef:
                    description: |-
                      SessionSecretRef references a Secret containing the session encryption key
                      The Secret must have a key "session-secret" (32 bytes, base64 encoded)
                    properties:
                      name:
                        description: Name is the name of the referenced object
                        type: string
                    required:
                    - name
                    type: object
                required:
                - clientID
                - clientSecretRef
                - redirectURL
                - sessionSecretRef
                type: object
              rateLimit:
                description: RateLimit configuration (for RateLimit type)
                properties:
                  burst:
                    description: Burst is the maximum burst size
                    format: int32
                    minimum: 1
                    type: integer
                  key:
                    default: source-ip
                    description: Key determines what to rate limit by (e.g., source
                      IP, header value)
                    type: string
                  requestsPerSecond:
                    description: RequestsPerSecond is the maximum number of requests
                      per second
                    format: int32
                    minimum: 1
                    type: integer
                required:
                - requestsPerSecond
                type: object
              securityHeaders:
                description: SecurityHeaders configuration (for SecurityHeaders type)
                properties:
                  contentSecurityPolicy:
                    description: ContentSecurityPolicy sets the Content-Security-Policy
                      header
                    type: string
                  crossOriginEmbedderPolicy:
                    description: CrossOriginEmbedderPolicy sets the Cross-Origin-Embedder-Policy
                      header
                    enum:
                    - unsafe-none
                    - require-corp
                    - credentialless
                    type: string
                  crossOriginOpenerPolicy:
                    description: CrossOriginOpenerPolicy sets the Cross-Origin-Opener-Policy
                      header
                    enum:
                    - unsafe-none
                    - same-origin-allow-popups
                    - same-origin
                    type: string
                  crossOriginResourcePolicy:
                    description: CrossOriginResourcePolicy sets the Cross-Origin-Resource-Policy
                      header
                    enum:
                    - same-site
                    - same-origin
                    - cross-origin
                    type: string
                  hsts:
                    description: HSTS configures HTTP Strict Transport Security
                    properties:
                      enabled:
                        default: true
                        description: Enabled enables HSTS
                        type: boolean
                      includeSubDomains:
                        description: IncludeSubDomains applies HSTS to all subdomains
                        type: boolean
                      maxAge:
                        default: 31536000
                        description: MaxAge is the time in seconds that the browser
                          should remember this site is HTTPS only
                        format: int64
                        minimum: 0
                        type: integer
                      preload:
                        description: Preload adds the site to the browser HSTS preload
                          list
                        type: boolean
                    type: object
                  permissionsPolicy:
                    description: PermissionsPolicy sets the Permissions-Policy header
                      (replaces Feature-Policy)
                    type: string
                  referrerPolicy:
                    description: ReferrerPolicy sets the Referrer-Policy header
                    enum:
                    - no-referrer
                    - no-referrer-when-downgrade
                    - origin
                    - origin-when-cross-origin
                    - same-origin
                    - strict-origin
                    - strict-origin-when-cross-origin
                    - unsafe-url
                    type: string
                  xContentTypeOptions:
                    default: true
                    description: 'XContentTypeOptions enables X-Content-Type-Options:
                      nosniff'
                    type: boolean
                  xFrameOptions:
                    description: XFrameOptions sets the X-Frame-Options header (DENY,
                      SAMEORIGIN, ALLOW-FROM uri)
                    enum:
                    - DENY
                    - SAMEORIGIN
                    type: string
                  xXssProtection:
                    description: XXSSProtection sets the X-XSS-Protection header (e.g.,
                      "1; mode=block")
                    type: string
                type: object
              targetRef:
                description: TargetRef identifies the resource this policy applies
                  to
                properties:
                  kind:
                    description: Kind is the kind of resource (e.g., ProxyGateway,
                      ProxyRoute, Service)
                    enum:
                    - ProxyGateway
                    - ProxyRoute
                    - ProxyBackend
                    - Service
                    type: string
                  name:
                    description: Name is the name of the resource
                    type: string
                  namespace:
                    description: Namespace is the namespace of the resource (defaults
                      to policy namespace)
                    type: string
                required:
                - kind
                - name
                type: object
              type:
                description: Type is the type of policy
                enum:
                - RateLimit
                - JWT
                - IPAllowList
                - IPDenyList
                - CORS
                - SecurityHeaders
                - DistributedRateLimit
                - WAF
                - WASMPlugin
                - BasicAuth
                - ForwardAuth
                - OIDC
                - MeshAuthorization
                type: string
              waf:
                description: WAF configuration (for WAF type)
                properties:
                  anomalyThreshold:
                    default: 5
                    description: AnomalyThreshold is the cumulative anomaly score
                      threshold for blocking
                    format: int32
                    minimum: 1
                    type: integer
                  customRules:
                    description: CustomRules are inline SecLang WAF rules applied
                      after built-in rules
                    items:
                      type: string
                    type: array
                  enabled:
                    default: true
                    description: Enabled enables WAF protection
                    type: boolean
                  maxBodySize:
                    default: 131072
                    description: MaxBodySize limits request body inspection in bytes.
                      0 disables body inspection.
                    format: int64
                    type: integer
                  maxResponseBodySize:
                    default: 131072
                    description: MaxResponseBodySize limits response body inspection
                      in bytes
                    format: int64
                    type: integer
                  mode:
                    default: prevention
                    description: Mode is the WAF operating mode
                    enum:
                    - detection
                    - prevention
                    type: string
                  paranoiaLevel:
                    default: 1
                    description: ParanoiaLevel sets the OWASP CRS paranoia level (1-4)
                    format: int32
                    maximum: 4
                    minimum: 1
                    type: integer
                  responseBodyInspection:
                    description: ResponseBodyInspection enables response body scanning
                      for data leakage
                    type: boolean
                  ruleExclusions:
                    description: RuleExclusions is a list of rule IDs to exclude
                    items:
                      type: string
                    type: array
                  rulesConfigMap:
                    description: RulesConfigMap references a ConfigMap containing
                      WAF rules
                    properties:
                      name:
                        description: Name is the name of the referenced object
                        type: string
                    required:
                    - name
                    type: object
                type: object
              wasmPlugin:
                description: WASMPlugin configuration (for WASMPlugin type)
                properties:
                  config:
                    additionalProperties:
                      type: string
                    description: Config is an inline key-value configuration map passed
                      to the WASM plugin
                    type: object
                  configRef:
                    description: ConfigRef is an optional reference to a ConfigMap
                      containing plugin configuration
                    properties:
                      name:
                        description: Name is the name of the referenced object
                        type: string
                    required:
                    - name
                    type: object
                  phase:
                    default: request
                    description: 'Phase determines when the plugin executes: request,
                      response, or both'
                    enum:
                    - request
                    - response
                    - both
                    type: string
                  priority:
                    default: 100
                    description: Priority determines execution order within the middleware
                      pipeline (lower = earlier)
                    type: integer
                  source:
                    description: Source is a reference to the WASM binary (ConfigMap
                      name or URL)
                    type: string
                required:
                - source
                type: object
            required:
            - targetRef
            - type
            type: object
          status:
            description: ProxyPolicyStatus defines the observed state of ProxyPolicy
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the policy's state
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                  by the controller
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
