    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ProxyWANLink represents a WAN link for SD-WAN multi-link management.
          It tracks link properties, SLA thresholds, and observed quality metrics.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ProxyWANLinkSpec defines the desired state of ProxyWANLink
            properties:
              bandwidth:
                description: Bandwidth is the provisioned bandwidth of the link (e.g.,
                  "100Mbps", "1Gbps")
                minLength: 1
                type: string
              cost:
                default: 100
                description: Cost is an administrative cost metric used for path selection
                  (lower is preferred)
                format: int32
                minimum: 0
                type: integer
              interface:
                description: Interface is the network interface name used for this
                  WAN link
                minLength: 1
                type: string
              provider:
                description: Provider is the ISP or WAN circuit provider name
                minLength: 1
                type: string
              role:
                default: primary
                description: Role defines whether this link is primary, backup, or
                  load-balanced
                enum:
                - primary
                - backup
                - loadbalance
                type: string
              site:
                description: Site is the site name this WAN link belongs to
                minLength: 1
                type: string
              sla:
                description: SLA defines the SLA thresholds for this link
                properties:
                  maxJitter:
                    description: MaxJitter is the maximum acceptable jitter
                    type: string
                  maxLatency:
                    description: MaxLatency is the maximum acceptable one-way latency
                    type: string
                  maxPacketLoss:
                    description: MaxPacketLoss is the maximum acceptable packet loss
                      ratio (0.0-1.0)
                    maximum: 1
                    minimum: 0
                    type: number
                type: object
              tunnelEndpoint:
                description: TunnelEndpoint is the public endpoint for tunnel establishment
                properties:
                  port:
                    description: Port is the UDP/TCP port for tunnel traffic
                    format: int32
                    maximum: 65535
                    minimum: 1
                    type: integer
                  publicIP:
                    description: PublicIP is the publicly reachable IP address of
                      the tunnel endpoint
                    type: string
                required:
                - port
                - publicIP
                type: object
            required:
            - bandwidth
            - interface
            - provider
            - site
            type: object
          status:
