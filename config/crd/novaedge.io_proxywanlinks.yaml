                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              currentLatency:
                description: CurrentLatency is the most recently measured latency
                  in milliseconds
                type: number
              currentPacketLoss:
                description: CurrentPacketLoss is the most recently measured packet
                  loss ratio (0.0-1.0)
                type: number
              healthy:
                description: Healthy indicates whether the link currently meets its
                  SLA thresholds
                type: boolean
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                  by the controller
                format: int64
                type: integer
              phase:
                description: Phase is the current lifecycle phase of the WAN link
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
