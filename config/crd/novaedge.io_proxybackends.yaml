---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: proxybackends.novaedge.io
spec:
  group: novaedge.io
  names:
    kind: ProxyBackend
    listKind: ProxyBackendList
    plural: proxybackends
    singular: proxybackend
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.serviceRef.name
      name: Service
      type: string
    - jsonPath: .spec.lbPolicy
      name: LB Policy
      type: string
    - jsonPath: .status.endpointCount
      name: Endpoints
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ProxyBackend maps to Kubernetes Services or external endpoints
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ProxyBackendSpec defines the desired state of ProxyBackend
            properties:
              circuitBreaker:
                description: CircuitBreaker defines circuit breaker settings
                properties:
                  baseEjectionTime:
                    default: 30s
                    description: BaseEjectionTime is how long a host is ejected for
                    type: string
                  consecutiveFailures:
                    default: 5
                    description: ConsecutiveFailures is the number of consecutive
                      failures before opening the circuit
                    format: int32
                    minimum: 1
                    type: integer
                  interval:
                    default: 10s
                    description: Interval is the time window for counting failures
                    type: string
                  maxConnections:
                    description: MaxConnections is the maximum number of connections
                      to the backend
                    format: int32
                    maximum: 100000
                    minimum: 1
                    type: integer
                  maxPendingRequests:
                    description: MaxPendingRequests is the maximum number of pending
                      requests
                    format: int32
                    maximum: 100000
                    minimum: 1
                    type: integer
                  maxRequests:
                    description: MaxRequests is the maximum number of parallel requests
                    format: int32
                    maximum: 100000
                    minimum: 1
                    type: integer
                  maxRetries:
                    description: MaxRetries is the maximum number of parallel retries
                    format: int32
                    maximum: 10
                    minimum: 0
                    type: integer
                type: object
              connectTimeout:
                default: 2s
                description: ConnectTimeout is the timeout for establishing connections
                type: string
              connectionPool:
                description: ConnectionPool defines connection pool configuration
                properties:
                  idleConnTimeout:
                    default: 90s
                    description: IdleConnTimeout is the maximum time an idle connection
                      is kept
                    type: string
                  maxConnsPerHost:
                    description: MaxConnsPerHost is the maximum number of connections
                      per host (0 = unlimited)
                    format: int32
                    maximum: 10000
                    minimum: 0
                    type: integer
                  maxIdleConns:
                    default: 100
                    description: MaxIdleConns is the maximum number of idle connections
                      across all hosts
                    format: int32
                    maximum: 10000
                    minimum: 1
                    type: integer
                  maxIdleConnsPerHost:
                    default: 10
                    description: MaxIdleConnsPerHost is the maximum number of idle
                      connections per host
                    format: int32
                    maximum: 1000
                    minimum: 1
                    type: integer
                type: object
              healthCheck:
                description: HealthCheck defines active health check configuration
                properties:
                  healthyThreshold:
                    default: 2
                    description: HealthyThreshold is the number of successful health
                      checks required
                    format: int32
                    minimum: 1
                    type: integer
                  httpPath:
                    description: HTTPPath is the HTTP path for health checks (for
                      HTTP backends)
                    type: string
                  interval:
                    default: 10s
                    description: Interval is the time between health checks
                    type: string
                  timeout:
                    default: 5s
                    description: Timeout is the time to wait for a health check response
                    type: string
                  unhealthyThreshold:
                    default: 3
                    description: UnhealthyThreshold is the number of failed health
                      checks before marking unhealthy
                    format: int32
                    minimum: 1
                    type: integer
                type: object
              idleTimeout:
                default: 60s
                description: IdleTimeout is the timeout for idle connections
                type: string
              lbPolicy:
                default: RoundRobin
                description: LBPolicy defines the load balancing algorithm
                enum:
                - RoundRobin
                - P2C
                - EWMA
                - RingHash
                - Maglev
                - LeastConn
                type: string
              protocol:
                default: HTTP
                description: Protocol specifies the backend protocol (HTTP, HTTPS,
                  gRPC, gRPCS, HTTP2)
                enum:
                - HTTP
                - HTTPS
                - gRPC
                - gRPCS
                - HTTP2
                type: string
              retryPolicy:
                description: RetryPolicy defines retry behavior for failed requests
                properties:
                  numRetries:
                    default: 1
                    description: NumRetries is the number of retry attempts
                    format: int32
                    maximum: 10
                    minimum: 0
                    type: integer
                  perTryTimeout:
                    default: 2s
                    description: PerTryTimeout is the timeout for each retry attempt
                    type: string
                  retryBackoff:
                    description: RetryBackoff configures exponential backoff for retries
                    properties:
                      baseInterval:
                        default: 25ms
                        description: BaseInterval is the initial backoff interval
                        type: string
                      maxInterval:
                        default: 250ms
                        description: MaxInterval is the maximum backoff interval
                        type: string
                    type: object
                  retryOn:
                    default: 5xx,gateway-error,connect-failure
                    description: |-
                      RetryOn specifies conditions that trigger a retry (comma-separated)
                      Valid values: 5xx, gateway-error, connect-failure, retriable-4xx, refused-stream, reset
                    type: string
                type: object
              serviceRef:
                description: ServiceRef references a Kubernetes Service
                properties:
                  name:
                    description: Name is the name of the Service
                    maxLength: 253
                    minLength: 1
                    pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                    type: string
                  namespace:
                    description: Namespace is the namespace of the Service (defaults
                      to backend namespace)
                    maxLength: 63
                    minLength: 1
                    pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                    type: string
                  port:
                    description: Port is the port number on the Service
                    format: int32
                    maximum: 65535
                    minimum: 1
                    type: integer
                required:
                - name
                - port
                type: object
              sessionAffinity:
                description: SessionAffinity defines sticky session configuration
                properties:
                  cookieName:
                    default: NOVAEDGE_AFFINITY
                    description: CookieName is the name of the cookie for cookie-based
                      affinity
                    type: string
                  cookiePath:
                    default: /
                    description: CookiePath is the path for the affinity cookie
                    type: string
                  cookieTTL:
                    default: 0s
                    description: CookieTTL is the TTL for the affinity cookie
                    type: string
                  headerName:
                    description: HeaderName is the header name for header-based affinity
                    type: string
                  sameSite:
                    description: SameSite sets the SameSite attribute on the affinity
                      cookie
                    enum:
                    - Strict
                    - Lax
                    - None
                    type: string
                  secure:
                    description: Secure sets the Secure flag on the affinity cookie
                    type: boolean
                  type:
                    default: Cookie
                    description: Type specifies the session affinity type
                    enum:
                    - Cookie
                    - Header
                    - SourceIP
                    type: string
                type: object
              tls:
                description: TLS enables TLS for connections to this backend
                properties:
                  caCertSecretRef:
                    description: CACertSecretRef references a Secret containing CA
                      certificates for verification
                    maxLength: 253
                    minLength: 1
                    type: string
                  clientCertSecretRef:
                    description: |-
                      ClientCertSecretRef references a Secret containing client certificate for mTLS
                      The Secret should contain tls.crt and tls.key
                    type: string
                  enabled:
                    default: false
                    description: Enabled indicates whether to use TLS
                    type: boolean
                  insecureSkipVerify:
                    description: 'InsecureSkipVerify is deprecated, use Mode: skip-verify
                      instead'
                    type: boolean
                  mode:
                    default: verify
                    description: Mode specifies the TLS verification mode
                    enum:
                    - verify
                    - skip-verify
                    - mtls
                    type: string
                  selfSigned:
                    description: SelfSigned generates a self-signed client certificate
                      for mTLS
                    type: boolean
                  serverName:
                    description: ServerName overrides the server name for SNI and
                      certificate verification
                    type: string
                required:
                - enabled
                type: object
              upstreamProxyProtocol:
                description: |-
                  UpstreamProxyProtocol configures sending PROXY protocol headers to this backend.
                  This allows backends to see the real client IP when behind the proxy.
                properties:
                  enabled:
                    description: Enabled enables sending PROXY protocol headers to
                      this backend
                    type: boolean
                  version:
                    default: 1
                    description: 'Version is the PROXY protocol version to send (1
                      or 2, default: 1)'
                    format: int32
                    maximum: 2
                    minimum: 1
                    type: integer
                type: object
            type: object
          status:
            description: ProxyBackendStatus defines the observed state of ProxyBackend
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the backend's state
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              endpointCount:
                description: EndpointCount is the number of healthy endpoints
                format: int32
                type: integer
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                  by the controller
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
