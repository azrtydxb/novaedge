---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: proxygateways.novaedge.io
spec:
  group: novaedge.io
  names:
    kind: ProxyGateway
    listKind: ProxyGatewayList
    plural: proxygateways
    singular: proxygateway
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.vipRef
      name: VIP Ref
      type: string
    - jsonPath: .spec.ingressClassName
      name: Ingress Class
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ProxyGateway defines listeners, TLS configuration, and ingress
          class
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ProxyGatewaySpec defines the desired state of ProxyGateway
            properties:
              accessLog:
                description: AccessLog defines access logging configuration
                properties:
                  enabled:
                    default: true
                    description: Enabled enables access logging
                    type: boolean
                  excludePaths:
                    description: ExcludePaths excludes specified paths from logging
                      (e.g., health checks)
                    items:
                      type: string
                    type: array
                  filePath:
                    description: FilePath is the path to the log file (required when
                      output is file or both)
                    type: string
                  filterStatusCodes:
                    description: FilterStatusCodes limits logging to specific HTTP
                      status codes
                    items:
                      format: int32
                      type: integer
                    type: array
                  format:
                    default: json
                    description: Format specifies the log format (json, clf, custom)
                    enum:
                    - json
                    - clf
                    - custom
                    type: string
                  includeHeaders:
                    description: IncludeHeaders includes specified request/response
                      headers in logs
                    items:
                      type: string
                    type: array
                  maxBackups:
                    description: MaxBackups is the maximum number of rotated log files
                      to retain
                    format: int32
                    type: integer
                  maxSize:
                    description: MaxSize is the maximum size of a log file before
                      rotation (e.g., "100Mi")
                    type: string
                  output:
                    default: stdout
                    description: Output defines where logs are written (stdout, file,
                      both)
                    enum:
                    - stdout
                    - file
                    - both
                    type: string
                  template:
                    description: Template defines a custom log format template (for
                      format=custom)
                    type: string
                type: object
              compression:
                description: Compression defines response compression configuration
                properties:
                  enabled:
                    default: false
                    description: Enabled enables response compression
                    type: boolean
                  minSize:
                    default: "1024"
                    description: MinSize is the minimum response body size in bytes
                      before compression triggers
                    type: string
                  level:
                    default: 6
                    description: Level is the compression level (1-9 for gzip, 0-11
                      for brotli)
                    maximum: 11
                    minimum: 0
                    type: integer
                    format: int32
                  algorithms:
                    default:
                    - gzip
                    - br
                    description: Algorithms is the list of supported compression algorithms
                    items:
                      type: string
                    type: array
                  excludeTypes:
                    description: ExcludeTypes is a list of content type patterns to
                      skip compression
                    items:
                      type: string
                    type: array
                type: object
              customErrorPages:
                description: CustomErrorPages defines custom error pages
                items:
                  description: CustomErrorPage defines a custom error page configuration
                  properties:
                    body:
                      description: Body is the response body to return for these error
                        codes
                      type: string
                    codes:
                      description: Codes is a list of HTTP status codes this page
                        applies to
                      items:
                        format: int32
                        type: integer
                      minItems: 1
                      type: array
                    contentType:
                      default: text/html
                      description: ContentType is the content type of the error response
                      type: string
                    path:
                      description: Path is the path to serve for these error codes
                      type: string
                  required:
                  - codes
                  type: object
                type: array
              ingressClassName:
                description: IngressClassName is the ingress class name for Ingress
                  resource compatibility
                type: string
              listeners:
                description: Listeners define the ports and protocols this gateway
                  accepts
                items:
                  description: Listener defines a port and protocol to listen on
                  properties:
                    allowedSourceRanges:
                      description: |-
                        AllowedSourceRanges is a list of CIDR ranges that are allowed to access this listener
                        If empty, all sources are allowed
                      items:
                        type: string
                      type: array
                    hostnames:
                      description: Hostnames is a list of hostnames this listener
                        accepts (for HTTP/HTTPS/HTTP3)
                      items:
                        type: string
                      type: array
                    maxRequestBodySize:
                      description: MaxRequestBodySize is the maximum allowed request
                        body size in bytes (0 = unlimited)
                      format: int64
                      type: integer
                    name:
                      description: Name is a unique name for this listener
                      maxLength: 253
                      minLength: 1
                      type: string
                    port:
                      description: Port is the network port to listen on
                      format: int32
                      maximum: 65535
                      minimum: 1
                      type: integer
                    protocol:
                      description: Protocol is the application protocol
                      enum:
                      - HTTP
                      - HTTPS
                      - TCP
                      - TLS
                      type: string
                    quic:
                      description: QUIC contains QUIC-specific configuration (optional
                        for HTTP3 protocol)
                      properties:
                        enable0RTT:
                          default: true
                          description: Enable0RTT enables 0-RTT resumption (reduces
                            connection establishment latency)
                          type: boolean
                        maxBiStreams:
                          default: 100
                          description: MaxBiStreams is the maximum number of concurrent
                            bidirectional streams
                          format: int64
                          type: integer
                        maxIdleTimeout:
                          default: 30s
                          description: MaxIdleTimeout is the maximum idle timeout
                            for QUIC connections
                          type: string
                        maxUniStreams:
                          default: 100
                          description: MaxUniStreams is the maximum number of concurrent
                            unidirectional streams
                          format: int64
                          type: integer
                      type: object
                    sslRedirect:
                      description: SSLRedirect enables automatic redirect from HTTP
                        to HTTPS
                      type: boolean
                    tls:
                      description: |-
                        TLS contains TLS configuration (required for HTTPS/TLS/HTTP3 protocols)
                        Use TLSCertificates for SNI support with multiple certificates
                      properties:
                        acme:
                          description: |-
                            ACME configures automatic certificate provisioning via ACME
                            This creates a ProxyCertificate automatically
                          properties:
                            challengeType:
                              default: http-01
                              description: ChallengeType specifies the ACME challenge
                                type
                              enum:
                              - http-01
                              - dns-01
                              - tls-alpn-01
                              type: string
                            dnsProvider:
                              description: DNSProvider for DNS-01 challenges (e.g.,
                                cloudflare, route53)
                              type: string
                            email:
                              description: Email is the email address for ACME registration
                              type: string
                            server:
                              description: 'Server is the ACME server URL (default:
                                Let''s Encrypt production)'
                              type: string
                          required:
                          - email
                          type: object
                        certificateRef:
                          description: CertificateRef references a ProxyCertificate
                            resource
                          properties:
                            group:
                              description: Group is the API group of the referenced
                                object
                              type: string
                            kind:
                              description: Kind is the kind of the referenced object
                              type: string
                            name:
                              description: Name is the name of the referenced object
                              type: string
                            namespace:
                              description: |-
                                Namespace is the namespace of the referenced object
                                If not specified, the namespace of the referencing object is used
                              type: string
                          required:
                          - name
                          type: object
                        cipherSuites:
                          description: CipherSuites is a list of allowed cipher suites
                          items:
                            type: string
                          type: array
                        minVersion:
                          description: 'MinVersion is the minimum TLS version (default:
                            TLS 1.2)'
                          enum:
                          - TLS1.2
                          - TLS1.3
                          type: string
                        secretRef:
                          description: |-
                            SecretRef references a Kubernetes Secret containing TLS certificate and key
                            One of SecretRef, CertificateRef, ACME, or SelfSigned must be specified
                          properties:
                            name:
                              description: name is unique within a namespace to reference
                                a secret resource.
                              type: string
                            namespace:
                              description: namespace defines the space within which
                                the secret name must be unique.
                              type: string
                          type: object
                          x-kubernetes-map-type: atomic
                        selfSigned:
                          description: SelfSigned generates a self-signed certificate
                          properties:
                            organization:
                              description: Organization is the organization name in
                                the certificate
                              type: string
                            validity:
                              default: 8760h
                              description: 'Validity is the certificate validity duration
                                (default: 8760h = 1 year)'
                              type: string
                          type: object
                      type: object
                    tlsCertificates:
                      additionalProperties:
                        description: TLSConfig defines TLS configuration for a listener
                        properties:
                          acme:
                            description: |-
                              ACME configures automatic certificate provisioning via ACME
                              This creates a ProxyCertificate automatically
                            properties:
                              challengeType:
                                default: http-01
                                description: ChallengeType specifies the ACME challenge
                                  type
                                enum:
                                - http-01
                                - dns-01
                                - tls-alpn-01
                                type: string
                              dnsProvider:
                                description: DNSProvider for DNS-01 challenges (e.g.,
                                  cloudflare, route53)
                                type: string
                              email:
                                description: Email is the email address for ACME registration
                                type: string
                              server:
                                description: 'Server is the ACME server URL (default:
                                  Let''s Encrypt production)'
                                type: string
                            required:
                            - email
                            type: object
                          certificateRef:
                            description: CertificateRef references a ProxyCertificate
                              resource
                            properties:
                              group:
                                description: Group is the API group of the referenced
                                  object
                                type: string
                              kind:
                                description: Kind is the kind of the referenced object
                                type: string
                              name:
                                description: Name is the name of the referenced object
                                type: string
                              namespace:
                                description: |-
                                  Namespace is the namespace of the referenced object
                                  If not specified, the namespace of the referencing object is used
                                type: string
                            required:
                            - name
                            type: object
                          cipherSuites:
                            description: CipherSuites is a list of allowed cipher
                              suites
                            items:
                              type: string
                            type: array
                          minVersion:
                            description: 'MinVersion is the minimum TLS version (default:
                              TLS 1.2)'
                            enum:
                            - TLS1.2
                            - TLS1.3
                            type: string
                          secretRef:
                            description: |-
                              SecretRef references a Kubernetes Secret containing TLS certificate and key
                              One of SecretRef, CertificateRef, ACME, or SelfSigned must be specified
                            properties:
                              name:
                                description: name is unique within a namespace to
                                  reference a secret resource.
                                type: string
                              namespace:
                                description: namespace defines the space within which
                                  the secret name must be unique.
                                type: string
                            type: object
                            x-kubernetes-map-type: atomic
                          selfSigned:
                            description: SelfSigned generates a self-signed certificate
                            properties:
                              organization:
                                description: Organization is the organization name
                                  in the certificate
                                type: string
                              validity:
                                default: 8760h
                                description: 'Validity is the certificate validity
                                  duration (default: 8760h = 1 year)'
                                type: string
                            type: object
                        type: object
                      description: |-
                        TLSCertificates provides SNI support with multiple TLS certificates per listener
                        Key is the hostname, value is the TLS configuration for that hostname
                        Supports wildcard hostnames (e.g., "*.example.com")
                      type: object
                  required:
                  - name
                  - port
                  - protocol
                  type: object
                minItems: 1
                type: array
              redirectScheme:
                description: RedirectScheme defines HTTP to HTTPS redirect configuration
                properties:
                  enabled:
                    description: Enabled enables scheme redirection
                    type: boolean
                  exclusions:
                    description: Exclusions is a list of path prefixes to exclude
                      from redirection
                    items:
                      type: string
                    type: array
                  port:
                    default: 443
                    description: 'Port is the target port (default: 443)'
                    format: int32
                    type: integer
                  scheme:
                    default: https
                    description: 'Scheme is the target scheme (default: "https")'
                    type: string
                  statusCode:
                    default: 301
                    description: 'StatusCode is the HTTP redirect status code (301
                      or 302, default: 301)'
                    enum:
                    - 301
                    - 302
                    format: int32
                    type: integer
                type: object
              tracing:
                description: Tracing defines request tracing configuration
                properties:
                  enabled:
                    default: true
                    description: Enabled enables request tracing
                    type: boolean
                  generateRequestId:
                    default: true
                    description: GenerateRequestID generates a request ID if not present
                    type: boolean
                  propagateRequestId:
                    default: true
                    description: PropagateRequestID propagates the request ID to upstream
                      backends
                    type: boolean
                  requestIdHeader:
                    default: X-Request-ID
                    description: RequestIDHeader is the header name for the request
                      ID
                    type: string
                  samplingRate:
                    default: 100
                    description: SamplingRate is the percentage of requests to trace
                      (0-100)
                    format: int32
                    maximum: 100
                    minimum: 0
                    type: integer
                type: object
              vipRef:
                description: VIPRef references the ProxyVIP to use for this gateway
                type: string
            required:
            - listeners
            - vipRef
            type: object
          status:
            description: ProxyGatewayStatus defines the observed state of ProxyGateway
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the gateway's state
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              listenerStatus:
                description: ListenerStatus contains status for each listener
                items:
                  description: ListenerStatus contains status for a single listener
                  properties:
                    name:
                      description: Name matches the listener name
                      type: string
                    ready:
                      description: Ready indicates if the listener is ready to accept
                        traffic
                      type: boolean
                    reason:
                      description: Reason provides detail about the listener status
                      type: string
                  required:
                  - name
                  - ready
                  type: object
                type: array
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                  by the controller
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
