# ServiceMonitor for NovaEdge controller
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: novaedge-controller
  namespace: novaedge-system
  labels:
    app.kubernetes.io/name: novaedge-controller
    app.kubernetes.io/part-of: novaedge
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: novaedge-controller
  endpoints:
  - port: metrics
    interval: 15s
    scrapeTimeout: 10s
    path: /metrics
---
# ServiceMonitor for NovaEdge agent
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: novaedge-agent
  namespace: novaedge-system
  labels:
    app.kubernetes.io/name: novaedge-agent
    app.kubernetes.io/part-of: novaedge
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: novaedge-agent
      app.kubernetes.io/component: metrics
  endpoints:
  - port: metrics
    interval: 15s
    scrapeTimeout: 10s
    path: /metrics
