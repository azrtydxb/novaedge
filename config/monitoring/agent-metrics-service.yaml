# Headless service for Prometheus to discover NovaEdge agent pods
apiVersion: v1
kind: Service
metadata:
  name: novaedge-agent-metrics
  namespace: novaedge-system
  labels:
    app.kubernetes.io/name: novaedge-agent
    app.kubernetes.io/component: metrics
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: novaedge-agent
  ports:
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
