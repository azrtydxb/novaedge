apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: novaedge-system

labels:
- includeSelectors: false
  pairs:
    app.kubernetes.io/part-of: novaedge
    app.kubernetes.io/managed-by: kustomize

resources:
- serviceaccount.yaml
- clusterrole.yaml
- clusterrolebinding.yaml
- deployment.yaml
- service.yaml
# Optional: Enable ingress for external access
# - ingress.yaml

images:
- name: novaedge-novactl
  newName: ghcr.io/piwi3910/novaedge-novactl
  newTag: latest
