apiVersion: apps/v1
kind: Deployment
metadata:
  name: novaedge-webui
  namespace: novaedge-system
  labels:
    app.kubernetes.io/name: novaedge-webui
    app.kubernetes.io/component: webui
    app.kubernetes.io/part-of: novaedge
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: novaedge-webui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: novaedge-webui
        app.kubernetes.io/component: webui
    spec:
      serviceAccountName: novaedge-webui
      containers:
      - name: webui
        image: novaedge-novactl:latest
        imagePullPolicy: IfNotPresent
        command:
        - /novactl
        args:
        - web
        - --address=:9080
        - --prometheus-endpoint=$(PROMETHEUS_ENDPOINT)
        env:
        - name: PROMETHEUS_ENDPOINT
          value: "http://prometheus.monitoring.svc.cluster.local:9090"
        ports:
        - name: http
          containerPort: 9080
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65534
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
