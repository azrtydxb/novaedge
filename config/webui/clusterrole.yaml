apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: novaedge-webui-role
  labels:
    app.kubernetes.io/name: novaedge-webui
    app.kubernetes.io/component: webui
    app.kubernetes.io/part-of: novaedge
rules:
# Read access to NovaEdge CRDs
- apiGroups:
  - novaedge.io
  resources:
  - proxybackends
  - proxygateways
  - proxypolicies
  - proxyroutes
  verbs:
  - get
  - list
  - watch
# Read access to namespaces
- apiGroups:
  - ""
  resources:
  - namespaces
  verbs:
  - get
  - list
  - watch
# Read access to pods (for agent status)
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
# Read access to nodes (for cluster overview)
- apiGroups:
  - ""
  resources:
  - nodes
  verbs:
  - get
  - list
  - watch
