apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: novaedge-webui
  namespace: nova-system
  labels:
    app.kubernetes.io/name: novaedge-webui
    app.kubernetes.io/component: webui
    app.kubernetes.io/part-of: novaedge
  annotations:
    # Use NovaEdge as the ingress controller
    kubernetes.io/ingress.class: novaedge
spec:
  rules:
  - host: novaedge.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: novaedge-webui
            port:
              name: http
