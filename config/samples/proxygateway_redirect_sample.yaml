apiVersion: novaedge.io/v1alpha1
kind: ProxyGateway
metadata:
  name: web-gateway-with-redirect
  namespace: default
spec:
  listeners:
    - name: http
      port: 80
      protocol: HTTP
    - name: https
      port: 443
      protocol: HTTPS
      tls:
        secretRef:
          name: web-tls-secret
  redirectScheme:
    enabled: true
    scheme: https
    port: 443
    statusCode: 301
    exclusions:
      - /healthz
      - /readyz
      - /.well-known/
