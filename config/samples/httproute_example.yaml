apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: example-httproute
  namespace: default
spec:
  parentRefs:
  - name: example-gateway
    namespace: default
  hostnames:
  - "example.com"
  - "www.example.com"
  rules:
  # Path prefix matching with header modification
  - matches:
    - path:
        type: PathPrefix
        value: /api
    filters:
    - type: RequestHeaderModifier
      requestHeaderModifier:
        add:
        - name: X-Custom-Header
          value: example-value
        set:
        - name: X-Forwarded-Proto
          value: https
    backendRefs:
    - name: api-service
      port: 8080
      weight: 1
  # Exact path matching
  - matches:
    - path:
        type: Exact
        value: /healthz
    backendRefs:
    - name: health-service
      port: 8081
      weight: 1
  # Regular expression matching
  - matches:
    - path:
        type: RegularExpression
        value: "/users/[0-9]+"
    backendRefs:
    - name: user-service
      port: 8082
      weight: 1
  # Default backend
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: web-service
      port: 80
      weight: 1
