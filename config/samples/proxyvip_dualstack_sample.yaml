---
apiVersion: novaedge.io/v1alpha1
kind: ProxyVIP
metadata:
  name: dual-stack-vip
spec:
  address: 10.200.0.50/32
  ipv6Address: "2001:db8::50/128"
  mode: BGP
  addressFamily: dual
  ports:
    - 80
    - 443
  bgpConfig:
    localAS: 65000
    routerID: "10.0.0.1"
    peers:
      - address: "10.0.0.254"
        as: 65001
