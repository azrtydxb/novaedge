# Security Headers Policy Example
# This policy applies security headers to all responses from the targeted gateway

---
# Default Security Headers Policy
# Suitable for most web applications
apiVersion: proxy.novaedge.io/v1alpha1
kind: ProxyPolicy
metadata:
  name: default-security-headers
  namespace: demo
spec:
  targetRef:
    kind: ProxyGateway
    name: my-gateway
    namespace: demo
  type: SecurityHeaders
  securityHeaders:
    # HTTP Strict Transport Security (HSTS)
    # Forces browsers to use HTTPS for all future requests
    hsts:
      enabled: true
      maxAgeSeconds: 31536000  # 1 year
      includeSubdomains: true
      preload: false  # Set to true only after testing

    # X-Frame-Options: Prevent clickjacking attacks
    xFrameOptions: DENY  # Options: DENY, SAMEORIGIN

    # X-Content-Type-Options: Prevent MIME type sniffing
    xContentTypeOptions: true  # Sets "nosniff"

    # X-XSS-Protection: Enable XSS filter in older browsers
    xXssProtection: "1; mode=block"

    # Referrer-Policy: Control referrer information
    referrerPolicy: strict-origin-when-cross-origin

---
# Strict Security Headers Policy
# For high-security applications with stricter CSP
apiVersion: proxy.novaedge.io/v1alpha1
kind: ProxyPolicy
metadata:
  name: strict-security-headers
  namespace: demo
spec:
  targetRef:
    kind: ProxyGateway
    name: secure-gateway
    namespace: demo
  type: SecurityHeaders
  securityHeaders:
    # Strict HSTS with preload
    hsts:
      enabled: true
      maxAgeSeconds: 63072000  # 2 years
      includeSubdomains: true
      preload: true

    # Content Security Policy (CSP)
    # Restricts sources for scripts, styles, images, etc.
    contentSecurityPolicy: "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

    xFrameOptions: DENY
    xContentTypeOptions: true
    xXssProtection: "1; mode=block"
    referrerPolicy: no-referrer

    # Permissions-Policy (replaces Feature-Policy)
    # Disable access to sensitive browser features
    permissionsPolicy: "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"

    # Cross-Origin policies for enhanced isolation
    crossOriginEmbedderPolicy: require-corp
    crossOriginOpenerPolicy: same-origin
    crossOriginResourcePolicy: same-origin

---
# API Security Headers Policy
# For REST/GraphQL APIs (no need for frame/XSS protection)
apiVersion: proxy.novaedge.io/v1alpha1
kind: ProxyPolicy
metadata:
  name: api-security-headers
  namespace: demo
spec:
  targetRef:
    kind: ProxyRoute
    name: api-route
    namespace: demo
  type: SecurityHeaders
  securityHeaders:
    # HSTS for API endpoints
    hsts:
      enabled: true
      maxAgeSeconds: 31536000
      includeSubdomains: true

    # Content-Type protection
    xContentTypeOptions: true

    # Referrer policy
    referrerPolicy: strict-origin-when-cross-origin

    # Note: X-Frame-Options and X-XSS-Protection are not needed for APIs
    # as they return JSON, not HTML
