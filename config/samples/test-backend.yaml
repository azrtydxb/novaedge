apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-test-config
  namespace: default
data:
  default.conf: |
    server {
        listen 80;
        location / {
            add_header X-Backend-Pod $hostname;
            return 200 '{"status":"ok","pod":"$hostname","uri":"$request_uri"}\n';
            default_type application/json;
        }
        location /health {
            return 200 '{"status":"healthy"}\n';
            default_type application/json;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-svc
  namespace: default
  labels:
    app: api-svc
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-svc
  template:
    metadata:
      labels:
        app: api-svc
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
          protocol: TCP
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 2
          periodSeconds: 5
        resources:
          limits:
            cpu: 100m
            memory: 64Mi
          requests:
            cpu: 50m
            memory: 32Mi
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-test-config
---
apiVersion: v1
kind: Service
metadata:
  name: api-svc
  namespace: default
  labels:
    app: api-svc
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8080
    targetPort: 80
    protocol: TCP
  selector:
    app: api-svc
