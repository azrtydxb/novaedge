# Example: Traffic mirroring configuration
# This route mirrors 50% of API traffic to a shadow backend for testing
apiVersion: novaedge.io/v1alpha1
kind: ProxyRoute
metadata:
  name: api-route-with-mirror
  namespace: default
spec:
  hostnames:
    - api.example.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1
      backendRefs:
        - name: api-backend
          weight: 1
      mirror:
        backendRef:
          name: api-shadow-backend
        percentage: 50
