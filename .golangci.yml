version: "2"

run:
  timeout: 10m

linters:
  default: none
  enable:
    # Default linters
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    # Style and documentation
    - revive
    # Bug detection
    - bodyclose
    - durationcheck
    - forcetypeassert
    - nilerr
    - noctx
    # Code quality
    - goconst
    - gocritic
    - misspell
    - prealloc
    - unconvert
    - unparam
    - wastedassign
    # Security
    - gosec
    # Complexity
    - gocyclo
    # Code duplication
    - dupl
    # Best practices
    - gochecknoinits
    - err113
    - exhaustive
  exclusions:
    rules:
      # Package names that intentionally share names with stdlib packages.
      - path: cmd/novactl/pkg/printer/
        linters:
          - revive
        text: "var-naming: avoid package names"
      - path: cmd/novactl/pkg/trace/
        linters:
          - revive
        text: "var-naming: avoid package names"
      - path: internal/agent/metrics/
        linters:
          - revive
        text: "var-naming: avoid package names"
      # Exclude test files from certain linters
      - path: _test\.go
        linters:
          - dupl
          - gochecknoinits
          - err113
      # Exclude generated files
      - path: zz_generated\.deepcopy\.go
        linters:
          - all
  settings:
    staticcheck:
      checks:
        - "all"
    gocyclo:
      min-complexity: 20
    dupl:
      threshold: 150
    goconst:
      min-len: 3
      min-occurrences: 4
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unreachable-code
        - name: redefines-builtin-id

formatters:
  enable:
    - gofmt
  settings:
    gofmt:
      simplify: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
