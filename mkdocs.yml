site_name: NovaEdge
site_description: Distributed Kubernetes-native load balancer, reverse proxy, and VIP controller
site_url: https://piwi3910.github.io/novaedge
repo_url: https://github.com/piwi3910/novaedge
repo_name: piwi3910/novaedge

theme:
  name: material
  logo: assets/novaedge-logo-light.svg
  favicon: assets/novaedge-logo-light.svg
  palette:
    - scheme: default
      primary: custom
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.path
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - What NovaEdge Replaces: comparison.md
  - Getting Started:
    - Quick Start: getting-started/quickstart.md
  - Architecture:
    - Overview: architecture/overview.md
    - Components: architecture/components.md
    - Federation: architecture/federation.md
  - Installation:
    - Operator (Recommended): installation/operator.md
    - Kubernetes: installation/kubernetes.md
    - Helm: installation/helm.md
    - Standalone: installation/standalone.md
  - Use Cases:
    - API Gateway: use-cases/api-gateway.md
    - Ingress Controller: use-cases/ingress-controller.md
    - Bare-Metal Load Balancer: use-cases/bare-metal-lb.md
    - Gateway API: use-cases/gateway-api.md
    - Service Mesh: use-cases/service-mesh.md
    - TLS & Certificate Management: use-cases/tls-management.md
    - WAF & Security Stack: use-cases/waf-security.md
    - Multi-Cluster Federation: use-cases/multi-cluster.md
  - User Guide:
    - Routing: user-guide/routing.md
    - Load Balancing: user-guide/load-balancing.md
    - VIP Management: user-guide/vip-management.md
    - Control-Plane VIP: user-guide/control-plane-vip.md
    - IP Address Pools: user-guide/ip-pools.md
    - K3s Control Plane HA: user-guide/k3s-control-plane-ha.md
    - Service Mesh: user-guide/service-mesh.md
    - L4 TCP/UDP Proxying: user-guide/l4-proxying.md
    - Policies: user-guide/policies.md
    - Authentication: user-guide/authentication.md
    - Keycloak Integration: user-guide/keycloak.md
    - WAF: user-guide/waf.md
    - TLS: user-guide/tls.md
    - cert-manager Integration: user-guide/cert-manager.md
    - HashiCorp Vault: user-guide/vault.md
    - Health Checks: user-guide/health-checks.md
    - Middleware Pipelines: user-guide/middleware-pipelines.md
    - Response Caching: user-guide/response-caching.md
    - Request Retry: user-guide/retry.md
    - Traffic Mirroring: user-guide/traffic-mirroring.md
    - PROXY Protocol: user-guide/proxy-protocol.md
    - Server-Sent Events: user-guide/sse.md
    - Custom Error Pages: user-guide/error-pages.md
    - Federation: user-guide/federation.md
    - Cross-Cluster Routing: user-guide/cross-cluster-routing.md
    - Federation Tunnels: user-guide/federation-tunnels.md
  - Advanced:
    - Multi-Cluster: advanced/multi-cluster.md
    - Federation Setup: advanced/federation-setup.md
    - HTTP/3 & QUIC: advanced/http3-quic.md
    - Gateway API: advanced/gateway-api.md
    - WASM Plugins: advanced/wasm-plugins.md
  - Operations:
    - Observability: operations/observability.md
    - Access Logging: operations/access-logging.md
    - Web UI: operations/web-ui.md
    - Troubleshooting: operations/troubleshooting.md
  - Reference:
    - CRD Reference: reference/crd-reference.md
    - CLI Reference: reference/cli-reference.md
    - Helm Values: reference/helm-values.md
  - Examples: examples/index.md
  - Development:
    - Development Guide: development/development-guide.md
    - Contributing: development/contributing.md

plugins:
  - search

extra_css:
  - assets/stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/piwi3910/novaedge
