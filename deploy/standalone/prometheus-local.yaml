global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'novaedge-agent'
    static_configs:
      - targets: ['host.docker.internal:9095']
    scrape_interval: 10s
    metrics_path: /metrics

  - job_name: 'novaedge-webui'
    static_configs:
      - targets: ['host.docker.internal:9080']
    scrape_interval: 10s
    metrics_path: /metrics
