<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaEdge Dashboard</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="app">
        <nav class="sidebar">
            <div class="sidebar-header">
                <h1>NovaEdge</h1>
                <span class="version">v1.0.0</span>
            </div>
            <ul class="nav-menu">
                <li class="nav-item active" data-page="dashboard">
                    <span class="nav-icon">&#9671;</span>
                    Dashboard
                </li>
                <li class="nav-item" data-page="gateways">
                    <span class="nav-icon">&#9673;</span>
                    Gateways
                </li>
                <li class="nav-item" data-page="routes">
                    <span class="nav-icon">&#10132;</span>
                    Routes
                </li>
                <li class="nav-item" data-page="backends">
                    <span class="nav-icon">&#9881;</span>
                    Backends
                </li>
                <li class="nav-item" data-page="vips">
                    <span class="nav-icon">&#9733;</span>
                    VIPs
                </li>
                <li class="nav-item" data-page="policies">
                    <span class="nav-icon">&#9888;</span>
                    Policies
                </li>
                <li class="nav-item" data-page="agents">
                    <span class="nav-icon">&#9679;</span>
                    Agents
                </li>
            </ul>
        </nav>

        <main class="content">
            <header class="content-header">
                <div class="header-left">
                    <h2 id="page-title">Dashboard</h2>
                </div>
                <div class="header-right">
                    <div class="namespace-selector">
                        <label for="namespace">Namespace:</label>
                        <select id="namespace">
                            <option value="all">All Namespaces</option>
                        </select>
                    </div>
                    <button class="refresh-btn" onclick="refreshCurrentPage()">Refresh</button>
                </div>
            </header>

            <div id="page-content" class="page-content">
                <!-- Dynamic content loads here -->
            </div>
        </main>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
