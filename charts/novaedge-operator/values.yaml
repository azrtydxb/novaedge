# Default values for novaedge-operator
# This is a YAML-formatted file.

# -- Number of operator replicas
replicaCount: 1

# -- Image configuration
image:
  # -- Image repository
  repository: ghcr.io/piwi3910/novaedge/novaedge-operator
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Image tag (defaults to chart appVersion)
  tag: ""

# -- Image pull secrets
imagePullSecrets: []

# -- Override the chart name
nameOverride: ""

# -- Override the full name
fullnameOverride: ""

# -- Service account configuration
serviceAccount:
  # -- Create a service account
  create: true
  # -- Annotations to add to the service account
  annotations: {}
  # -- The name of the service account to use
  name: ""

# -- Pod annotations
podAnnotations: {}

# -- Pod labels
podLabels: {}

# -- Pod security context
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# -- Container security context
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

# -- Resource requests and limits
resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

# -- Liveness probe configuration
livenessProbe:
  httpGet:
    path: /healthz
    port: 8081
  initialDelaySeconds: 15
  periodSeconds: 20

# -- Readiness probe configuration
readinessProbe:
  httpGet:
    path: /readyz
    port: 8081
  initialDelaySeconds: 5
  periodSeconds: 10

# -- Node selector for pod scheduling
nodeSelector: {}

# -- Tolerations for pod scheduling
tolerations: []

# -- Affinity rules for pod scheduling
affinity: {}

# -- Leader election configuration
leaderElection:
  # -- Enable leader election
  enabled: true

# -- Metrics configuration
metrics:
  # -- Enable Prometheus metrics
  enabled: true
  # -- Metrics service port
  port: 8080
  # -- Service monitor configuration for Prometheus Operator
  serviceMonitor:
    # -- Enable ServiceMonitor creation
    enabled: false
    # -- Scrape interval
    interval: 30s
    # -- Additional labels for the ServiceMonitor
    labels: {}

# -- Health probe configuration
health:
  # -- Health probe port
  port: 8081

# -- Additional environment variables
extraEnv: []

# -- Additional command-line arguments
extraArgs: []

# -- Additional volumes
extraVolumes: []

# -- Additional volume mounts
extraVolumeMounts: []

# -- CRD installation configuration
crds:
  # -- Install CRDs with the chart
  install: true
  # -- Keep CRDs on chart uninstall (prevents data loss)
  keep: true

# -- RBAC configuration
rbac:
  # -- Create RBAC resources
  create: true
