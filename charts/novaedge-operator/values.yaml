# Default values for novaedge-operator
# This is a YAML-formatted file.

# -- Number of operator replicas
replicaCount: 1

# -- Image configuration
image:
  # -- Image repository
  repository: ghcr.io/piwi3910/novaedge/novaedge-operator
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Image tag (defaults to chart appVersion)
  tag: ""

# -- Image pull secrets
imagePullSecrets: []

# -- Override the chart name
nameOverride: ""

# -- Override the full name
fullnameOverride: ""

# -- Service account configuration
serviceAccount:
  # -- Create a service account
  create: true
  # -- Annotations to add to the service account
  annotations: {}
  # -- The name of the service account to use
  name: ""

# -- Pod annotations
podAnnotations: {}

# -- Pod labels
podLabels: {}

# -- Pod security context
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# -- Container security context
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

# -- Resource requests and limits
resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

# -- Liveness probe configuration
livenessProbe:
  httpGet:
    path: /healthz
    port: 8081
  initialDelaySeconds: 15
  periodSeconds: 20

# -- Readiness probe configuration
readinessProbe:
  httpGet:
    path: /readyz
    port: 8081
  initialDelaySeconds: 5
  periodSeconds: 10

# -- Node selector for pod scheduling
nodeSelector: {}

# -- Tolerations for pod scheduling
tolerations: []

# -- Affinity rules for pod scheduling
affinity: {}

# -- Priority class name
priorityClassName: ""

# -- Leader election configuration
leaderElection:
  # -- Enable leader election
  enabled: true
  # -- Lease duration
  leaseDuration: 15s
  # -- Renew deadline
  renewDeadline: 10s
  # -- Retry period
  retryPeriod: 2s

# -- Logging configuration
logging:
  # -- Log level: debug, info, warn, error
  level: info
  # -- Log format: json, text
  format: json

# -- Metrics configuration
metrics:
  # -- Enable Prometheus metrics
  enabled: true
  # -- Metrics service port
  port: 8080
  # -- Service monitor configuration for Prometheus Operator
  serviceMonitor:
    # -- Enable ServiceMonitor creation
    enabled: false
    # -- Scrape interval
    interval: 30s
    # -- Additional labels for the ServiceMonitor
    labels: {}

# -- Health probe configuration
health:
  # -- Health probe port
  port: 8081

# -- Additional environment variables
extraEnv: []

# -- Additional command-line arguments
extraArgs: []

# -- Additional volumes
extraVolumes: []

# -- Additional volume mounts
extraVolumeMounts: []

# -- Pod disruption budget
podDisruptionBudget:
  # -- Enable PDB
  enabled: false
  # -- Minimum available pods
  minAvailable: 1

# -- Webhook configuration for federation CRD validation
webhooks:
  # -- Enable admission webhooks
  enabled: false
  # -- Webhook service port
  port: 9443
  # -- TLS certificate configuration
  certManager:
    # -- Use cert-manager for webhook certificates
    enabled: false
    # -- Issuer reference
    issuerRef: ""
    issuerKind: ClusterIssuer
  # -- Manual TLS certificate secret (when not using cert-manager)
  certSecretName: ""

# -- Managed component image configuration
# Override images for components the operator deploys
managedImages:
  controller:
    repository: ""
    tag: ""
  agent:
    repository: ""
    tag: ""
  novactl:
    repository: ""
    tag: ""

# -- CRD installation configuration
crds:
  # -- Install CRDs with the chart
  install: true
  # -- Keep CRDs on chart uninstall (prevents data loss)
  keep: true

# -- Network policy configuration
networkPolicy:
  # -- Enable NetworkPolicy for the operator
  enabled: false
  # -- Pod selector labels for Prometheus (if empty, allows all pods in namespace)
  # prometheusSelector:
  #   app.kubernetes.io/name: prometheus
  # -- Namespace selector for Prometheus
  # prometheusNamespaceSelector:
  #   kubernetes.io/metadata.name: monitoring
  # -- Extra ingress rules
  # extraIngress: []
  # -- Extra egress rules
  # extraEgress: []

# -- RBAC configuration
rbac:
  # -- Create RBAC resources
  create: true

# -- Federation configuration for multi-controller deployments
# This creates a NovaEdgeFederation resource when the operator is deployed
federation:
  # -- Enable federation mode
  enabled: false
  # -- Federation ID (must be the same across all federated controllers)
  federationID: ""
  # -- Local member configuration
  localMember:
    # -- Unique name for this controller in the federation
    name: ""
    # -- Geographic region
    region: ""
    # -- Availability zone
    zone: ""
    # -- gRPC endpoint for federation communication
    endpoint: ""
  # -- Peer controllers in the federation
  members: []
  # Example:
  # - name: controller-dc2
  #   endpoint: controller-dc2.novaedge.example.com:9090
  #   region: us-east
  #   tls:
  #     enabled: true
  #     caSecretRef:
  #       name: novaedge-federation-ca
  #     clientCertSecretRef:
  #       name: novaedge-federation-client-cert

  # -- Synchronization settings
  sync:
    # -- How often to sync with peers
    interval: 5s
    # -- Timeout for sync operations
    timeout: 30s
    # -- Maximum resources per sync batch
    batchSize: 100
    # -- Enable compression for sync traffic
    compression: true

  # -- Conflict resolution settings
  conflictResolution:
    # -- Strategy: LastWriterWins, Merge, or Manual
    strategy: LastWriterWins
    # -- Enable vector clocks for change ordering
    vectorClocks: true
    # -- How long to keep deletion records
    tombstoneTTL: 24h

  # -- Health check settings for federation members
  healthCheck:
    # -- How often to check peer health
    interval: 10s
    # -- Timeout for health checks
    timeout: 5s
    # -- Number of failures before marking unhealthy
    failureThreshold: 3
    # -- Number of successes before marking healthy
    successThreshold: 1

  # -- Split-brain detection and protection
  splitBrain:
    # -- Enable split-brain detection
    enabled: true
    # -- How long without peer contact before declaring partition
    partitionTimeout: 30s
    # -- Quorum mode: Controllers or AgentAssisted
    quorumMode: Controllers
    # -- Require quorum for write operations
    quorumRequired: false
    # -- Enable write fencing during confirmed partition
    fencingEnabled: false
    # -- Grace period after partition heals
    healingGracePeriod: 5s
    # -- Automatically resolve conflicts when partition heals
    autoResolveOnHeal: true
    # -- Agent-assisted quorum settings (only for quorumMode: AgentAssisted)
    agentQuorum:
      # -- Voting weight of each controller
      controllerWeight: 10
      # -- Voting weight of each agent
      agentWeight: 1
      # -- Minimum agents required for quorum
      minAgentsForQuorum: 1
