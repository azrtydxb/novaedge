apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "novaedge-operator.fullname" . }}
  labels:
    {{- include "novaedge-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "novaedge-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "novaedge-operator.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "novaedge-operator.serviceAccountName" . }}
      {{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "novaedge-operator.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --metrics-bind-address=:{{ .Values.metrics.port }}
            - --health-probe-bind-address=:{{ .Values.health.port }}
            - --log-level={{ .Values.logging.level }}
            - --log-format={{ .Values.logging.format }}
            {{- if .Values.leaderElection.enabled }}
            - --leader-elect=true
            - --leader-elect-lease-duration={{ .Values.leaderElection.leaseDuration }}
            - --leader-elect-renew-deadline={{ .Values.leaderElection.renewDeadline }}
            - --leader-elect-retry-period={{ .Values.leaderElection.retryPeriod }}
            {{- end }}
            {{- if .Values.webhooks.enabled }}
            - --webhook-port={{ .Values.webhooks.port }}
            {{- end }}
            {{- if .Values.managedImages.controller.repository }}
            - --controller-image={{ .Values.managedImages.controller.repository }}:{{ .Values.managedImages.controller.tag | default .Chart.AppVersion }}
            {{- end }}
            {{- if .Values.managedImages.agent.repository }}
            - --agent-image={{ .Values.managedImages.agent.repository }}:{{ .Values.managedImages.agent.tag | default .Chart.AppVersion }}
            {{- end }}
            {{- if .Values.managedImages.novactl.repository }}
            - --novactl-image={{ .Values.managedImages.novactl.repository }}:{{ .Values.managedImages.novactl.tag | default .Chart.AppVersion }}
            {{- end }}
            {{- with .Values.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
            - name: health
              containerPort: {{ .Values.health.port }}
              protocol: TCP
            {{- if .Values.webhooks.enabled }}
            - name: webhook
              containerPort: {{ .Values.webhooks.port }}
              protocol: TCP
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- with .Values.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
          {{- if .Values.webhooks.enabled }}
            - name: webhook-certs
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
          {{- end }}
          {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
      {{- if .Values.webhooks.enabled }}
        - name: webhook-certs
          secret:
            secretName: {{ .Values.webhooks.certSecretName | default (printf "%s-webhook-certs" (include "novaedge-operator.fullname" .)) }}
      {{- end }}
      {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
