{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "novaedge-agent.fullname" . }}
  labels:
    {{- include "novaedge-agent.labels" . | nindent 4 }}
rules:
  # Read endpoints and services for backend discovery
  - apiGroups: [""]
    resources: ["endpoints", "services", "pods", "nodes"]
    verbs: ["get", "list", "watch"]
  # Read secrets for TLS certificates
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  # Read NovaEdge CRDs
  - apiGroups: ["novaedge.io"]
    resources: ["proxygateways", "proxyroutes", "proxybackends", "proxypolicies", "proxyvips"]
    verbs: ["get", "list", "watch"]
  # Update status on local resources if needed
  - apiGroups: ["novaedge.io"]
    resources: ["proxygateways/status", "proxyroutes/status", "proxybackends/status"]
    verbs: ["get", "update", "patch"]
  # EndpointSlices for newer Kubernetes versions
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
  # Events for debugging
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "novaedge-agent.fullname" . }}
  labels:
    {{- include "novaedge-agent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "novaedge-agent.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "novaedge-agent.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
