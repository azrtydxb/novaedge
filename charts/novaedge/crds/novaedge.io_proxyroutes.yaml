apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: proxyroutes.novaedge.io
spec:
  group: novaedge.io
  names:
    kind: ProxyRoute
    listKind: ProxyRouteList
    plural: proxyroutes
    singular: proxyroute
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.hostnames
      name: Hostnames
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ProxyRoute defines routing rules for HTTP requests
        properties:
          apiVersion:
            description: 'APIVersion defines the versioned schema of this representation
              of an object.

              Servers should convert recognized schemas to the latest internal value,
              and

              may reject unrecognized values.

              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources'
            type: string
          kind:
            description: 'Kind is a string value representing the REST resource this
              object represents.

              Servers may infer this from the endpoint the client submits requests
              to.

              Cannot be updated.

              In CamelCase.

              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds'
            type: string
          metadata:
            type: object
          spec:
            description: ProxyRouteSpec defines the desired state of ProxyRoute
            properties:
              accessLog:
                description: |-
                  AccessLog defines per-route access logging configuration
                  Overrides gateway-level access log settings for this route
                properties:
                  enabled:
                    description: Enabled enables access logging for this route
                    type: boolean
                  filePath:
                    description: FilePath is the path to the log file
                    type: string
                  filterStatusCodes:
                    description: FilterStatusCodes limits logging to specific HTTP
                      status codes
                    items:
                      format: int32
                      type: integer
                    type: array
                  format:
                    description: Format specifies the log format (json, clf, custom)
                    enum:
                    - json
                    - clf
                    - custom
                    type: string
                  maxBackups:
                    description: MaxBackups is the maximum number of rotated log files
                      to retain
                    format: int32
                    type: integer
                  maxSize:
                    description: MaxSize is the maximum size of a log file before
                      rotation (e.g., "100Mi")
                    type: string
                  output:
                    description: Output defines where logs are written (stdout, file,
                      both)
                    enum:
                    - stdout
                    - file
                    - both
                    type: string
                  sampleRate:
                    description: SampleRate defines the fraction of requests to log
                      (0.0-1.0)
                    type: string
                  template:
                    description: Template defines a custom log format template (for
                      format=custom)
                    type: string
                type: object
              expression:
                description: Boolean routing expression for advanced matching
                type: string
              hostnames:
                description: Hostnames defines the hostnames for which this route
                  applies
                items:
                  type: string
                type: array
              pipeline:
                description: Composable middleware pipeline for this route
                properties:
                  middleware:
                    description: Ordered list of middleware references
                    items:
                      properties:
                        config:
                          additionalProperties:
                            type: string
                          description: Optional key-value configuration
                          type: object
                        name:
                          description: Middleware name
                          type: string
                        priority:
                          default: 100
                          description: Execution order (lower = earlier)
                          type: integer
                        type:
                          description: 'Middleware type: builtin or wasm'
                          enum:
                          - builtin
                          - wasm
                          type: string
                      required:
                      - type
                      - name
                      type: object
                    maxItems: 32
                    type: array
                type: object
              rules:
                description: Rules are a list of HTTP routing rules
                items:
                  description: HTTPRouteRule defines semantics for matching an HTTP
                    request and routing it
                  properties:
                    backendRefs:
                      description: BackendRefs references the backends to route to
                        with optional weights
                      items:
                        description: BackendRef references a backend for routing
                        properties:
                          name:
                            description: Name is the name of the ProxyBackend
                            type: string
                          namespace:
                            description: Namespace is the namespace of the ProxyBackend
                              (defaults to route namespace)
                            type: string
                          weight:
                            default: 1
                            description: Weight defines the proportion of requests
                              sent to this backend
                            format: int32
                            minimum: 0
                            type: integer
                        required:
                        - name
                        type: object
                      maxItems: 16
                      minItems: 1
                      type: array
                    filters:
                      description: Filters define processing steps that must be completed
                        during the request or response lifecycle
                      items:
                        description: HTTPRouteFilter defines processing steps that
                          must be completed during the request or response lifecycle
                        properties:
                          add:
                            description: Add contains headers to add (for AddHeader
                              type)
                            items:
                              description: HTTPHeader represents an HTTP header name
                                and value
                              properties:
                                name:
                                  description: Name is the name of the header
                                  minLength: 1
                                  type: string
                                value:
                                  description: Value is the value of the header
                                  type: string
                              required:
                              - name
                              - value
                              type: object
                            type: array
                          mirrorBackend:
                            description: MirrorBackend specifies the backend to mirror
                              requests to (for RequestMirror type)
                            properties:
                              name:
                                description: Name is the name of the ProxyBackend
                                type: string
                              namespace:
                                description: Namespace is the namespace of the ProxyBackend
                                  (defaults to route namespace)
                                type: string
                              weight:
                                default: 1
                                description: Weight defines the proportion of requests
                                  sent to this backend
                                format: int32
                                minimum: 0
                                type: integer
                            required:
                            - name
                            type: object
                          mirrorPercent:
                            default: 100
                            description: MirrorPercent specifies the percentage of
                              requests to mirror (0-100)
                            format: int32
                            maximum: 100
                            minimum: 0
                            type: integer
                          redirectURL:
                            description: RedirectURL is the URL to redirect to (for
                              RequestRedirect type)
                            type: string
                          remove:
                            description: Remove contains header names to remove (for
                              RemoveHeader type)
                            items:
                              type: string
                            type: array
                          responseAdd:
                            description: ResponseAdd contains headers to add to the
                              response (for ResponseAddHeader type)
                            items:
                              description: HTTPHeader represents an HTTP header name
                                and value
                              properties:
                                name:
                                  description: Name is the name of the header
                                  minLength: 1
                                  type: string
                                value:
                                  description: Value is the value of the header
                                  type: string
                              required:
                              - name
                              - value
                              type: object
                            type: array
                          responseRemove:
                            description: ResponseRemove contains header names to remove
                              from the response (for ResponseRemoveHeader type)
                            items:
                              type: string
                            type: array
                          responseSet:
                            description: 'ResponseSet contains headers to set on the
                              response (for ResponseSetHeader type)

                              These headers will replace any existing values'
                            items:
                              description: HTTPHeader represents an HTTP header name
                                and value
                              properties:
                                name:
                                  description: Name is the name of the header
                                  minLength: 1
                                  type: string
                                value:
                                  description: Value is the value of the header
                                  type: string
                              required:
                              - name
                              - value
                              type: object
                            type: array
                          rewritePath:
                            description: RewritePath is the path to rewrite to (for
                              URLRewrite type)
                            type: string
                          type:
                            description: Type identifies the type of filter to apply
                            enum:
                            - AddHeader
                            - RemoveHeader
                            - RequestRedirect
                            - URLRewrite
                            - RequestMirror
                            - ResponseAddHeader
                            - ResponseRemoveHeader
                            - ResponseSetHeader
                            type: string
                        required:
                        - type
                        type: object
                      maxItems: 16
                      type: array
                    matches:
                      description: Matches define conditions used for matching the
                        rule against incoming requests
                      items:
                        description: HTTPRouteMatch defines a match for an HTTP request
                        properties:
                          headers:
                            description: Headers specifies HTTP request header matchers
                            items:
                              description: HTTPHeaderMatch describes how to match
                                an HTTP header
                              properties:
                                name:
                                  description: Name is the name of the HTTP header
                                  minLength: 1
                                  type: string
                                type:
                                  default: Exact
                                  description: Type specifies how to match against
                                    the header value
                                  enum:
                                  - Exact
                                  - RegularExpression
                                  type: string
                                value:
                                  description: Value is the value of the header
                                  type: string
                              required:
                              - name
                              - value
                              type: object
                            maxItems: 16
                            type: array
                          method:
                            description: Method matches the HTTP method
                            enum:
                            - GET
                            - HEAD
                            - POST
                            - PUT
                            - PATCH
                            - DELETE
                            - CONNECT
                            - OPTIONS
                            - TRACE
                            type: string
                          path:
                            description: Path specifies a HTTP request path matcher
                            properties:
                              type:
                                description: Type specifies how to match against the
                                  path value
                                enum:
                                - Exact
                                - PathPrefix
                                - RegularExpression
                                type: string
                              value:
                                description: Value is the path to match
                                minLength: 1
                                type: string
                            required:
                            - type
                            - value
                            type: object
                          queryParams:
                            description: QueryParams specifies HTTP query parameter
                              matchers
                            items:
                              description: HTTPQueryParamMatch describes how to match
                                a query parameter
                              properties:
                                name:
                                  description: Name is the name of the query parameter
                                  minLength: 1
                                  type: string
                                type:
                                  default: Exact
                                  description: Type specifies how to match against
                                    the query parameter value
                                  enum:
                                  - Exact
                                  - RegularExpression
                                  type: string
                                value:
                                  description: Value is the value of the query parameter
                                  type: string
                              required:
                              - name
                              - value
                              type: object
                            maxItems: 16
                            type: array
                        type: object
                      maxItems: 8
                      type: array
                    maxRequestBodySize:
                      description: 'MaxRequestBodySize is the maximum request body
                        size for this rule (0 = unlimited)

                        Overrides the listener-level setting for this specific route'
                      format: int64
                      type: integer
                    limits:
                      description: Limits defines per-route request size limits and
                        timeouts
                      properties:
                        maxRequestBodySize:
                          description: MaxRequestBodySize is the maximum request body
                            size (e.g., "10Mi", "1048576")
                          type: string
                        requestTimeout:
                          description: RequestTimeout is the total request timeout
                            (e.g., "30s", "1m")
                          type: string
                        idleTimeout:
                          description: IdleTimeout is the connection idle timeout
                            (e.g., "60s")
                          type: string
                      type: object
                    buffering:
                      description: Buffering defines request and response buffering
                        settings
                      properties:
                        request:
                          description: Request enables buffering the entire request
                            body before forwarding
                          type: boolean
                        response:
                          description: Response enables buffering the entire response
                            body before sending to client
                          type: boolean
                        maxSize:
                          description: MaxSize is the maximum buffer size (e.g.,
                            "50Mi", "52428800")
                          type: string
                      type: object
                    timeout:
                      description: Timeout is the request timeout for this rule
                      type: string
                  required:
                  - backendRefs
                  type: object
                maxItems: 16
                minItems: 1
                type: array
            required:
            - rules
            type: object
          status:
            description: ProxyRouteStatus defines the observed state of ProxyRoute
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the route's state
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: 'lastTransitionTime is the last time the condition
                        transitioned from one status to another.

                        This should be when the underlying condition changed.  If
                        that is not known, then using the time when the API field
                        changed is acceptable.'
                      format: date-time
                      type: string
                    message:
                      description: 'message is a human readable message indicating
                        details about the transition.

                        This may be an empty string.'
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: 'observedGeneration represents the .metadata.generation
                        that the condition was set based upon.

                        For instance, if .metadata.generation is currently 12, but
                        the .status.conditions[x].observedGeneration is 9, the condition
                        is out of date

                        with respect to the current state of the instance.'
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: 'reason contains a programmatic identifier indicating
                        the reason for the condition''s last transition.

                        Producers of specific condition types may define expected
                        values and meanings for this field,

                        and whether the values are considered a guaranteed API.

                        The value should be a CamelCase string.

                        This field may not be empty.'
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - 'True'
                      - 'False'
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                  by the controller
                format: int64
                type: integer
            type: object
        type: object
