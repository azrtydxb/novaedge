# Default values for NovaEdge
# This is a YAML-formatted file.

# Global settings
global:
  # Image pull secrets for private registries
  imagePullSecrets: []
  # Override the namespace
  namespace: ""

# Controller settings
controller:
  enabled: true
  replicaCount: 3

  image:
    repository: ghcr.io/azrtydxb/novaedge/novaedge-controller
    tag: ""  # Defaults to Chart.appVersion
    pullPolicy: IfNotPresent

  serviceAccount:
    create: true
    name: ""
    annotations: {}

  # Pod annotations
  podAnnotations: {}

  # Pod labels
  podLabels: {}

  # Priority class name
  priorityClassName: ""

  # Leader election for HA
  leaderElection:
    enabled: true
    leaseDuration: 15s
    renewDeadline: 10s
    retryPeriod: 2s

  # Logging configuration
  logging:
    level: info
    format: json

  # Metrics configuration
  metrics:
    enabled: true
    port: 8080
    serviceMonitor:
      enabled: false
      interval: 30s
      scrapeTimeout: 10s
      labels: {}

  # Health probes
  healthProbe:
    port: 8081

  # gRPC server for agent communication
  grpc:
    port: 8082
    # TLS configuration for gRPC server
    tls:
      enabled: false
      # Secret containing TLS certificate and key
      certSecretName: ""
      # CA certificate secret for client verification (mTLS)
      caSecretName: ""

  # Controller class (only process resources with matching class)
  controllerClass: ""

  # Ingress class name to watch
  ingressClass: novaedge

  # Enable ServiceLB controller
  serviceLB:
    enabled: true

  # Certificate management
  certificates:
    # ACME/Let's Encrypt configuration
    acme:
      enabled: false
      # ACME server URL (use staging for testing)
      server: "https://acme-v02.api.letsencrypt.org/directory"
      # Email for ACME account
      email: ""
      # Default challenge type: http-01, dns-01, tls-alpn-01
      defaultChallenge: http-01
      # DNS-01 provider: cloudflare, route53, google
      dnsProvider: ""
      # Secret containing DNS provider credentials
      dnsCredentialsSecretName: ""
    # cert-manager integration
    certManager:
      enabled: false
      # ClusterIssuer or Issuer name
      issuerRef: ""
      issuerKind: ClusterIssuer
    # HashiCorp Vault PKI
    vault:
      enabled: false
      address: ""
      # Vault authentication method: token, kubernetes, approle
      authMethod: kubernetes
      # Vault PKI role
      role: ""
      # Vault PKI mount path
      mountPath: pki
      # Secret containing Vault token or credentials
      credentialsSecretName: ""

  # Mesh certificate authority
  meshCA:
    enabled: false
    # Key algorithm: ecdsa-p256, ecdsa-p384, rsa-2048
    keyAlgorithm: ecdsa-p256
    # Certificate lifetime
    certLifetime: 24h
    # CA certificate validity
    caValidity: 87600h

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

  nodeSelector: {}
  tolerations: []
  affinity: {}

  # Go runtime tuning
  # GOMEMLIMIT sets the soft memory limit for the Go garbage collector.
  # Should be ~90% of the container memory limit to avoid OOM kills.
  goMemLimit: "460MiB"
  # GOGC sets the garbage collection target percentage.
  # 100 is the Go default, suitable for the controller's workload.
  goGC: "100"
  # GOMAXPROCS limits the number of OS threads for Go goroutines.
  # Defaults to the number of CPU cores available. Set to match CPU limits.
  goMaxProcs: ""

  # Additional environment variables
  extraEnv: []

  # Additional command-line arguments
  extraArgs: []

  # Additional volumes
  extraVolumes: []

  # Additional volume mounts
  extraVolumeMounts: []

  # Pod disruption budget
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  # Network policy
  networkPolicy:
    enabled: false
    # Pod selector labels for Prometheus (if empty, allows all pods in namespace)
    # prometheusSelector:
    #   app.kubernetes.io/name: prometheus
    # Namespace selector for Prometheus
    # prometheusNamespaceSelector:
    #   kubernetes.io/metadata.name: monitoring
    # Extra ingress rules
    # extraIngress: []
    # Extra egress rules
    # extraEgress: []

  # Horizontal pod autoscaler
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80

# Agent settings (DaemonSet)
agent:
  enabled: true

  image:
    repository: ghcr.io/azrtydxb/novaedge/novaedge-agent
    tag: ""  # Defaults to Chart.appVersion
    pullPolicy: IfNotPresent

  serviceAccount:
    create: true
    name: ""
    annotations: {}

  # Pod annotations
  podAnnotations: {}

  # Pod labels
  podLabels: {}

  # Priority class name (default: system-node-critical)
  priorityClassName: system-node-critical

  # Node selector for edge nodes
  nodeSelector: {}
    # novaedge.io/role: edge

  # Tolerations for running on control plane nodes
  tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule
  - key: node-role.kubernetes.io/master
    operator: Exists
    effect: NoSchedule

  # Proxy ports
  ports:
    http: 80
    https: 443

  # Logging configuration
  logging:
    level: info
    format: json

  # Metrics configuration
  metrics:
    enabled: true
    port: 9090
    serviceMonitor:
      enabled: false
      interval: 30s
      scrapeTimeout: 10s
      labels: {}

  # Health probes
  healthProbe:
    port: 9091

  # Readiness probe configuration
  # The agent readiness depends on receiving its first config snapshot from the
  # controller via gRPC. Increase these values if the controller takes longer
  # to become ready (e.g. in CI or resource-constrained environments).
  readinessProbe:
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6

  # Liveness probe configuration
  livenessProbe:
    initialDelaySeconds: 30
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3

  resources:
    limits:
      cpu: 2000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 256Mi

  # Update strategy
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1

  # Network policy
  networkPolicy:
    enabled: false
    # prometheusSelector:
    #   app.kubernetes.io/name: prometheus
    # prometheusNamespaceSelector:
    #   kubernetes.io/metadata.name: monitoring
    # extraIngress: []
    # extraEgress: []

  # Pod disruption budget
  podDisruptionBudget:
    enabled: true
    maxUnavailable: 1

  # Go runtime tuning
  # GOMEMLIMIT sets the soft memory limit for the Go garbage collector.
  # Should be ~90% of the container memory limit to avoid OOM kills.
  goMemLimit: "900MiB"
  # GOGC sets the garbage collection target percentage.
  # Higher values reduce GC frequency at the cost of more memory usage.
  # 200 is appropriate for latency-sensitive data-plane workloads.
  goGC: "200"
  # GOMAXPROCS limits the number of OS threads for Go goroutines.
  # Defaults to the number of CPU cores available. Set to match CPU limits.
  goMaxProcs: ""

  # Additional environment variables
  extraEnv: []

  # Additional command-line arguments
  extraArgs: []

  # Additional volumes
  extraVolumes: []

  # Additional volume mounts
  extraVolumeMounts: []

  # Service mesh configuration
  mesh:
    enabled: true

  # eBPF acceleration (requires kernel 5.9+ with BPF support)
  # When enabled, adds SYS_BPF/SYS_RESOURCE capabilities, mounts bpffs,
  # and relaxes seccomp to allow the bpf() syscall.
  # The agent will use eBPF sk_lookup for mesh interception (instead of
  # nftables) and SOCKMAP for same-node traffic acceleration.
  ebpf:
    enabled: true

  # Tracing configuration
  tracing:
    enabled: false
    # OTLP endpoint
    endpoint: ""
    samplingRate: 10

# Dataplane settings (Rust eBPF sidecar in agent DaemonSet)
dataplane:
  enabled: true
  image:
    repository: ghcr.io/azrtydxb/novaedge/novaedge-dataplane
    tag: ""  # Defaults to Chart.appVersion
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi
  socketPath: /run/novaedge/dataplane.sock
  ebpfPath: /opt/novaedge/novaedge-ebpf

# Web UI settings
webui:
  enabled: true
  replicaCount: 1

  # Frontend container (nginx serving React SPA)
  frontend:
    image:
      repository: ghcr.io/azrtydxb/novaedge/novaedge-webui
      tag: ""  # Defaults to Chart.appVersion
      pullPolicy: IfNotPresent
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 25m
        memory: 32Mi

  # API backend container (novactl)
  image:
    repository: ghcr.io/azrtydxb/novaedge/novactl
    tag: ""  # Defaults to Chart.appVersion
    pullPolicy: IfNotPresent

  serviceAccount:
    create: true
    name: ""
    annotations: {}

  service:
    type: ClusterIP
    port: 80
    targetPort: 8080

  # Ingress configuration
  ingress:
    enabled: false
    className: ""
    annotations: {}
      # kubernetes.io/ingress.class: nginx
      # kubernetes.io/tls-acme: "true"
    hosts:
    - host: novaedge.local
      paths:
      - path: /
        pathType: Prefix
    tls: []
    # - secretName: novaedge-tls
    #   hosts:
    #   - novaedge.local

  # Prometheus endpoint for metrics
  prometheus:
    endpoint: ""  # e.g., http://prometheus.monitoring.svc.cluster.local:9090

  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi

  # Network policy
  networkPolicy:
    enabled: false
    # extraIngress: []
    # extraEgress: []

  nodeSelector: {}
  tolerations: []
  affinity: {}

# CRD installation
crds:
  # Install CRDs with the chart
  install: true
  # Keep CRDs on chart uninstall
  keep: true

# RBAC settings
rbac:
  create: true

# PostSync test hooks for ArgoCD CT (Continuous Testing)
tests:
  image: bitnami/kubectl:latest
  smoke:
    enabled: true
  integration:
    enabled: true

# Federation settings for multi-controller deployments
federation:
  # Enable federation mode
  enabled: false
  # Federation ID (must be the same across all federated controllers)
  federationID: ""
  # Local member configuration
  localMember:
    # Unique name for this controller in the federation
    name: ""
    # Geographic region
    region: ""
    # Availability zone
    zone: ""
    # gRPC endpoint for federation communication
    endpoint: ""
  # Peer controllers in the federation
  members: []
  # Example:
  # - name: controller-dc2
  #   endpoint: controller-dc2.novaedge.example.com:9090
  #   region: us-east
  #   tls:
  #     enabled: true
  #     caSecretRef:
  #       name: novaedge-federation-ca
  #     clientCertSecretRef:
  #       name: novaedge-federation-client-cert

  # Synchronization settings
  sync:
    interval: 5s
    timeout: 30s
    batchSize: 100
    compression: true

  # Conflict resolution settings
  conflictResolution:
    strategy: LastWriterWins
    vectorClocks: true
    tombstoneTTL: 24h

  # Health check settings
  healthCheck:
    interval: 10s
    timeout: 5s
    failureThreshold: 3
    successThreshold: 1

  # Split-brain detection and protection
  splitBrain:
    enabled: true
    partitionTimeout: 30s
    # Quorum mode: Controllers or AgentAssisted
    quorumMode: Controllers
    quorumRequired: false
    fencingEnabled: false
    healingGracePeriod: 5s
    autoResolveOnHeal: true
    # Agent-assisted quorum settings (only for quorumMode: AgentAssisted)
    agentQuorum:
      controllerWeight: 10
      agentWeight: 1
      minAgentsForQuorum: 1

  # Federation topology mode
  # hub-spoke: one hub controller, spoke controllers connect to hub
  # mesh: all controllers peer with each other
  # unified: single logical cluster across sites
  mode: mesh

  # Cross-cluster routing and endpoint configuration
  crossCluster:
    # Merge endpoints from remote clusters into local routing tables
    endpointMerging: true
    # Locality-aware routing preferences
    localityRouting:
      enabled: true
      # Override auto-detected locality (leave empty for auto-detection)
      localRegion: ""
      localZone: ""
      localCluster: ""
      # Minimum percentage of healthy local endpoints before spilling to remote
      minHealthyPercent: 0.7

  # Optional network tunnel for cross-cluster data-plane connectivity
  tunnel:
    enabled: false
    # Tunnel type: wireguard, ssh, websocket
    type: ""
    wireguard:
      privateKeySecretRef: ""
      peerPublicKey: ""
      peerEndpoint: ""
      allowedIPs: []
      persistentKeepalive: 25
    ssh:
      host: ""
      port: 22
      user: ""
      privateKeySecretRef: ""
      remoteAddr: ""
    websocket:
      url: ""
      tlsSecretRef: ""
