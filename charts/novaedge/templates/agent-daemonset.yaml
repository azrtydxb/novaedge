{{- if .Values.agent.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "novaedge.fullname" . }}-agent
  namespace: {{ include "novaedge.namespace" . }}
  labels:
    {{- include "novaedge.agent.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "novaedge.agent.selectorLabels" . | nindent 6 }}
  updateStrategy:
    {{- toYaml .Values.agent.updateStrategy | nindent 4 }}
  template:
    metadata:
      labels:
        {{- include "novaedge.agent.selectorLabels" . | nindent 8 }}
        {{- with .Values.agent.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ toYaml .Values.agent | sha256sum }}
        {{- if .Values.agent.metrics.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.agent.metrics.port }}"
        prometheus.io/path: "/metrics"
        {{- end }}
        {{- with .Values.agent.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: {{ include "novaedge.agent.serviceAccountName" . }}
      {{- if .Values.agent.priorityClassName }}
      priorityClassName: {{ .Values.agent.priorityClassName }}
      {{- end }}
      {{- with .Values.agent.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agent.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.agent.ebpf.enabled }}
      initContainers:
      - name: mount-bpffs
        image: {{ include "novaedge.agent.image" . }}
        imagePullPolicy: {{ .Values.agent.image.pullPolicy }}
        command:
        - sh
        - -c
        - |
          if ! mount | grep -q '/sys/fs/bpf type bpf'; then
            mount -t bpf bpf /sys/fs/bpf
          fi
          mkdir -p /sys/fs/bpf/novaedge
        securityContext:
          privileged: true
        volumeMounts:
        - name: bpffs
          mountPath: /sys/fs/bpf
          mountPropagation: Bidirectional
      {{- end }}
      containers:
      - name: agent
        image: {{ include "novaedge.agent.image" . }}
        imagePullPolicy: {{ .Values.agent.image.pullPolicy }}
        command:
        - /novaedge-agent
        args:
        - -controller-address={{ include "novaedge.fullname" . }}-controller.{{ include "novaedge.namespace" . }}.svc.cluster.local:{{ .Values.controller.grpc.port }}
        - -node-name=$(NODE_NAME)
        - -metrics-port={{ .Values.agent.metrics.port }}
        - -health-probe-port={{ .Values.agent.healthProbe.port }}
        - -log-level={{ .Values.agent.logging.level }}
        {{- if .Values.agent.mesh.enabled }}
        - -mesh-enabled
        {{- end }}
        {{- if and .Values.dataplane .Values.dataplane.enabled }}
        - --dataplane-socket={{ .Values.dataplane.socketPath }}
        {{- end }}
        {{- if .Values.agent.tracing.enabled }}
        - -tracing-enabled
        - -tracing-endpoint={{ .Values.agent.tracing.endpoint }}
        - -tracing-sampling-rate={{ .Values.agent.tracing.samplingRate }}
        {{- end }}
        {{- with .Values.agent.extraArgs }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: NODE_IP
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
        {{- if .Values.agent.goMemLimit }}
        - name: GOMEMLIMIT
          value: {{ .Values.agent.goMemLimit | quote }}
        {{- end }}
        {{- if .Values.agent.goGC }}
        - name: GOGC
          value: {{ .Values.agent.goGC | quote }}
        {{- end }}
        {{- if .Values.agent.goMaxProcs }}
        - name: GOMAXPROCS
          value: {{ .Values.agent.goMaxProcs | quote }}
        {{- end }}
        {{- with .Values.agent.extraEnv }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        ports:
        - name: metrics
          containerPort: {{ .Values.agent.metrics.port }}
          protocol: TCP
        - name: health
          containerPort: {{ .Values.agent.healthProbe.port }}
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
            scheme: HTTP
          initialDelaySeconds: {{ .Values.agent.livenessProbe.initialDelaySeconds | default 30 }}
          periodSeconds: {{ .Values.agent.livenessProbe.periodSeconds | default 20 }}
          timeoutSeconds: {{ .Values.agent.livenessProbe.timeoutSeconds | default 5 }}
          failureThreshold: {{ .Values.agent.livenessProbe.failureThreshold | default 3 }}
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
            scheme: HTTP
          initialDelaySeconds: {{ .Values.agent.readinessProbe.initialDelaySeconds | default 30 }}
          periodSeconds: {{ .Values.agent.readinessProbe.periodSeconds | default 10 }}
          timeoutSeconds: {{ .Values.agent.readinessProbe.timeoutSeconds | default 5 }}
          failureThreshold: {{ .Values.agent.readinessProbe.failureThreshold | default 6 }}
        resources:
          {{- toYaml .Values.agent.resources | nindent 10 }}
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
            - NET_RAW
            - NET_BIND_SERVICE
            {{- if .Values.agent.ebpf.enabled }}
            - BPF
            - PERFMON
            - SYS_RESOURCE
            {{- end }}
            drop:
            - ALL
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          seccompProfile:
            {{- if .Values.agent.ebpf.enabled }}
            type: Unconfined
            {{- else }}
            type: RuntimeDefault
            {{- end }}
        volumeMounts:
        - name: certs
          mountPath: /etc/novaedge/certs
          readOnly: true
        - name: config
          mountPath: /etc/novaedge/config
          readOnly: true
        {{- if .Values.agent.ebpf.enabled }}
        - name: bpffs
          mountPath: /sys/fs/bpf
        {{- end }}
        {{- if and .Values.dataplane .Values.dataplane.enabled }}
        - name: dataplane-socket
          mountPath: /run/novaedge
        {{- end }}
        {{- with .Values.agent.extraVolumeMounts }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- if and .Values.dataplane .Values.dataplane.enabled }}
      - name: novaedge-dataplane
        image: "{{ .Values.dataplane.image.repository }}:{{ .Values.dataplane.image.tag }}"
        imagePullPolicy: {{ .Values.dataplane.image.pullPolicy }}
        args:
        - --socket={{ .Values.dataplane.socketPath }}
        ports:
        - name: http
          containerPort: {{ .Values.agent.ports.http | default 80 }}
          hostPort: {{ .Values.agent.ports.http | default 80 }}
          protocol: TCP
        - name: https
          containerPort: {{ .Values.agent.ports.https | default 443 }}
          hostPort: {{ .Values.agent.ports.https | default 443 }}
          protocol: TCP
        securityContext:
          privileged: true
          capabilities:
            add:
            - NET_ADMIN
            - NET_RAW
        readinessProbe:
          exec:
            command:
            - test
            - -S
            - {{ .Values.dataplane.socketPath }}
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 3
        resources:
          {{- toYaml .Values.dataplane.resources | nindent 10 }}
        volumeMounts:
        - name: dataplane-socket
          mountPath: /run/novaedge
        - name: dataplane-bpffs
          mountPath: /sys/fs/bpf
      {{- end }}
      volumes:
      - name: certs
        emptyDir: {}
      - name: config
        configMap:
          name: {{ include "novaedge.fullname" . }}-agent-config
          optional: true
      {{- if .Values.agent.ebpf.enabled }}
      - name: bpffs
        hostPath:
          path: /sys/fs/bpf
          type: DirectoryOrCreate
      {{- end }}
      {{- if and .Values.dataplane .Values.dataplane.enabled }}
      - name: dataplane-socket
        emptyDir: {}
      - name: dataplane-bpffs
        hostPath:
          path: /sys/fs/bpf
          type: DirectoryOrCreate
      {{- end }}
      {{- with .Values.agent.extraVolumes }}
      {{- toYaml . | nindent 6 }}
      {{- end }}
      restartPolicy: Always
{{- end }}
