{{- if and .Values.agent.enabled .Values.rbac.create }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "novaedge.fullname" . }}-agent
  labels:
    {{- include "novaedge.agent.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - nodes
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "novaedge.fullname" . }}-agent
  labels:
    {{- include "novaedge.agent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "novaedge.fullname" . }}-agent
subjects:
- kind: ServiceAccount
  name: {{ include "novaedge.agent.serviceAccountName" . }}
  namespace: {{ include "novaedge.namespace" . }}
{{- end }}
