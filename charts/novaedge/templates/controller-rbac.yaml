{{- if and .Values.controller.enabled .Values.rbac.create }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "novaedge.fullname" . }}-controller
  labels:
    {{- include "novaedge.controller.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - secrets
  - serviceaccounts
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - nodes
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - apps
  resources:
  - daemonsets
  - deployments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - discovery.k8s.io
  resources:
  - endpointslices
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - gateway.networking.k8s.io
  resources:
  - gatewayclasses
  - gateways
  - grpcroutes
  - httproutes
  - tcproutes
  - tlsroutes
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - gateway.networking.k8s.io
  resources:
  - gatewayclasses/status
  - gateways/status
  - grpcroutes/status
  - httproutes/status
  - tcproutes/status
  - tlsroutes/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - networking.k8s.io
  resources:
  - ingresses
  - ingressclasses
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - networking.k8s.io
  resources:
  - ingresses/finalizers
  verbs:
  - update
- apiGroups:
  - networking.k8s.io
  resources:
  - ingresses/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - novaedge.io
  resources:
  - novaedgeclusters
  - novaedgefederations
  - novaedgeremoteclusters
  - proxybackends
  - proxycertificates
  - proxygateways
  - proxyippools
  - proxypolicies
  - proxyroutes
  - proxyvips
  - proxywanlinks
  - proxywanpolicies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - novaedge.io
  resources:
  - novaedgeclusters/finalizers
  - novaedgefederations/finalizers
  - novaedgeremoteclusters/finalizers
  - proxybackends/finalizers
  - proxycertificates/finalizers
  - proxygateways/finalizers
  - proxyippools/finalizers
  - proxypolicies/finalizers
  - proxyroutes/finalizers
  - proxyvips/finalizers
  - proxywanlinks/finalizers
  - proxywanpolicies/finalizers
  verbs:
  - update
- apiGroups:
  - novaedge.io
  resources:
  - novaedgeclusters/status
  - novaedgefederations/status
  - novaedgeremoteclusters/status
  - proxybackends/status
  - proxycertificates/status
  - proxygateways/status
  - proxyippools/status
  - proxypolicies/status
  - proxyroutes/status
  - proxyvips/status
  - proxywanlinks/status
  - proxywanpolicies/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - clusterrolebindings
  - clusterroles
  - rolebindings
  - roles
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "novaedge.fullname" . }}-controller
  labels:
    {{- include "novaedge.controller.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "novaedge.fullname" . }}-controller
subjects:
- kind: ServiceAccount
  name: {{ include "novaedge.controller.serviceAccountName" . }}
  namespace: {{ include "novaedge.namespace" . }}
{{- end }}
