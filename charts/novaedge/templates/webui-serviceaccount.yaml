{{- if .Values.webui.enabled }}
{{- if .Values.webui.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "novaedge.webui.serviceAccountName" . }}
  namespace: {{ include "novaedge.namespace" . }}
  labels:
    {{- include "novaedge.webui.labels" . | nindent 4 }}
  {{- with .Values.webui.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
