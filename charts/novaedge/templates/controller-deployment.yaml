{{- if .Values.controller.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "novaedge.fullname" . }}-controller
  namespace: {{ include "novaedge.namespace" . }}
  labels:
    {{- include "novaedge.controller.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.controller.replicaCount }}
  selector:
    matchLabels:
      {{- include "novaedge.controller.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "novaedge.controller.selectorLabels" . | nindent 8 }}
        {{- with .Values.controller.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ toYaml .Values.controller | sha256sum }}
        {{- if .Values.controller.metrics.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.controller.metrics.port }}"
        prometheus.io/path: "/metrics"
        {{- end }}
        {{- with .Values.controller.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "novaedge.controller.serviceAccountName" . }}
      {{- if .Values.controller.priorityClassName }}
      priorityClassName: {{ .Values.controller.priorityClassName }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: controller
        image: {{ include "novaedge.controller.image" . }}
        imagePullPolicy: {{ .Values.controller.image.pullPolicy }}
        command:
        - /novaedge-controller
        args:
        {{- if .Values.controller.leaderElection.enabled }}
        - --leader-elect
        {{- end }}
        - --metrics-bind-address=:{{ .Values.controller.metrics.port }}
        - --health-probe-bind-address=:{{ .Values.controller.healthProbe.port }}
        - --grpc-bind-address=:{{ .Values.controller.grpc.port }}
        {{- if eq .Values.controller.logging.format "json" }}
        - --zap-encoder=json
        {{- else }}
        - --zap-encoder=console
        {{- end }}
        - --zap-log-level={{ .Values.controller.logging.level }}
        {{- if .Values.controller.controllerClass }}
        - --controller-class={{ .Values.controller.controllerClass }}
        {{- end }}
        {{- /* NOTE: ingress class is hardcoded to "novaedge" in the controller binary */}}
        {{- if .Values.controller.grpc.tls.enabled }}
        - --grpc-tls-cert-file=/etc/novaedge/grpc-tls/tls.crt
        - --grpc-tls-key-file=/etc/novaedge/grpc-tls/tls.key
        {{- if .Values.controller.grpc.tls.caSecretName }}
        - --grpc-tls-ca-file=/etc/novaedge/grpc-tls/ca.crt
        {{- end }}
        {{- end }}
        {{- if .Values.controller.certificates.acme.enabled }}
        - --acme-enabled
        - --acme-server={{ .Values.controller.certificates.acme.server }}
        {{- if .Values.controller.certificates.acme.email }}
        - --acme-email={{ .Values.controller.certificates.acme.email }}
        {{- end }}
        - --acme-challenge={{ .Values.controller.certificates.acme.defaultChallenge }}
        {{- if .Values.controller.certificates.acme.dnsProvider }}
        - --acme-dns-provider={{ .Values.controller.certificates.acme.dnsProvider }}
        {{- end }}
        {{- end }}
        {{- if .Values.controller.certificates.certManager.enabled }}
        - --cert-manager-enabled
        {{- if .Values.controller.certificates.certManager.issuerRef }}
        - --cert-manager-issuer-ref={{ .Values.controller.certificates.certManager.issuerRef }}
        - --cert-manager-issuer-kind={{ .Values.controller.certificates.certManager.issuerKind }}
        {{- end }}
        {{- end }}
        {{- if .Values.controller.certificates.vault.enabled }}
        - --vault-enabled
        - --vault-address={{ .Values.controller.certificates.vault.address }}
        - --vault-auth-method={{ .Values.controller.certificates.vault.authMethod }}
        - --vault-pki-role={{ .Values.controller.certificates.vault.role }}
        - --vault-pki-mount-path={{ .Values.controller.certificates.vault.mountPath }}
        {{- end }}
        {{- if .Values.controller.meshCA.enabled }}
        - --mesh-ca-enabled
        - --mesh-ca-key-algorithm={{ .Values.controller.meshCA.keyAlgorithm }}
        - --mesh-ca-cert-lifetime={{ .Values.controller.meshCA.certLifetime }}
        - --mesh-ca-validity={{ .Values.controller.meshCA.caValidity }}
        {{- end }}
        {{- with .Values.controller.extraArgs }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        env:
        {{- if .Values.controller.goMemLimit }}
        - name: GOMEMLIMIT
          value: {{ .Values.controller.goMemLimit | quote }}
        {{- end }}
        {{- if .Values.controller.goGC }}
        - name: GOGC
          value: {{ .Values.controller.goGC | quote }}
        {{- end }}
        {{- if .Values.controller.goMaxProcs }}
        - name: GOMAXPROCS
          value: {{ .Values.controller.goMaxProcs | quote }}
        {{- end }}
        {{- with .Values.controller.extraEnv }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        ports:
        - name: metrics
          containerPort: {{ .Values.controller.metrics.port }}
          protocol: TCP
        - name: health
          containerPort: {{ .Values.controller.healthProbe.port }}
          protocol: TCP
        - name: grpc
          containerPort: {{ .Values.controller.grpc.port }}
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          {{- toYaml .Values.controller.resources | nindent 10 }}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        volumeMounts:
        {{- if .Values.controller.grpc.tls.enabled }}
        - name: grpc-tls
          mountPath: /etc/novaedge/grpc-tls
          readOnly: true
        {{- end }}
        {{- if and .Values.controller.certificates.acme.enabled .Values.controller.certificates.acme.dnsCredentialsSecretName }}
        - name: acme-dns-credentials
          mountPath: /etc/novaedge/acme
          readOnly: true
        {{- end }}
        {{- if and .Values.controller.certificates.vault.enabled .Values.controller.certificates.vault.credentialsSecretName }}
        - name: vault-credentials
          mountPath: /etc/novaedge/vault
          readOnly: true
        {{- end }}
        {{- with .Values.controller.extraVolumeMounts }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      volumes:
      {{- if .Values.controller.grpc.tls.enabled }}
      - name: grpc-tls
        secret:
          secretName: {{ .Values.controller.grpc.tls.certSecretName }}
      {{- end }}
      {{- if and .Values.controller.certificates.acme.enabled .Values.controller.certificates.acme.dnsCredentialsSecretName }}
      - name: acme-dns-credentials
        secret:
          secretName: {{ .Values.controller.certificates.acme.dnsCredentialsSecretName }}
      {{- end }}
      {{- if and .Values.controller.certificates.vault.enabled .Values.controller.certificates.vault.credentialsSecretName }}
      - name: vault-credentials
        secret:
          secretName: {{ .Values.controller.certificates.vault.credentialsSecretName }}
      {{- end }}
      {{- with .Values.controller.extraVolumes }}
      {{- toYaml . | nindent 6 }}
      {{- end }}
      {{- with .Values.controller.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
