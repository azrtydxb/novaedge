{{- if .Values.webui.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "novaedge.fullname" . }}-webui
  namespace: {{ include "novaedge.namespace" . }}
  labels:
    {{- include "novaedge.webui.labels" . | nindent 4 }}
spec:
  type: {{ .Values.webui.service.type }}
  ports:
  - name: http
    port: {{ .Values.webui.service.port }}
    targetPort: http
    protocol: TCP
  selector:
    {{- include "novaedge.webui.selectorLabels" . | nindent 4 }}
{{- end }}
