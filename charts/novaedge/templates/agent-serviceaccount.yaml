{{- if .Values.agent.enabled }}
{{- if .Values.agent.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "novaedge.agent.serviceAccountName" . }}
  namespace: {{ include "novaedge.namespace" . }}
  labels:
    {{- include "novaedge.agent.labels" . | nindent 4 }}
  {{- with .Values.agent.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
