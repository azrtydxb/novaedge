{{- if .Values.webui.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "novaedge.fullname" . }}-webui
  namespace: {{ include "novaedge.namespace" . }}
  labels:
    {{- include "novaedge.webui.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.webui.replicaCount }}
  selector:
    matchLabels:
      {{- include "novaedge.webui.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "novaedge.webui.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "novaedge.webui.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: webui
        image: {{ include "novaedge.webui.image" . }}
        imagePullPolicy: {{ .Values.webui.image.pullPolicy }}
        command:
        - /novactl
        args:
        - web
        - --address=:{{ .Values.webui.service.targetPort }}
        {{- if .Values.webui.prometheus.endpoint }}
        - --prometheus-endpoint={{ .Values.webui.prometheus.endpoint }}
        {{- end }}
        ports:
        - name: http
          containerPort: {{ .Values.webui.service.targetPort }}
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          {{- toYaml .Values.webui.resources | nindent 10 }}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65534
      {{- with .Values.webui.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.webui.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.webui.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
